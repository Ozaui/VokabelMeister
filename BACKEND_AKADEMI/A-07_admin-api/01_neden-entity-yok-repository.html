      {
        tur: 'kod',
        baslik: 'IUserRepository.cs — GetPagedAsync (Saf Ekleme)',

        nedenBuKlasor: 'Interfaces/Repositories/ — ICategoryRepository/IWordConceptRepository ile AYNI klasör, flat. NOT: Bu bir SAF EKLEME (STANDART.md §3.2) — var olan GetByEmailAsync/GetByGoogleIdAsync gibi metotların gövdesi DEĞİŞMEDİ, yalnızca iki YENİ, bağımsız metot eklendi; bu yüzden dosyanın TAMAMI değil, eklenen kısım + öncesi/sonrasından birer metot gösteriliyor.',
        kod: `public interface IUserRepository : IRepository<User>
{
    // AMAÇ: \`GET /admin/users\` — arama (Email/FirstName/LastName) + role filtresiyle

    Task<PagedResult<User>> GetPagedAsync(

        string? role,
        int page,
        int pageSize,
        CancellationToken ct = default
    );

      {
        tur: 'kod',
        baslik: 'UserRepository.cs — GetPagedAsync (İmplementasyon)',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Repositories/UserRepository.cs',
        nedenBuKlasor: 'Infrastructure/Repositories/ — CategoryRepository/WordConceptRepository ile AYNI seviyede, flat. NOT: Yine SAF EKLEME — GetByEmailAsync ve sonrası (STANDART.md §3.2) DEĞİŞMEDİ, yalnızca gösteriliyor ki okuyucu "bu iki yeni metot dosyanın NERESİNE eklendi" sorusuna cevap bulsun.',
        kod: `public class UserRepository : Repository<User>, IUserRepository
{
    public UserRepository(WordLearnerDbContext db)
        : base(db) { }

    // AMAÇ: Admin panel kullanıcı listesi — arama Email/FirstName/LastName'de,
    //       \`_set\` zaten Repository<T>'nin soft-delete global filtresini taşır.
    public async Task<PagedResult<User>> GetPagedAsync(
        string? search,
        string? role,
        int page,
        int pageSize,
        CancellationToken ct = default
    )
    {
        var query = _set.AsQueryable();

        if (!string.IsNullOrWhiteSpace(search))
            query = query.Where(u =>
                u.Email.Contains(search) || u.FirstName.Contains(search) || u.LastName.Contains(search)
            );
        if (!string.IsNullOrWhiteSpace(role))
            query = query.Where(u => u.Role == role);

        var totalCount = await query.CountAsync(ct);
        var items = await query
            .OrderBy(u => u.Id)
            .Skip((page - 1) * pageSize)
            .Take(pageSize)
            .ToListAsync(ct);

        return new PagedResult<User>(items, totalCount, page, pageSize);
    }

    // AMAÇ: E-postaya göre kullanıcı bulur, soft delete filtresini bilerek yok sayar.
    public Task<User?> GetByEmailAsync(string email, CancellationToken ct = default) =>
        _set.IgnoreQueryFilters().FirstOrDefaultAsync(u => u.Email == email, ct);

    // ... (GetByIdIncludingDeletedAsync, GetByGoogleIdAsync, GetByAppleIdAsync,
    //      OriginalEmailHashExistsAsync — DEĞİŞMEDİ)
}`,

          }
        ]

          '`IUserRepository`/`UserRepository`\'e SAF EKLEME: `GetPagedAsync` (arama+role filtresi, soft-delete filtresi BİLEREK normal uygulanır — GetByEmailAsync\'in `IgnoreQueryFilters()`\'ının AKSİNE).',
          'Kod denetimi düzeltmesi: `GetStatisticsAsync`/`AdminStatisticsDto` (tüketicisiz yazılmıştı) bu dilimden ÇIKARILDI — istatistik dilimi yazılırken gerçek tüketicisiyle (`GetAdminStatisticsQuery`) BİRLİKTE geri gelecek.',

        ]
      }
    ]
  };
