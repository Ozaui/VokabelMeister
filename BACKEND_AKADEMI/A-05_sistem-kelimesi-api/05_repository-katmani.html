        satirlar: [
          {
            satir: 'public interface IWordConceptRepository : IRepository<WordConcept>',
            aciklama: 'A-02\'de yazılan generic IRepository<T>\'yi (GetByIdAsync/AddAsync/UpdateAsync/SoftDeleteAsync) MİRAS ALIR — bu dört metot burada TEKRAR YAZILMAZ, yalnızca WordConcept\'e ÖZEL 4 sorgu eklenir.',

      {
        tur: 'kod',
        baslik: 'WordConceptRepository.cs — Liste + Detay Sorguları',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Repositories/WordConceptRepository.cs',
        nedenBuKlasor: 'Infrastructure/Repositories/ — QrLoginSessionRepository/ActivityLogRepository ile AYNI seviyede, flat.',
        kod: `public async Task<PagedResult<WordConcept>> GetPagedAsync(
    string? difficultyLevel,
    string? partOfSpeech,
    string? search,
    int page,
    int pageSize,
    CancellationToken ct = default
)
{
    var query = _set.Include(c => c.Words).ThenInclude(w => w.Language).AsQueryable();

    if (!string.IsNullOrWhiteSpace(difficultyLevel))
        query = query.Where(c => c.DifficultyLevel == difficultyLevel);
    if (!string.IsNullOrWhiteSpace(partOfSpeech))
        query = query.Where(c => c.PartOfSpeech == partOfSpeech);
    if (!string.IsNullOrWhiteSpace(search))
        query = query.Where(c => c.Words.Any(w => w.Text.Contains(search)));

    var totalCount = await query.CountAsync(ct);
    var items = await query
        .OrderBy(c => c.Id)
        .Skip((page - 1) * pageSize)
        .Take(pageSize)
        .ToListAsync(ct);

    return new PagedResult<WordConcept>(items, totalCount, page, pageSize);
}

public Task<WordConcept?> GetWithTranslationsAsync(int id, CancellationToken ct = default) =>
    _set
        .Include(c => c.Words)
        .ThenInclude(w => w.Language)
        .Include(c => c.Words)
        .ThenInclude(w => w.WordDetail)
        .Include(c => c.Words)
        .ThenInclude(w => w.WordExamples)
        .FirstOrDefaultAsync(c => c.Id == id, ct);`,
        satirlar: [
          {
            satir: 'var query = _set.Include(c => c.Words).ThenInclude(w => w.Language).AsQueryable();',
            aciklama: 'Liste sorgusu yalnızca Words+Language\'ı Include eder — WordDetail/WordExample YOK.',
            neden: 'GET /words liste ekranı yalnızca WordTranslationSummaryDto (dil+metin) döner, gramer/örnek cümle GÖSTERMEZ — gereksiz Include, N+1 değil ama gereksiz JOIN\'lerle sorguyu YAVAŞLATIRDI (100 kelimelik bir sayfada her birinin gramer JSON\'unu çekmenin hiçbir faydası yok).',
            olmasaydi: 'WordDetail/WordExample de Include edilseydi, GET /words her çağrıda kullanılmayacak veriyi (bazen büyük bir GrammarData JSON\'u) DB\'den TAŞIRDI — liste ekranı gereksiz yere YAVAŞLARDI.'
          },
          {
            satir: '.Include(c => c.Words)\n        .ThenInclude(w => w.WordDetail)',
            aciklama: 'GetWithTranslationsAsync (detay/güncelleme) ise WordDetail+WordExample\'ı DA Include eder — GetPagedAsync\'in TAM TERSİ tercih.',
            neden: 'GET /words/{id} ve UpdateWordCommandHandler\'ın ikisi de TAM detaya ihtiyaç duyuyor — biri göstermek için, diğeri var olan bir çeviriyi güncellerken hangi WordDetail\'in zaten VAR olduğunu bilmek için (bkz. bir sonraki bölüm, UpdateWordCommand).',
            olmasaydi: 'WordDetail Include edilmeseydi, UpdateWordCommandHandler\'daki `existingWord.WordDetail is null` kontrolü HER ZAMAN true dönerdi (lazy-loading kapalı olduğundan EF Core bu alanı hiç DOLDURMAZDI) — var olan bir gramer verisi ÜZERİNE YAZMAK yerine yanlışlıkla YENİ bir WordDetail satırı OLUŞTURULURDU.'
          }
        ]
      },
      {
        tur: 'kod',
        baslik: 'WordConceptRepository.cs — Duplikat Kontrolü + Cascade Soft Delete',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Repositories/WordConceptRepository.cs',
        nedenBuKlasor: null,
        kod: `public Task<bool> ExistsWordTextAsync(int languageId, string text, CancellationToken ct = default) =>
    _db.Words.AnyAsync(w => w.LanguageId == languageId && w.Text == text, ct);

public async Task SoftDeleteWithWordsAsync(int id, int? userId, CancellationToken ct = default)
{
    var concept =
        await _set.Include(c => c.Words).FirstOrDefaultAsync(c => c.Id == id, ct)
        ?? throw new EntityNotFoundException(typeof(WordConcept), id);

    var now = DateTime.UtcNow;

    concept.IsDeleted = true;
    concept.DeletedAt = now;
    concept.DeletedByUserId = userId;
    concept.UpdatedByUserId = userId;

    foreach (var word in concept.Words)
    {
        word.IsDeleted = true;
        word.DeletedAt = now;
        word.DeletedByUserId = userId;
        word.UpdatedByUserId = userId;
    }

    await _db.SaveChangesAsync(ct);
}`,
        satirlar: [
          {
            satir: '_db.Words.AnyAsync(w => w.LanguageId == languageId && w.Text == text, ct);',
            aciklama: 'WordConcept ÜZERİNDEN değil, doğrudan `_db.Words` DbSet\'i üzerinden sorgular — duplikat kontrolü kavram düzeyinde değil, "bu dilde bu metin var mı" düzeyinde.',
            neden: 'CreateWordCommand/UpdateWordCommand\'ın 409 kararı (Icerik.md "Eşleştirme") kavram bazlı DEĞİL, TEK bir dildeki Text bazlı — aynı Almanca "Tisch" iki farklı WordConcept altında iki kez girilmemeli, ama "Tisch" (de) ile "masa" (tr) aynı ANDA var olabilir çünkü farklı dil.',
            olmasaydi: 'WordConcept.Words koleksiyonu üzerinden (ör. `_set.Any(c => c.Words.Any(...))`) sorgulansaydı sonuç AYNI olurdu ama global soft-delete filtresi WordConcept ve Word\'e AYRI AYRI uygulandığı için doğrudan Words DbSet\'i üzerinden sorgulamak daha net, WordConcept\'in kendisini hiç YÜKLEMEDEN cevap verir.'
          },
          {
            satir: 'foreach (var word in concept.Words)\n    {\n        word.IsDeleted = true;',
            aciklama: 'WordConcept.IsDeleted=true yapmak YETMEZ — döngü, kavrama bağlı HER Word\'ü de tek tek IsDeleted=true yapar, sonra TEK bir SaveChangesAsync ile hepsi birlikte kaydedilir.',
            neden: 'IWordConceptRepository.cs\'teki "Neden bu metot" gerekçesiyle BİREBİR aynı: iki ayrı DbSet, iki ayrı IsDeleted kolonu — biri unutulursa "silinmiş kavramın hâlâ aktif kelimesi var" tutarsızlığı doğar.',
            olmasaydi: 'Yalnızca WordConcept işaretlenip Word\'ler ATLANSAYDI, DeleteWordCommandHandlerTests.Delete_ExistingConcept_CallsSoftDeleteWithWords testinin doğruladığı davranış (concept+words BİRLİKTE) BOZULURDU — silinen bir kelimenin çevirileri GET /words/{id}\'de hâlâ görünmeye devam EDERDİ.'
          }
        ]
      },
      {
        tur: 'kod',
        baslik: 'ILanguageRepository.cs + LanguageRepository.cs — BaseEntity\'siz İstisna',
        dosyaYolu: 'backend/WordLearner.Application/Interfaces/Repositories/ILanguageRepository.cs + backend/WordLearner.Infrastructure/Repositories/LanguageRepository.cs',
        nedenBuKlasor: null,
        kod: `public interface ILanguageRepository
{
    Task<Language?> GetByCodeAsync(string code, CancellationToken ct = default);
    Task<Language?> GetByIdAsync(int id, CancellationToken ct = default);
    Task<IReadOnlyList<Language>> GetAllActiveAsync(CancellationToken ct = default);
}

public class LanguageRepository : ILanguageRepository
{
    private readonly WordLearnerDbContext _db;

    public LanguageRepository(WordLearnerDbContext db) => _db = db;

    public Task<Language?> GetByCodeAsync(string code, CancellationToken ct = default) =>
        _db.Languages.FirstOrDefaultAsync(l => l.Code == code, ct);

    public Task<Language?> GetByIdAsync(int id, CancellationToken ct = default) =>
        _db.Languages.FirstOrDefaultAsync(l => l.Id == id, ct);

    public async Task<IReadOnlyList<Language>> GetAllActiveAsync(CancellationToken ct = default) =>
        await _db.Languages.Where(l => l.IsActive).OrderBy(l => l.DisplayOrder).ToListAsync(ct);
}`,
        satirlar: [
          {
            satir: 'public interface ILanguageRepository',
            aciklama: 'IRepository<T>\'yi KULLANMAZ — Language BaseEntity\'den türemediği için (Bölüm 2) generic T : BaseEntity kısıtına UYMUYOR, ActivityLogRepository/SecurityLogRepository ile AYNI istisna deseni (farklı gerekçeyle: onlar insert-only, bu statik referans).',
            neden: 'GetByCodeAsync — CreateWordCommand/UpdateWordCommandHandler\'ın `translations[].languageCode` ("de"/"tr") string\'ini Language.Id\'ye ÇÖZMESİ için var; API tüketicisi (admin formu) dil kodunu YAZAR, DB\'nin iç Id\'sini BİLMEZ.',

          },
          {
            satir: 'public Task<Language?> GetByIdAsync(int id, CancellationToken ct = default) =>',
            aciklama: '`GetByCodeAsync`\'in Id-bazlı KARDEŞİ — dil kodu yerine Language.Id ile arar. PairWordConceptsCommandHandler gibi zaten bir `LanguageId` int\'ine SAHİP olan çağıranlar (Word.LanguageId üzerinden) için, tekrar Code\'a çevirip GetByCodeAsync çağırmaya GEREK bırakmaz.',
            neden: 'Bazı akışlarda elde zaten bir `Word.LanguageId` (int, DB foreign key) var — bu durumda Code\'a hiç ihtiyaç yok, doğrudan Id ile sorgulamak bir dönüşüm ADIMI daha AZ demek.',
            olmasaydi: 'Bu metot olmasaydı, yalnızca LanguageId bilen bir çağıran önce `GetAllActiveAsync` ile TÜM dilleri çekip elle `.First(l => l.Id == id)` yapmak ya da var olmayan bir Code\'a çevirme adımı EKLEMEK zorunda kalırdı — gereksiz bir dolaylama.'
          },
          {
            satir: 'public async Task<IReadOnlyList<Language>> GetAllActiveAsync(CancellationToken ct = default) =>',
            aciklama: 'Aktif (IsActive=true) dilleri, `DisplayOrder`\'a göre sıralı döner — GET /languages gibi bir "hangi diller destekleniyor" listesi için (admin formundaki dil seçici dropdown\'ının kaynağı).',
            neden: '`IsActive` filtresi — Languages tablosuna ileride üçüncü bir dil (`en`) eklenip henüz içerik girilmeden önce `IsActive=false` ile PASİF tutulabilmesi için (GERMAN_LANGUAGE_FEATURES.md §10 "en tanımlı ama henüz kullanılmıyor" notu) — admin formunda seçilemeyen ama DB\'de kaydı DURAN bir dil.',
            olmasaydi: 'Bu metot olmasaydı, admin formunun dil seçici dropdown\'ı hangi dillerin GERÇEKTEN kullanıma açık olduğunu (en gibi henüz içerik girilmeyen bir dili HARİÇ tutarak) öğrenemezdi — ya tüm Languages satırları (pasif olanlar dahil) gösterilirdi ya da bu filtre her çağıran tarafta AYRI AYRI tekrar yazılırdı.'
          }
        ]

      {

            neden: 'ExceptionHandlingMiddleware.cs\'e eklenen `DuplicateWordException => HttpStatusCode.Conflict` eşlemesiyle BİRLİKTE çalışır — bu exception fırlatıldığında istemci otomatik 409 alır, DuplicateEmailException\'ın Auth\'ta yaptığı İLE BİREBİR aynı mekanizma.',
            olmasaydi: 'Code yerine doğrudan bir İngilizce/Türkçe cümle .Message\'a yazılsaydı, admin panel Almanca açtığında da Türkçe bir hata METNİ görürdü — CLAUDE.md\'nin "istemci mesajı dile göre kalır" kararı BOZULURDU.'
          }
        ]
      },
      {
        tur: 'sozluk',
        baslik: 'Bu Bölümde Geçen Terimler',
        terimler: [
          { terim: 'Aggregate Root', tanim: 'Bir nesne kümesinin (WordConcept + Word + WordDetail + WordExample) DIŞARIYA tek bir kapı üzerinden (IWordConceptRepository) açılması — child\'lara doğrudan erişilmez, hep parent üzerinden.' },
          { terim: 'ExistsWordTextAsync', tanim: 'Duplikat 409 kararının dayandığı sorgu — dil+metin ikilisi zaten var mı, WordConcept değil doğrudan Words DbSet\'i üzerinden.' },
