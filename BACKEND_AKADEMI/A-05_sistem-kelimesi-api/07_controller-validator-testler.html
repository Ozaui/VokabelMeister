        kod: `public class CreateWordCommandValidator : AbstractValidator<CreateWordCommand>
{
    public CreateWordCommandValidator(IValidator<WordGrammarInput> grammarValidator)
    {
        RuleFor(x => x.PartOfSpeech)
            .NotEmpty()
            .WithMessage("PartOfSpeech must not be empty.")
            .WithErrorCode("PART_OF_SPEECH_REQUIRED");

        RuleFor(x => x.DifficultyLevel)
            .NotEmpty()
            .WithMessage("DifficultyLevel must not be empty.")
            .WithErrorCode("DIFFICULTY_LEVEL_REQUIRED");

        RuleFor(x => x.Translations)
            .NotEmpty()
            .WithMessage("At least one translation is required.")
            .WithErrorCode("TRANSLATIONS_REQUIRED");

        RuleFor(x => x)
            .Custom(
                (command, context) =>
                    WordTranslationRules.ValidateTranslations(
                        command.Translations,
                        command.PartOfSpeech,
                        grammarValidator,
                        context
                    )
            );
    }
}

internal static class WordTranslationRules
{
    public static void ValidateTranslations<T>(
        IReadOnlyList<WordTranslationInput> translations,
        string partOfSpeech,
        IValidator<WordGrammarInput> grammarValidator,
        ValidationContext<T> context
    )
    {
        foreach (var translation in translations)
        {
            if (string.IsNullOrWhiteSpace(translation.LanguageCode))
            {
                context.AddFailure(Failure("LANGUAGE_CODE_REQUIRED"));
                continue;
            }

            if (string.IsNullOrWhiteSpace(translation.Text))
            {
                context.AddFailure(Failure("WORD_TEXT_REQUIRED"));
                continue;
            }

            var grammarDataJson = translation.WordDetail?.GrammarData?.GetRawText();
            var grammarResult = grammarValidator.Validate(
                new WordGrammarInput(translation.LanguageCode, partOfSpeech, grammarDataJson)
            );

            foreach (var failure in grammarResult.Errors)
                context.AddFailure(failure);
        }
    }

    private static ValidationFailure Failure(string code) =>
        new("Translations", $"Translation validation failed: {code}.") { ErrorCode = code };
}`,

            aciklama: 'WordGrammarValidator.cs\'teki (Bölüm 4) `Failure` yardımcısının BİREBİR aynı deseni — tüm `Translations` alanı hatalarının TEK kurulma noktası, `PropertyName` sabit "Translations", gerçek istemci mesajı `ErrorCode`\'dan ÇÖZÜLÜR.',

            olmasaydi: 'Her `context.AddFailure(...)` çağrısında `new ValidationFailure("Translations", "...") { ErrorCode = "..." }` TEKRAR yazılsaydı, LANGUAGE_CODE_REQUIRED ve WORD_TEXT_REQUIRED\'ın HER İKİSİNDE de neredeyse ÖZDEŞ bir kod bloğu tekrarlanırdı.'
          }
        ]
      },
      {
        tur: 'kod',

[Route("api/v1/words")]
public class WordsController : ControllerBase
{
    private int CurrentUserId => int.Parse(User.FindFirstValue(ClaimTypes.NameIdentifier)!);
    private string? CurrentRole => User.FindFirstValue(ClaimTypes.Role);

    [HttpGet]
    [Authorize]
    public async Task<ActionResult<PagedResult<WordConceptListItemDto>>> GetWords(
        [FromQuery] string? level, [FromQuery] string? partOfSpeech, [FromQuery] string? search,
        [FromQuery] int page = 1, [FromQuery] int pageSize = 20, CancellationToken ct = default)
    {
        var query = new GetWordsQuery(level, partOfSpeech, search, page, pageSize);
        return Ok(await _mediator.Send(query, ct));
    }

    [HttpPost]
    [Authorize(Roles = "Admin")]
    public async Task<ActionResult<WordConceptDetailDto>> CreateWord(
        [FromQuery] bool force, CreateWordCommand command, CancellationToken ct)
    {
        var response = await _mediator.Send(
            command with { Force = force, UserId = CurrentUserId, ActorRole = CurrentRole }, ct);
        return StatusCode(StatusCodes.Status201Created, response);
    }
}`,

{
    private readonly Mock<IWordConceptRepository> _wordConceptRepo = new();
    private readonly Mock<ILanguageRepository> _languageRepo = new();
    private readonly Mock<IActivityLogger> _activityLogger = new();

    [Fact]
    public async Task Create_DuplicateTextWithoutForce_ThrowsDuplicateWordException()
    {
        // ARRANGE
        _languageRepo.Setup(r => r.GetByCodeAsync("de", It.IsAny<CancellationToken>())).ReturnsAsync(German);
        _wordConceptRepo
            .Setup(r => r.ExistsWordTextAsync(German.Id, "Tisch", It.IsAny<CancellationToken>()))
            .ReturnsAsync(true);
        var handler = CreateHandler();
        var command = new CreateWordCommand("Noun", "A1", null,
            new[] { new WordTranslationInput("de", "Tisch", null, null, null) });

        // ACT
        var act = () => handler.Handle(command, default);

        // ASSERT
        await act.Should().ThrowAsync<DuplicateWordException>();
        _wordConceptRepo.Verify(
            r => r.AddAsync(It.IsAny<WordConcept>(), It.IsAny<int?>(), It.IsAny<CancellationToken>()),
            Times.Never);
    }
}`,
        satirlar: [

          }
        ]

          { terim: 'UpdateWordCommandHandlerTests (5 test)', tanim: 'Mevcut çeviri güncelleme, eşleştirme ile ikinci dil ekleme (2→2 Word), yeni dilde duplikat 409, kavram bulunamadı 404, UPDATE_WORD audit (Old+NewValue ikisi de dolu).' },
