            neden: 'Language, admin panelin CRUD ettiği bir "içerik" DEĞİL — yalnızca de/tr seed edilen, neredeyse hiç değişmeyen bir referans tablosu. CreatedByUserId/UpdatedAt/IsDeleted gibi audit alanları burada hiçbir soruyu CEVAPLAMAZ (kimse "bu dili kim ekledi" diye sormayacak, bir dil "soft delete" edilmez).',

        nedenBuKlasor: null,
        kod: `public class WordConcept : BaseEntity
{
    public string PartOfSpeech { get; set; } = string.Empty;

    public string DifficultyLevel { get; set; } = string.Empty;

    public string? ImageUrl { get; set; }

    public bool IsActive { get; set; } = true;

    public ICollection<Word> Words { get; set; } = new List<Word>();
}`,

          {
            satir: 'public string PartOfSpeech { get; set; } = string.Empty;',

      {
        tur: 'kod',
        baslik: 'WordConceptConfiguration.cs — CHECK Constraint\'ler',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Data/Configurations/Words/WordConceptConfiguration.cs',
        nedenBuKlasor: 'Data/Configurations/Words/ — Auth/ ve Logging/ ile AYNI seviyede, entity klasör yapısını birebir yansıtır.',
        kod: `public class WordConceptConfiguration : IEntityTypeConfiguration<WordConcept>
{
    public void Configure(EntityTypeBuilder<WordConcept> builder)
    {
        builder.Property(w => w.PartOfSpeech).HasMaxLength(20).IsRequired();
        builder.Property(w => w.DifficultyLevel).HasMaxLength(2).IsRequired();
        builder.Property(w => w.ImageUrl).HasMaxLength(500);

        builder.HasIndex(w => w.DifficultyLevel);

        builder.ToTable(t =>
        {
            t.HasCheckConstraint(
                "CK_WordConcepts_Level",
                "DifficultyLevel IN ('A1','A2','B1','B2','C1','C2')"
            );
            t.HasCheckConstraint(
                "CK_WordConcepts_PartOfSpeech",
                "PartOfSpeech IN ('Noun','Verb','Adjective','Adverb','Conjunction','Preposition','Pronoun','Other')"
            );
        });
    }
}`,
        satirlar: [
          {
            satir: 't.HasCheckConstraint(\n                "CK_WordConcepts_PartOfSpeech",',
            aciklama: 'PartOfSpeech\'in C# tarafında enum OLMAMASININ bedeli/telafisi — geçersiz bir değer (ör. "noun" küçük harf, ya da yazım hatası "Nuon") buraya asla YAZILAMAZ, DB reddeder.',
            neden: 'UserConfiguration.cs\'teki CK_Users_Role/CK_Users_ThemePreference ile BİREBİR aynı "iki katmanlı savunma" deseni — uygulama katmanı (WordGrammarValidator, ileriki bölüm) ve veri katmanı (bu CHECK) birbirinden BAĞIMSIZ olarak doğru değeri garanti eder.',

          }
        ]
      },

        tur: 'sozluk',

          { terim: 'WordDetail.cs + WordDetailConfiguration.cs', tanim: 'BaseEntity + Word\'e 1:1 — `WordId` üzerinde UNIQUE index bu 1:1\'i DB seviyesinde garanti eder. GrammarData/Notes/CommonMistakes hepsi nvarchar(max) (HasMaxLength YOK) çünkü serbest/JSON içerik.' },

        ]
      }
    ]
