        nedenBuKlasor: 'Features/Words/ — WordEntityBuilder/WordConceptDtoBuilder (Bölüm 6) ile AYNI "paylaşılan statik yardımcı" deseni.',
        kod: `public static class WordMatchSuggestionResolver
{
    public static int? FindSuggestion(Word candidate, IReadOnlyList<WordConcept> otherLanguagePool)
    {
        var candidateTokens = SplitDefinition(candidate.Definition);

        foreach (var poolConcept in otherLanguagePool)
        {
            var poolWord = poolConcept.Words.Single();

            if (candidateTokens.Contains(poolWord.Text, StringComparer.OrdinalIgnoreCase))
                return poolConcept.Id;

            var poolTokens = SplitDefinition(poolWord.Definition);
            if (poolTokens.Contains(candidate.Text, StringComparer.OrdinalIgnoreCase))
                return poolConcept.Id;
        }

        return null;
    }

    private static string[] SplitDefinition(string? definition) =>
        string.IsNullOrWhiteSpace(definition)
            ? []
            : definition.Split(',', StringSplitOptions.TrimEntries | StringSplitOptions.RemoveEmptyEntries);
}`,

        kod: `public async Task<PagedResult<WordConcept>> GetUnmatchedPagedAsync(
    int languageId, string? search, int page, int pageSize, CancellationToken ct = default)
{
    var query = _set
        .Include(c => c.Words).ThenInclude(w => w.Language)
        .Where(c => c.Words.Count == 1 && c.Words.Any(w => w.LanguageId == languageId));

    if (!string.IsNullOrWhiteSpace(search))
        query = query.Where(c => c.Words.Any(w => w.Text.Contains(search)));

    var totalCount = await query.CountAsync(ct);
    var items = await query.OrderBy(c => c.Id).Skip((page - 1) * pageSize).Take(pageSize).ToListAsync(ct);

    return new PagedResult<WordConcept>(items, totalCount, page, pageSize);
}

public async Task<IReadOnlyList<WordConcept>> GetUnmatchedOtherLanguagePoolAsync(
    int excludeLanguageId, CancellationToken ct = default) =>
    await _set
        .Include(c => c.Words).ThenInclude(w => w.Language)
        .Where(c => c.Words.Count == 1 && c.Words.Any(w => w.LanguageId != excludeLanguageId))
        .ToListAsync(ct);`,

        baslik: 'WordConceptRepository.cs — PairAsync (Asıl Birleştirme)',

        kod: `public async Task<WordConcept> PairAsync(
    int primaryId, int otherConceptId, int? userId, CancellationToken ct = default)
{
    var primary = await GetWithTranslationsAsync(primaryId, ct)
        ?? throw new EntityNotFoundException(typeof(WordConcept), primaryId);
    var other = await GetWithTranslationsAsync(otherConceptId, ct)
        ?? throw new EntityNotFoundException(typeof(WordConcept), otherConceptId);

    var otherWord = other.Words.Single();
    other.Words.Remove(otherWord);
    otherWord.WordConceptId = primary.Id;
    otherWord.UpdatedByUserId = userId;
    primary.Words.Add(otherWord);

    var now = DateTime.UtcNow;
    other.IsDeleted = true;
    other.DeletedAt = now;
    other.DeletedByUserId = userId;
    other.UpdatedByUserId = userId;

    await _db.SaveChangesAsync(ct);

    return primary;
}`,

          {
            satir: 'var primary = await GetWithTranslationsAsync(primaryId, ct)',
            aciklama: 'Yeni bir sorgu YAZILMADI — Bölüm 5\'teki GetWithTranslationsAsync (Language+WordDetail+WordExample dahil TAM yükleme) AYNEN kullanıldı, çünkü dönen `primary` doğrudan WordConceptDtoBuilder.BuildDetail\'e GİDECEK.',
            neden: 'DeleteWordCommand\'ın SoftDeleteWithWordsAsync\'i de (Bölüm 5) AYNI şekilde tam yükleme yapıyordu — bir aggregate\'i "birleştirmek" veya "silmek" için önce onu TAM hâliyle bilmek gerekir, kısmi bir Include DTO oluşturmada eksik alan BIRAKIRDI.',
            olmasaydi: 'Yalnızca `Include(c => c.Words)` (Language\'sız) yapan hafif bir sorgu kullanılsaydı, dönen `primary.Words[i].Language.Code` NullReferenceException fırlatırdı — WordConceptDtoBuilder Language\'a HER ZAMAN erişir.'

            satir: 'other.Words.Remove(otherWord);\n    otherWord.WordConceptId = primary.Id;\n    otherWord.UpdatedByUserId = userId;\n    primary.Words.Add(otherWord);',
            aciklama: 'Word\'ün WordConceptId\'si (yabancı anahtar) değiştirilip navigation koleksiyonları (other.Words / primary.Words) EL İLE senkronlanıyor — EF Core\'un "relationship fixup"ına GÜVENİLMİYOR.',
            neden: 'SaveChangesAsync\'ten HEMEN sonra `primary` (Words koleksiyonuyla) doğrudan WordConceptDtoBuilder\'a dönüyor — fixup\'ın SaveChanges içindeki DetectChanges\'te NE ZAMAN çalıştığına güvenmek yerine, koleksiyonu EL İLE doğru bırakmak, junior bir okuyucu için de "veri nerede" sorusunu BELİRSİZ bırakmaz.',

        nedenBuKlasor: null,
        kod: `public record GetUnmatchedWordConceptsQuery(int LanguageId, string? Search, int Page = 1, int PageSize = 20)
    : IRequest<PagedResult<UnmatchedWordConceptDto>>;

public async Task<PagedResult<UnmatchedWordConceptDto>> Handle(
    GetUnmatchedWordConceptsQuery request, CancellationToken ct)
{
    var paged = await _wordConceptRepository.GetUnmatchedPagedAsync(
        request.LanguageId, request.Search, request.Page, request.PageSize, ct);
    var otherLanguagePool = await _wordConceptRepository.GetUnmatchedOtherLanguagePoolAsync(
        request.LanguageId, ct);

    var items = paged.Items.Select(concept =>
    {
        var word = concept.Words.Single();
        return new UnmatchedWordConceptDto(
            concept.Id, word.Language.Code, word.Text, word.Definition,
            concept.PartOfSpeech, concept.DifficultyLevel,
            WordMatchSuggestionResolver.FindSuggestion(word, otherLanguagePool));
    }).ToList();

    return new PagedResult<UnmatchedWordConceptDto>(items, paged.TotalCount, paged.Page, paged.PageSize);
}`,

            olmasaydi: 'Havuz her `Select` iterasyonunda TEKRAR çekilseydi, sayfa boyutu (pageSize) arttıkça sorgu sayısı DOĞRUSAL olarak artardı — 795+ satırlık gerçek veri ölçeğinde bu FARK EDİLİR bir yavaşlık yaratırdı.'

        ]

      {

        kod: `public record PairWordConceptsCommand(int PrimaryId, int OtherConceptId) : IRequest<WordConceptDetailDto>
{
    public int? UserId { get; init; }
    public string? ActorRole { get; init; }
}

public async Task<WordConceptDetailDto> Handle(PairWordConceptsCommand request, CancellationToken ct)
{
    var primaryBefore =
        await _wordConceptRepository.GetWithTranslationsAsync(request.PrimaryId, ct)
        ?? throw new EntityNotFoundException(typeof(WordConcept), request.PrimaryId);
    var otherBefore =
        await _wordConceptRepository.GetWithTranslationsAsync(request.OtherConceptId, ct)
        ?? throw new EntityNotFoundException(typeof(WordConcept), request.OtherConceptId);

    var oldValue = new
    {
        Primary = new
        {
            ConceptId = primaryBefore.Id,
            primaryBefore.PartOfSpeech,
            primaryBefore.DifficultyLevel,
            Translations = primaryBefore.Words.Select(w => new { LanguageCode = w.Language.Code, w.Text }),
        },
        Other = new
        {
            ConceptId = otherBefore.Id,
            otherBefore.PartOfSpeech,
            otherBefore.DifficultyLevel,
            Translations = otherBefore.Words.Select(w => new { LanguageCode = w.Language.Code, w.Text }),
        },
    };

    var merged = await _wordConceptRepository.PairAsync(
        request.PrimaryId,
        request.OtherConceptId,
        request.UserId,
        ct
    );

    await _activityLogger.LogAsync(
        request.UserId,
        request.ActorRole,
        "PAIR_WORD_CONCEPTS",
        entityType: "WordConcept",
        entityId: merged.Id,
        oldValue: oldValue,
        newValue: new
        {
            merged.PartOfSpeech,
            merged.DifficultyLevel,
            Translations = merged.Words.Select(w => new { LanguageCode = w.Language.Code, w.Text }),
            MergedConceptId = request.OtherConceptId,
        },
        ct: ct
    );

    return WordConceptDtoBuilder.BuildDetail(merged);
}`,

{
    public PairWordConceptsCommandValidator()
    {
        RuleFor(x => x.OtherConceptId)
            .NotEqual(x => x.PrimaryId)
            .WithMessage("otherConceptId must differ from primaryId.")
            .WithErrorCode("SAME_CONCEPT_PAIR_NOT_ALLOWED");
    }
}`,

            neden: 'Bu bir "iş kuralı ihlali" değil bir "girdi hatası" — admin panel arayüzü zaten aynı satırı iki kez SEÇTİRMEZ ama API doğrudan çağrılırsa (Postman, otomasyon) bu durumu ÖNLEMEK gerekir; CLAUDE.md "yalnızca sistem sınırında doğrula" ilkesine TAM uyar (client input, gerçek bir sınır).',
            olmasaydi: 'Bu kural olmasaydı, primaryId==otherConceptId ile gelen bir istek WordConceptRepository.PairAsync içinde `other.Words.Single()` sonrası `primary.Words.Add` çağrısında BEKLENMEDİK bir koleksiyon durumuna (aynı nesne üzerinde Remove+Add) yol açıp anlaşılması ZOR bir hataya NEDEN olurdu.'
          }
        ]
      }
    ]
