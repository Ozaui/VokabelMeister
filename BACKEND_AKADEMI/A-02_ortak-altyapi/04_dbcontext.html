      {
        tur: 'kod',
        baslik: 'OnModelCreating — Global Soft Delete Filtresi',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Data/WordLearnerDbContext.cs',
        nedenBuKlasor: 'Bu metot hâlâ aynı dosyada — DbContext\'in "model kurulumu" mantığı, DbContext\'in kendisinden ayrılmaz.',
        kod: `protected override void OnModelCreating(ModelBuilder modelBuilder)
{
    modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

    foreach (var entityType in modelBuilder.Model.GetEntityTypes())
    {
        if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
        {
            var parameter = Expression.Parameter(entityType.ClrType, "e");
            var property = Expression.Property(parameter, nameof(BaseEntity.IsDeleted));
            var notDeleted = Expression.Not(property);
            var lambda = Expression.Lambda(notDeleted, parameter);
            modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
        }
    }

    base.OnModelCreating(modelBuilder);
}`,

            olmasaydi: 'Bu satır olmasaydı, aşağıdaki `Expression.Property`/`Expression.Not`/`Expression.Lambda` çağrılarının bağlanacağı bir parametre olmazdı — dinamik lambda inşası BAŞLAYAMAZDI.'

            olmasaydi: '`nameof` yerine düz bir string ("IsDeleted") yazılsaydı, biri BaseEntity\'deki alanı yeniden adlandırdığında (ör. IDE refactor ile) bu satır GÜNCELLENMEZ, çalışma zamanında "property bulunamadı" hatasıyla PATLARDI.'

          }
        ]
      },
      {
        tur: 'kod',
        baslik: 'SaveChangesAsync Override — Otomatik UpdatedAt',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Data/WordLearnerDbContext.cs',
        nedenBuKlasor: 'Aynı dosyada, çünkü "kaydetme davranışını özelleştirme" DbContext\'in temel sorumluluklarından biri.',
        kod: `public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
{
    foreach (var entry in ChangeTracker.Entries<BaseEntity>())
    {
        if (entry.State == EntityState.Modified)
            entry.Entity.UpdatedAt = DateTime.UtcNow;
    }

    return base.SaveChangesAsync(cancellationToken);
}`,
        satirlar: [
          {
            satir: 'public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)',

            neden: 'Bu, "her kayıt işleminde otomatik olarak çalışacak" bir kanca (hook) yaratmanın en temiz yolu — Repository&lt;T&gt; (Bölüm 7) her SaveChangesAsync çağırdığında bu kod da otomatik tetiklenir.',
            olmasaydi: 'Override edilmeseydi, UpdatedAt alanını set etmek için her repository/handler\'ın `entity.UpdatedAt = DateTime.UtcNow` satırını elle yazması gerekirdi — biri unutursa o kayıt "hiç güncellenmemiş" gibi görünürdü.'

            neden: 'ChangeTracker, EF Core\'un "hangi property gerçekten değişti" bilgisini zaten tuttuğu için, bu bilgiyi tekrar hesaplamak yerine doğrudan kullanılır.',
            olmasaydi: 'ChangeTracker kullanılmasaydı, "hangi entity değişti" bilgisini kendi elimizle takip etmemiz gerekirdi — EF Core\'un zaten yaptığı bir işi tekrar yazmak olurdu.'
          },

          },
          {
            satir: 'entry.Entity.UpdatedAt = DateTime.UtcNow;',
            aciklama: 'Değişen kaydın UpdatedAt alanı, ŞU ANKİ UTC zamanına set edilir — bu, "bu kayıt son ne zaman değişti" sorusunun otomatik cevabıdır.',
            neden: 'UTC kullanılması, sunucunun bulunduğu zaman dilimi ne olursa olsun bu değerin TUTARLI kalmasını sağlar (CLAUDE.md\'nin genel zaman damgası konvansiyonuyla uyumlu); merkezi olarak burada set edilmesi, her Handler\'ın bunu elle yapması gerekliliğini ORTADAN KALDIRIR.',
