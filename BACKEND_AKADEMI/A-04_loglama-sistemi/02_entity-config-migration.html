        nedenBuKlasor: 'Entities/Logging/ altında — Auth/ (User, RefreshToken, QrLoginSession) ile AYNI seviyede yeni bir domain klasörü, çünkü loglama Auth\'un bir parçası DEĞİL, ayrı bir cross-cutting concern.',
        kod: `public class SecurityLog
{
    public long Id { get; set; }

    public LogEventType EventType { get; set; }

    public int? UserId { get; set; }

    public string? IpAddress { get; set; }
    public string? UserAgent { get; set; }

    public DateTime CreatedAt { get; set; } = DateTime.UtcNow;

    public User? User { get; set; }

        satirlar: [

        ]

      {
        tur: 'kod',
        baslik: 'SecurityLogConfiguration.cs — Fluent API ile Şema + Check Constraint',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Data/Configurations/Logging/SecurityLogConfiguration.cs',
        nedenBuKlasor: 'Data/Configurations/Logging/ — Auth/ ile AYNI seviyede, entity klasör yapısını BİREBİR yansıtır.',
        kod: `public class SecurityLogConfiguration : IEntityTypeConfiguration<SecurityLog>
{
    public void Configure(EntityTypeBuilder<SecurityLog> builder)
    {
        builder.HasKey(s => s.Id);
        builder.Property(s => s.Id).UseIdentityColumn();

        builder.Property(s => s.EventType).HasConversion<string>().HasMaxLength(50).IsRequired();
        builder.Property(s => s.EmailHash).HasMaxLength(44);
        builder.Property(s => s.IpAddress).HasMaxLength(45);
        builder.Property(s => s.UserAgent).HasMaxLength(500);

        builder.HasIndex(s => s.EventType);
        builder.HasIndex(s => s.IpAddress);
        builder.HasIndex(s => s.CreatedAt).IsDescending();

        builder.HasOne(s => s.User).WithMany().HasForeignKey(s => s.UserId).OnDelete(DeleteBehavior.SetNull);

        builder.ToTable(t => t.HasCheckConstraint(
            "CK_SecurityLog_EventType",
            "EventType IN ('LoginFailed','OtpFailed','RateLimitHit','UnauthorizedAccess'," +
            "'TokenReplay','PasswordReset','AccountDeletion','AdminAction'," +
            "'QrLoginConfirmed','QrLoginDenied')"));
    }
}`,

            satir: 'builder.Property(s => s.EventType).HasConversion<string>().HasMaxLength(50).IsRequired();',
            aciklama: 'Enum, DB\'de SAYISAL index (0,1,2...) olarak DEĞİL, okunabilir string ("LoginFailed") olarak tutulur — QrLoginSession.Status ile AYNI desen.',
            neden: 'Sayısal saklansaydı, bir gün enum\'a ARAYA yeni bir değer eklenirse (ör. iki değer arasına) TÜM mevcut kayıtların anlamı KAYARDI — string saklamak bu riski TAMAMEN ortadan kaldırır, ayrıca DB\'de elle sorgu yazan bir admin/DBA değeri DOĞRUDAN okuyabilir.',
            olmasaydi: 'Sayısal saklansaydı ve enum sıralaması değişseydi, ör. eski "3" (TokenReplay) yeni kodda "3" (RateLimitHit) anlamına GELEBİLİRDİ — sessiz, fark edilmesi ÇOK zor bir veri bozulması.'
          },
          {
            satir: 'builder.HasOne(s => s.User).WithMany().HasForeignKey(s => s.UserId).OnDelete(DeleteBehavior.SetNull);',
            aciklama: 'Kullanıcı silinse (soft delete DEĞİL, gerçekten Users tablosundan kalksa) bile, SecurityLog kaydı SİLİNMEZ — yalnızca UserId NULL olur.',
            neden: 'Bir güvenlik olayı kaydı, o kaydı üreten kullanıcının VARLIĞINA bağımlı OLMAMALI — audit trail\'in KENDİSİ, ilişkili entity yok olsa bile KORUNMALI (ör. "bu IP\'den kaç deneme oldu" sorusu kullanıcı silinse bile CEVAPLANABİLMELİ).',
            olmasaydi: 'CASCADE (varsayılan) kullanılsaydı, bir kullanıcı silindiğinde TÜM güvenlik geçmişi de SİLİNİRDİ — tam da audit\'in ÖNLEMEYE çalıştığı veri kaybı senaryosu.'
          },
          {
            satir: 'builder.ToTable(t => t.HasCheckConstraint(',
            aciklama: 'DB seviyesinde İKİNCİ savunma hattı — C# enum\'u YANLIŞLIKLA (ör. elle bir SQL INSERT ile) bypass edilse bile, geçersiz bir EventType değeri DB tarafından REDDEDİLİR.',
            neden: 'QrLoginSessionConfiguration\'daki CK_QrLoginSessions_Status ile AYNI "iki katmanlı savunma" deseni (CLAUDE.md\'nin ThemePreference\'ta da kullandığı desen) — uygulama katmanı (enum) ve veri katmanı (CHECK) BİRBİRİNDEN bağımsız olarak doğru değeri garanti eder.',
            olmasaydi: 'Bu constraint olmasaydı, bir migration hatası ya da elle veri düzeltme İŞLEMİ tabloya geçersiz bir string ("LoginFaild" gibi) yazabilirdi — bu satır SESSİZCE hiçbir filtreye YAKALANMAZDI, admin panelde "kayıp" bir olay gibi görünürdü.'
          }
        ]

        tur: 'sozluk',

          { terim: 'ApplicationLog.cs + ApplicationLogConfiguration.cs', tanim: 'Id BIGINT + BaseEntity yok ORTAK ama tek FARK: FK/navigation YOK (Serilog sink\'i User tablosuna join/kontrol yapmaz, ham UserId int\'i yazar) — Level/Message/Exception/SourceContext/RequestPath/UserId/Properties/TimeStamp kolonları Serilog\'un ColumnOptions\'ıyla (Bölüm 4) BİREBİR eşleşecek şekilde tasarlandı.' }
        ]

    ]
