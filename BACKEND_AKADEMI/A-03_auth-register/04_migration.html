          'CreateTable, birden çok tabloyu (Users + RefreshTokens) TEK migration\'da oluşturabilir; Foreign Key + Cascade, aralarındaki 1:N ilişkiyi veritabanı seviyesinde kurar',
          'Dosya adındaki zaman damgası, migration\'ların uygulanma sırasını garanti eder'
        ]
      }
    ]
  };
