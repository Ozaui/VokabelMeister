<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Şablon Bölüm</title>
<link rel="stylesheet" href="../engine/slides.css" />
</head>
<body>
<div id="app"></div>
<script>
  // AMAÇ: Bu dosya, BACKEND_AKADEMI'ye yeni bir bölüm eklerken kopyalanacak ŞABLONDUR.
  // NEDEN: Her slayt türünün (kapak, kavram, kod, karsilastirma, sozluk, ozet) en az bir
  //        çalışan örneğini içerir — yeni bir yazar (insan ya da AI) şemayı ezberlemek yerine
  //        buradan kopyalayıp alanları doldurabilir. Alan açıklamaları için STANDART.md §3'e bak.
  window.MODULE = {
    id: 'sablon-ornek-bolum',
    bolumBaslik: 'A-0X — Görev Adı',       // topbar breadcrumb'ında görünür
    oncekiBolum: null,                      // önceki bölüm dosyasının göreli yolu, yoksa null
    sonrakiBolum: null,                     // sonraki bölüm dosyasının göreli yolu, yoksa null

    slaytlar: [
      // 1) KAPAK — bölümün ilk slaytı, yalnızca başlık ekranı.
      {
        tur: 'kapak',
        ustBaslik: 'BÖLÜM X',
        baslik: 'Slayt Başlığı Buraya',
        altBaslik: 'Bir-iki cümlelik alt başlık: bu bölümde ne öğreneceğiz ve neden önemli.'
      },

      // 2) KAVRAM — kod göstermeden, sıfırdan bir kavramı anlatan slayt.
      //    `neden` ve `olmasaydi` AYRI alanlardır — "kural böyle" demek YETERSİZ, ikisi de
      //    somut, mühendislik gerekçesi taşıyan cümleler olmalı.
      {
        tur: 'kavram',
        baslik: 'Bu Kavram Ne?',
        aciklama: 'Kavramın sade, jargonsuz tanımı. Okuyucu junior\'dan bile acemi — hiçbir ön bilgi varsayma.',
        neden: 'Bu yaklaşımın seçilmesinin somut mühendislik gerekçesi (performans, güvenlik, sürdürülebilirlik vb.) — "standart böyle" demek YETERLİ DEĞİL.',
        olmasaydi: 'Bu yaklaşım kullanılmasaydı ortaya çıkacak somut, ölçülebilir sorun (ör. "her sorguda elle SQL yazılırdı, bir kolon adı değişince onlarca yer bulunup düzeltilmesi gerekirdi").'
      },

      // 3) KOD — gerçek kaynak dosyadan BİREBİR alınan kod, satır satır açıklanır.
      //    `satirlar[]` içindeki `satir` alanı, `kod` metnindeki satırla (trim edilmiş)
      //    KARAKTER KARAKTER eşleşmeli — eşleşmezse o satır tıklanabilir olmaz.
      {
        tur: 'kod',
        baslik: 'DosyaAdi.cs — Kısa Açıklama',
        dosyaYolu: 'backend/WordLearner.Katman/Yol/DosyaAdi.cs',
        nedenBuKlasor: 'Bu dosyanın neden bu klasörde/isimde olduğunun gerekçesi — CLAUDE.md §5 klasör/namespace kuralına referansla.',
        kod: `namespace WordLearner.Ornek;

public class OrnekSinif
{
    public int Id { get; set; }
}`,
        satirlar: [
          {
            satir: 'public class OrnekSinif',
            aciklama: 'Bu satırın ne yaptığının kısa açıklaması.',
            neden: 'Neden böyle yazıldığının gerekçesi.',
            olmasaydi: 'Böyle yazılmasaydı ne olurdu — somut senaryo.'
          },
          {
            satir: 'public int Id { get; set; }',
            aciklama: 'Bu satırın ne yaptığının kısa açıklaması.',
            neden: 'Neden böyle yazıldığının gerekçesi.',
            olmasaydi: 'Böyle yazılmasaydı ne olurdu — somut senaryo.'
          }
        ]
      },

      // 4) KARSILASTIRMA — "doğru yapılırsa / yanlış yapılırsa" iki sütunlu karşılaştırma.
      //    Sık yapılan bir hatayı gösterip düzeltmesini yan yana koymak için kullanılır.
      {
        tur: 'karsilastirma',
        baslik: 'Doğru mu, Yanlış mı?',
        iyi: {
          baslik: 'Böyle yaz',
          maddeler: [
            'Doğru yaklaşımın ilk maddesi.',
            'Doğru yaklaşımın ikinci maddesi.'
          ]
        },
        kotu: {
          baslik: 'Böyle yazma',
          maddeler: [
            'Sık yapılan hatanın ilk maddesi.',
            'Sık yapılan hatanın ikinci maddesi.'
          ]
        }
      },

      // 5) SOZLUK — terim tanımları grid'i. Genelde bölümün SONUNDA, o bölümde geçen
      //    jargonu (İngilizce terimler dahil) özetlemek için kullanılır.
      {
        tur: 'sozluk',
        baslik: 'Bu Bölümde Geçen Terimler',
        terimler: [
          { terim: 'Terim 1', tanim: 'Sade, tek cümlelik tanım.' },
          { terim: 'Terim 2', tanim: 'Sade, tek cümlelik tanım.' }
        ]
      },

      // 6) OZET — bölümün kapanış slaytı, madde madde "bugün öğrendiklerimiz".
      {
        tur: 'ozet',
        baslik: 'Bu Bölümde Öğrendiklerimiz',
        maddeler: [
          'İlk öğrenilen şey.',
          'İkinci öğrenilen şey.',
          'Üçüncü öğrenilen şey.'
        ]
      }
    ]
  };
</script>
<script src="../engine/slides-engine.js"></script>
</body>
</html>
