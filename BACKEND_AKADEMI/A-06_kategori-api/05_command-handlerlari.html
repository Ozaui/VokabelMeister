public record CategoryTranslationInput(string LanguageCode, string Name, string? Description);

public record CreateCategoryCommand(
    int? ParentCategoryId,
    int DisplayOrder,
    string? Icon,
    string? Color,
    string? MinLevel,
    string? MaxLevel,
    IReadOnlyList<CategoryTranslationInput> Translations
) : IRequest<CategoryDto>
{
    public int? UserId { get; init; }
    public string? ActorRole { get; init; }
}

public async Task<CategoryDto> Handle(CreateCategoryCommand request, CancellationToken ct)
{
    if (request.ParentCategoryId is not null)
        _ =
            await _categoryRepository.GetByIdAsync(request.ParentCategoryId.Value, ct)
            ?? throw new EntityNotFoundException(typeof(Category), request.ParentCategoryId.Value);

    var category = new Category
    {
        ParentCategoryId = request.ParentCategoryId,
        DisplayOrder = request.DisplayOrder,
        Icon = request.Icon,
        Color = request.Color,
        MinLevel = request.MinLevel,
        MaxLevel = request.MaxLevel,
    };

    foreach (var translation in request.Translations)
    {
        var language =
            await _languageRepository.GetByCodeAsync(translation.LanguageCode, ct)
            ?? throw new EntityNotFoundException(typeof(Language), translation.LanguageCode);

        category.Translations.Add(
            new CategoryTranslation
            {
                Language = language,
                Name = translation.Name,
                Description = translation.Description,
                CreatedByUserId = request.UserId,
                UpdatedByUserId = request.UserId,
            }
        );
    }

    await _categoryRepository.AddAsync(category, request.UserId, ct);

    await _activityLogger.LogAsync(
        request.UserId,
        request.ActorRole,
        "CREATE_CATEGORY",
        entityType: "Category",
        entityId: category.Id,
        newValue: new
        {
            category.ParentCategoryId,
            category.DisplayOrder,
            Translations = request.Translations.Select(t => new { t.LanguageCode, t.Name }),
        },
        ct: ct
    );

    return CategoryDtoBuilder.BuildSingle(category);
}`,

        kod: `foreach (var translation in request.Translations)
{
    var language =
        await _languageRepository.GetByCodeAsync(translation.LanguageCode, ct)
        ?? throw new EntityNotFoundException(typeof(Language), translation.LanguageCode);

    var existing = category.Translations.FirstOrDefault(t => t.LanguageId == language.Id);

    if (existing is null)
    {
        category.Translations.Add(
            new CategoryTranslation
            {
                Language = language,
                Name = translation.Name,
                Description = translation.Description,
                CreatedByUserId = request.UserId,
                UpdatedByUserId = request.UserId,
            }
        );
        continue;
    }

    existing.Name = translation.Name;
    existing.Description = translation.Description;
    existing.UpdatedByUserId = request.UserId;
}`,

        kod: `public async Task<Unit> Handle(DeleteCategoryCommand request, CancellationToken ct)

    var category =

        ?? throw new EntityNotFoundException(typeof(Category), request.Id);

    if (await _categoryRepository.HasChildrenAsync(request.Id, ct))

    if (await _categoryRepository.HasActiveWordsAsync(request.Id, ct))
        throw new CategoryHasActiveWordsException();

    await _categoryRepository.SoftDeleteAsync(request.Id, request.UserId, ct);

    await _activityLogger.LogAsync(
        request.UserId,
        request.ActorRole,
        "DELETE_CATEGORY",
        entityType: "Category",
        entityId: request.Id,
        oldValue: new
        {
            category.ParentCategoryId,
            Translations = category.Translations.Select(t => new { LanguageCode = t.Language.Code, t.Name }),
        },
        ct: ct
    );

    return Unit.Value;
}`,
