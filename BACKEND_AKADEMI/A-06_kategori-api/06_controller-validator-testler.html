[Route("api/v1/categories")]
public class CategoriesController : ControllerBase
{
    private readonly IMediator _mediator;

    public CategoriesController(IMediator mediator) => _mediator = mediator;

    private int CurrentUserId => int.Parse(User.FindFirstValue(ClaimTypes.NameIdentifier)!);

    private string? CurrentRole => User.FindFirstValue(ClaimTypes.Role);

    [HttpGet]
    [Authorize]
    [ProducesResponseType(typeof(IReadOnlyList<CategoryDto>), StatusCodes.Status200OK)]
    public async Task<ActionResult<IReadOnlyList<CategoryDto>>> GetCategories(
        [FromQuery] string? level,
        [FromQuery] bool includeWordCount = false,
        CancellationToken ct = default
    )
    {
        var query = new GetCategoriesQuery(level, includeWordCount);
        return Ok(await _mediator.Send(query, ct));
    }

    [HttpGet("{id:int}/words")]
    [Authorize]
    [ProducesResponseType(typeof(PagedResult<WordConceptListItemDto>), StatusCodes.Status200OK)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status404NotFound)]
    public async Task<ActionResult<PagedResult<WordConceptListItemDto>>> GetCategoryWords(
        int id,
        [FromQuery] int page = 1,
        [FromQuery] int pageSize = 20,
        CancellationToken ct = default
    )
    {
        var query = new GetCategoryWordsQuery(id, page, pageSize);
        return Ok(await _mediator.Send(query, ct));
    }

    [HttpPost]
    [Authorize(Roles = "Admin")]
    [ProducesResponseType(typeof(CategoryDto), StatusCodes.Status201Created)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status400BadRequest)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status404NotFound)]
    public async Task<ActionResult<CategoryDto>> CreateCategory(CreateCategoryCommand command, CancellationToken ct)
    {
        var response = await _mediator.Send(
            command with
            {
                UserId = CurrentUserId,
                ActorRole = CurrentRole,
            },
            ct
        );
        return StatusCode(StatusCodes.Status201Created, response);
    }

    [HttpPut("{id:int}")]
    [Authorize(Roles = "Admin")]
    [ProducesResponseType(typeof(CategoryDto), StatusCodes.Status200OK)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status400BadRequest)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status404NotFound)]
    public async Task<ActionResult<CategoryDto>> UpdateCategory(
        int id,
        UpdateCategoryCommand command,
        CancellationToken ct
    ) =>
        Ok(
            await _mediator.Send(
                command with
                {
                    Id = id,
                    UserId = CurrentUserId,
                    ActorRole = CurrentRole,
                },
                ct
            )
        );

    [HttpDelete("{id:int}")]
    [Authorize(Roles = "Admin")]
    [ProducesResponseType(StatusCodes.Status204NoContent)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status404NotFound)]
    [ProducesResponseType(typeof(ApiErrorResponse), StatusCodes.Status409Conflict)]
    public async Task<IActionResult> DeleteCategory(int id, CancellationToken ct)
    {
        await _mediator.Send(new DeleteCategoryCommand(id) { UserId = CurrentUserId, ActorRole = CurrentRole }, ct);
        return NoContent();
    }

// AMAÇ: CreateCategoryCommandValidator ve UpdateCategoryCommandValidator'ın
//       PAYLAŞTIĞI translation doğrulama döngüsü.
internal static class CategoryTranslationRules
{
    public static void ValidateTranslations<T>(
        IReadOnlyList<CategoryTranslationInput> translations,
        ValidationContext<T> context
    )
    {
        foreach (var translation in translations)
        {
            if (string.IsNullOrWhiteSpace(translation.LanguageCode))
            {
                context.AddFailure(Failure("LANGUAGE_CODE_REQUIRED"));
                continue;
            }

            if (string.IsNullOrWhiteSpace(translation.Name))
                context.AddFailure(Failure("CATEGORY_NAME_REQUIRED"));
        }
    }

    private static ValidationFailure Failure(string code) =>
        new("Translations", $"Translation validation failed: {code}.") { ErrorCode = code };
}`,

        kod: `public class DeleteCategoryCommandHandlerTests
{
    private readonly Mock<ICategoryRepository> _categoryRepo = new();
    private readonly Mock<IActivityLogger> _activityLogger = new();

    private DeleteCategoryCommandHandler CreateHandler() => new(_categoryRepo.Object, _activityLogger.Object);

    private static readonly Language German = new() { Id = 1, Code = "de", Name = "German", NativeName = "Deutsch" };

    private static Category ExistingCategory() =>
        new()
        {
            Id = 10,
            Translations = new List<CategoryTranslation>
            {
                new()
                {
                    LanguageId = German.Id,
                    Language = German,
                    Name = "Essen",
                },
            },
        };

    [Fact]
    public async Task Delete_CategoryNotFound_ThrowsEntityNotFoundException()
    {
        // ARRANGE
        _categoryRepo.Setup(r => r.GetWithTranslationsAsync(10, It.IsAny<CancellationToken>())).ReturnsAsync((Category?)null);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new DeleteCategoryCommand(10), default);

        // ASSERT
        await act.Should().ThrowAsync<EntityNotFoundException>();
    }

    [Fact]
    public async Task Delete_HasChildren_ThrowsCategoryHasChildrenException()
    {
        // ARRANGE
        _categoryRepo
            .Setup(r => r.GetWithTranslationsAsync(10, It.IsAny<CancellationToken>()))
            .ReturnsAsync(ExistingCategory());
        _categoryRepo.Setup(r => r.HasChildrenAsync(10, It.IsAny<CancellationToken>())).ReturnsAsync(true);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new DeleteCategoryCommand(10), default);

        // ASSERT
        await act.Should().ThrowAsync<CategoryHasChildrenException>();
        _categoryRepo.Verify(r => r.SoftDeleteAsync(It.IsAny<int>(), It.IsAny<int?>(), It.IsAny<CancellationToken>()), Times.Never);
    }

    [Fact]
    public async Task Delete_HasActiveWords_ThrowsCategoryHasActiveWordsException()
    {
        // ARRANGE
        _categoryRepo
            .Setup(r => r.GetWithTranslationsAsync(10, It.IsAny<CancellationToken>()))

        _categoryRepo.Setup(r => r.HasChildrenAsync(10, It.IsAny<CancellationToken>())).ReturnsAsync(false);
        _categoryRepo.Setup(r => r.HasActiveWordsAsync(10, It.IsAny<CancellationToken>())).ReturnsAsync(true);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new DeleteCategoryCommand(10), default);

        // ASSERT
        await act.Should().ThrowAsync<CategoryHasActiveWordsException>();
        _categoryRepo.Verify(r => r.SoftDeleteAsync(It.IsAny<int>(), It.IsAny<int?>(), It.IsAny<CancellationToken>()), Times.Never);
