      {

      {

      {
        tur: 'kod',
        baslik: 'CategoryConfiguration.cs — CHECK Constraint + Self-Ref FK + Seed',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Data/Configurations/Categories/CategoryConfiguration.cs',
        nedenBuKlasor: 'Data/Configurations/Categories/ — Words/ ile AYNI seviyede, entity klasör yapısını birebir yansıtır.',
        kod: `public class CategoryConfiguration : IEntityTypeConfiguration<Category>
{
    private static readonly DateTime SeedCreatedAt = new(2026, 1, 1, 0, 0, 0, DateTimeKind.Utc);

    public void Configure(EntityTypeBuilder<Category> builder)
    {
        builder.Property(c => c.Icon).HasMaxLength(100);
        builder.Property(c => c.Color).HasMaxLength(10);
        builder.Property(c => c.MinLevel).HasMaxLength(2);
        builder.Property(c => c.MaxLevel).HasMaxLength(2);

        builder.HasIndex(c => c.ParentCategoryId);

        builder
            .HasOne(c => c.ParentCategory)
            .WithMany(c => c.Children)
            .HasForeignKey(c => c.ParentCategoryId)
            .OnDelete(DeleteBehavior.Restrict);

        builder.ToTable(t =>
        {
            t.HasCheckConstraint("CK_Categories_MinLevel", "MinLevel IS NULL OR MinLevel IN ('A1','A2','B1','B2','C1','C2')");
            t.HasCheckConstraint("CK_Categories_MaxLevel", "MaxLevel IS NULL OR MaxLevel IN ('A1','A2','B1','B2','C1','C2')");
        });

        builder.HasData(
            Seed(1, 1, "A1", "#FF6B6B", "people"),
            Seed(2, 2, "A1", "#FF8C42", "family"),
            Seed(3, 3, "A1", "#95E1D3", "food"),
            Seed(4, 4, "A1", "#4ECDC4", "house"),
            Seed(5, 5, "A1", "#AA96DA", "school"),
            Seed(6, 6, "A1", "#FCBAD3", "numbers"),
            Seed(7, 7, "A1", "#A8EDEA", "colors"),
            Seed(8, 8, "A1", "#FFD89B", "time"),
            Seed(9, 9, "A1", "#FB7D5B", "body"),
            Seed(10, 10, "A1", "#84DCC6", "animal"),
            Seed(11, 11, "A2", "#F38181", "work"),
            Seed(12, 12, "A2", "#C7CEEA", "travel")
        );
    }

    private static Category Seed(int id, int displayOrder, string minLevel, string color, string icon) =>
        new()
        {
            Id = id,
            DisplayOrder = displayOrder,
            MinLevel = minLevel,
            Color = color,
            Icon = icon,
            IsActive = true,
            CreatedAt = SeedCreatedAt,
        };
}`,

          {
            satir: '.OnDelete(DeleteBehavior.Restrict);',
            aciklama: 'ParentCategoryId FK\'sı Cascade DEĞİL, Restrict — bir üst kategori silinmeye çalışıldığında, altında hâlâ alt kategori varsa DB bu işlemi REDDEDER.',
            neden: 'WordExample.PairedExampleId (A-05) self-ref FK\'sindeki AYNI karar: SQL Server self-referencing bir FK\'de Cascade seçilirse "multiple cascade paths" hatası riski taşır VE zaten iş kuralı olarak (DeleteCategoryCommand, ileriki bölüm) alt kategorisi olan bir kategorinin silinmesi zaten 409 ile ENGELLENECEK — DB\'deki Restrict, uygulama katmanındaki bu kontrolün DB seviyesindeki son savunma hattı.',
            olmasaydi: 'Cascade olsaydı, bir üst kategori yanlışlıkla silindiğinde TÜM alt ağacı (ve muhtemelen SQL Server\'ın izin vermeyeceği çoklu cascade yolu hatasını) SESSİZCE silerdi — uygulama katmanındaki 409 koruması BYPASS edilebilir bir güvenlik ağı olurdu, DB seviyesinde gerçek bir kilit yoktu demektir.'
          },

            satir: 'private static readonly DateTime SeedCreatedAt = new(2026, 1, 1, 0, 0, 0, DateTimeKind.Utc);',
            aciklama: 'HasData ile eklenen 12 kategori satırının CreatedAt\'i için SABİT bir tarih — DateTime.UtcNow DEĞİL.',
            neden: 'HasData, migration\'ın Up() metoduna gömülen SABİT (derleme zamanında bilinen) değerler üretir — `DateTime.UtcNow` kullansaydık, `dotnet ef migrations add` her çalıştırıldığında (ör. bir sonraki migration\'da model karşılaştırılırken) FARKLI bir CreatedAt üretir, snapshot her seferinde "değişti" görünürdü.',
            olmasaydi: 'DateTime.UtcNow kullanılsaydı, EF Core\'un migration snapshot karşılaştırması her `migrations add` çalıştığında Categories seed verisinde SAHTE bir fark (yalnızca CreatedAt farklı) bulur, gereksiz bir "boş" migration üretilmesine yol AÇARDI.'
          }
        ]
      },
      {
        tur: 'sozluk',
        baslik: 'CategoryTranslationConfiguration.cs + WordCategoryConfiguration.cs — Aynı Deseni İzleyen İki Config',
        terimler: [
          { terim: 'CategoryTranslationConfiguration.cs', tanim: 'LanguageConfiguration/WordConfiguration ile AYNI desen: `(CategoryId, LanguageId)` üzerinde UNIQUE index (bir kategorinin aynı dilde iki adı olamaz), Category\'ye FK Cascade (kategori silinince çevirileri de gider), Language\'a FK Restrict (Language sabit/seed, silinmesi beklenmez). 24 satırlık HasData seed — 12 kategori × 2 dil (de/tr), DATABASE_SCHEMA.md\'deki INSERT sırasıyla birebir.' },
          { terim: 'WordCategoryConfiguration.cs', tanim: '`(WordConceptId, CategoryId)` üzerinde UNIQUE index — aynı kavram aynı kategoriye iki kez eklenemez. Hem WordConcept hem Category\'ye Cascade — ara tablo satırının TEK BAŞINA bir varlık anlamı yok, iki taraftan biri silinince bu bağın da gitmesi doğru (WordConfiguration\'daki WordConcept→Word Cascade\'iyle aynı gerekçe). Seed verisi YOK — hangi kelimenin hangi kategoriye ait olduğu admin panelden (B-04) veya A-07 toplu import\'undan girilecek içerik.' }
        ]
      }
    ]
