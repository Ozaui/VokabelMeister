        kod: `public interface ICategoryRepository : IRepository<Category>
{
    // AMAÇ: \`GET /categories\` için TÜM (silinmemiş) kategorilerin düz listesi —
    //       Translations+Language dahil. Ağaç, bu düz listeden BELLEKTE (CategoryDtoBuilder)

    //       çekmenin EF Core'da doğrudan bir yolu olmadığı için (ParentCategory'yi N kez
    //       zincirlemek gerekirdi) bu, kategori sayısı küçük olduğu sürece (onlarca,
    //       binlerce değil) en basit ve doğru yaklaşım.
    // NEDEN level filtresi burada: MinLevel/MaxLevel düz alan karşılaştırması, join
    //       gerektirmiyor — DB'ye WHERE olarak gönderilmesi ekstra bir sorgu maliyeti
    //       YARATMAZ. Bir kategori, \`level\` NULL ise ya da (MinLevel NULL VEYA
    //       MinLevel<=level) VE (MaxLevel NULL VEYA level<=MaxLevel) ise eşleşir.
    Task<IReadOnlyList<Category>> GetAllWithTranslationsAsync(string? level, CancellationToken ct = default);

    // AMAÇ: Detay/güncelleme — tek bir kategoriyi Translations'ıyla birlikte yükler.
    Task<Category?> GetWithTranslationsAsync(int id, CancellationToken ct = default);

    // AMAÇ: \`includeWordCount=true\` olduğunda her kategorinin bağlı AKTİF (soft-delete

    Task<IReadOnlyDictionary<int, int>> GetWordCountsAsync(CancellationToken ct = default);

    // AMAÇ: \`categoryId\`'nin en az bir alt kategorisi (soft-delete edilmemiş) var mı —

    Task<bool> HasChildrenAsync(int categoryId, CancellationToken ct = default);

    // AMAÇ: \`categoryId\`'ye bağlı en az bir aktif WordConcept var mı — DeleteCategoryCommand'ın
    //       409 koruması (CategoryHasActiveWordsException).
    Task<bool> HasActiveWordsAsync(int categoryId, CancellationToken ct = default);

    // AMAÇ: \`categoryId\`'nin ParentCategoryId'sini \`newParentId\` yapmak bir DÖNGÜ yaratır mı —

    Task<bool> WouldCreateCycleAsync(int categoryId, int newParentId, CancellationToken ct = default);
}`,

      {

        nedenBuKlasor: 'Infrastructure/Repositories/ — WordConceptRepository/LanguageRepository ile AYNI seviyede, flat.',
        kod: `public async Task<IReadOnlyList<Category>> GetAllWithTranslationsAsync(string? level, CancellationToken ct = default)
{
    // NEDEN önce ToListAsync sonra bellekte filtre: MinLevel/MaxLevel karşılaştırması
    // (string.Compare) EF Core'un SQL Server sağlayıcısında GÜVENİLİR şekilde SQL'e
    // çevrilmez (bkz. Repository ICategoryRepository.cs "NEDEN level filtresi burada"
    // notu) — kategori sayısı küçük olduğu için (onlarca) bellekte filtrelemek
    // hem daha güvenli (davranış C#'ın kendi string sıralamasıyla garanti) hem basit.
    var all = await _set
        .Include(c => c.Translations)
        .ThenInclude(t => t.Language)
        .OrderBy(c => c.DisplayOrder)
        .ToListAsync(ct);

    if (string.IsNullOrWhiteSpace(level))
        return all;

    return all.Where(c =>
            (c.MinLevel is null || string.CompareOrdinal(c.MinLevel, level) <= 0)
            && (c.MaxLevel is null || string.CompareOrdinal(level, c.MaxLevel) <= 0)
        )
        .ToList();
}`,

          {
            satir: '.Include(c => c.Translations)',
            aciklama: 'Düz listedeki HER kategori, çevirileriyle (+dil bilgisiyle) BİRLİKTE tek sorguda gelir — bir sonraki bölümdeki CategoryDtoBuilder, her düğüm için AYRICA bir DB sorgusu ATMAZ.',
            neden: 'CategoryDtoBuilder.BuildTree bu düz listeyi bellekte gezip her düğümün \`category.Translations\`\'ına erişiyor — lazy loading bu projede KAPALI (A-05\'in aynı kararı), bu yüzden ihtiyaç duyulacak HER navigation baştan Include edilmek ZORUNDA.',
            olmasaydi: 'Bu Include olmadan \`category.Translations\`\'a erişilmeye çalışılsaydı, EF Core boş bir koleksiyon dönerdi (lazy loading kapalı olduğu için hata bile FIRLATMAZ, sessizce YANLIŞ sonuç verir) — GET /categories yanıtındaki HER kategori adı boş DİZİ olarak görünürdü, hata ayıklaması ZOR bir bug olurdu.'
          },
          {
            satir: '(c.MinLevel is null || string.CompareOrdinal(c.MinLevel, level) <= 0)',
            aciklama: 'Bu satır C# tarafında (LINQ-to-Objects) çalışıyor, SQL\'e ÇEVRİLMİYOR — \`all\` zaten \`ToListAsync\` ile belleğe alınmış durumda, \`.Where\` burada bir DB sorgusu DEĞİL, düz bir C# koleksiyon filtresi.',
            neden: 'EF Core\'un SQL Server sağlayıcısı \`string.CompareOrdinal\`/\`string.Compare\` gibi kültürden bağımsız string karşılaştırma metotlarını GÜVENİLİR şekilde SQL\'e çeviremiyor (bazı EF Core sürümlerinde çalışır görünse de sağlayıcıya göre DAVRANIŞI değişebilir) — "A1" <= "B2" gibi seviye karşılaştırmaları DB\'nin COLLATION ayarına (case-sensitivity, aksan duyarlılığı) bırakılırsa, C#\'ın ordinal karşılaştırmasından FARKLI bir sonuç ÜRETEBİLİR.',
            olmasaydi: 'Bu filtre \`.Where\` içinde EF Core\'a (SQL\'e çevrilmek üzere) BIRAKILSAYDI, dev makinede (LocalDB) çalışan bir sorgu production SQL Server\'da (farklı bir COLLATION ile) SESSİZCE farklı sonuç dönebilirdi — ya da EF Core çeviremediği bir ifadeyle karşılaştığında runtime\'da bir InvalidOperationException FIRLATIRDI.'
          },
          {
            satir: 'var all = await _set',
            aciklama: 'Metodun TEK DB round-trip\'i — filtre uygulanmadan ÖNCE TÜM (silinmemiş) kategoriler tek seferde çekilir.',
            neden: 'Kategori sayısı DATABASE_SCHEMA.md\'nin öngördüğü ölçekte (onlarca, admin panelinden elle girilen içerik) küçük olduğu için tüm tabloyu belleğe almak PAHALI değil — WordConcept\'in binlerce satırlık sayfalı listesinden (GetPagedAsync, A-05) BİLİNÇLİ olarak farklı bir ölçek varsayımı.',
            olmasaydi: 'Kategori sayısı gerçekten binlere ULAŞSAYDI, bu yaklaşım (tüm tabloyu belleğe çekmek) performans SORUNU yaratırdı — ama o noktada dahi çözüm "level filtresini SQL\'e taşı" DEĞİL, "hiyerarşiyi CTE/recursive SQL sorgusuyla DB tarafında kur" olurdu; şu anki veri ölçeğinde bu KARMAŞIKLIK gereksiz.'
          }
        ]
      },
      {
        tur: 'kod',
        baslik: 'CategoryRepository.cs — Silme Koruması Sorguları',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Repositories/CategoryRepository.cs',

        kod: `public Task<bool> HasChildrenAsync(int categoryId, CancellationToken ct = default) =>

        satirlar: [
          {

      {
        tur: 'kod',
        baslik: 'CategoryRepository.cs — WouldCreateCycleAsync (Yukarı Tırmanma)',
        dosyaYolu: 'backend/WordLearner.Infrastructure/Repositories/CategoryRepository.cs',
        nedenBuKlasor: null,
        kod: `public async Task<bool> WouldCreateCycleAsync(int categoryId, int newParentId, CancellationToken ct = default)
{
    var current = (int?)newParentId;
    var visited = new HashSet<int>();

    while (current is not null)
    {
        if (current.Value == categoryId)
            return true;

        // NEDEN visited kontrolü: DB'de zaten bozuk (kendinden önceki bir kod hatasıyla
        // oluşmuş) bir döngü varsa bu ÖNLEM olmadan while sonsuza kadar dönerdi.
        if (!visited.Add(current.Value))
            return false;

        current = await _set.Where(c => c.Id == current.Value).Select(c => c.ParentCategoryId).FirstOrDefaultAsync(ct);
    }

    return false;
}`,
        satirlar: [
          {
            satir: 'var current = (int?)newParentId;',
            aciklama: 'Algoritma AŞAĞIDAN (categoryId\'nin alt ağacını tarayarak) DEĞİL, YUKARIDAN başlar — \`newParentId\`\'den başlayıp onun atalarını (parent\'ının parent\'ını...) TIRMANIR.',
            neden: 'Soru aslında "categoryId, newParentId\'nin bir ATASI mı" sorusuyla EŞDEĞER (bir düğüm kendi atası olamaz) — bunu newParentId\'den yukarı doğru YÜRÜYEREK cevaplamak, categoryId\'nin TÜM alt ağacını (potansiyel olarak çok daha GENİŞ bir küme) aşağı doğru gezmekten çok daha UCUZ: yukarı doğru zincir TEK bir yol (her düğümün TEK ebeveyni var), aşağı doğru ise dallanan bir ağaç.',
            olmasaydi: 'Aşağı doğru (categoryId\'nin Children\'ını recursive gezerek) arama yapılsaydı, derin/geniş bir alt ağaçta HER seviyede birden çok dal aynı anda taranması GEREKİRDİ — yukarı tırmanma ise her adımda TEK bir sonraki düğüme (ParentCategoryId) bakar, en fazla ağacın DERİNLİĞİ kadar adım atar.'
          },
          {
            satir: 'if (current.Value == categoryId)',
            aciklama: 'Tırmanma sırasında atalardan biri TAM OLARAK categoryId\'nin kendisiyse, döngü TESPİT edilmiş demektir — newParentId, categoryId\'nin (doğrudan veya dolaylı) bir ALT kategorisi.',
            neden: 'Bu, UpdateCategoryCommandHandler\'ın (bir sonraki bölüm) sorduğu asıl soru: "Meyve" kategorisini kendi alt kategorisi olan "Turunçgil"in ALTINA taşımaya çalışmak, ağaçta koptu bir DÖNGÜ yaratır — bu satır tam olarak bu senaryoyu YAKALAR.',
            olmasaydi: 'Bu kontrol olmasaydı, "Turunçgil"i "Meyve"nin (kendi atasının) ParentCategoryId\'si yapmak İZİN verilirdi — GetAllWithTranslationsAsync\'ten sonra CategoryDtoBuilder.BuildTree bu döngüyü kurmaya çalıştığında (byParent lookup\'ı sonsuz derinlikte recursive Build çağırır) StackOverflowException ile ÇÖKERDİ.'
          },
          {
            satir: 'if (!visited.Add(current.Value))',
            aciklama: 'HashSet\'e eklenmeye çalışılan bir Id zaten VARSA (\`Add\` false döner), döngü \`false\` ile SESSİZCE durur — categoryId\'ye hiç RASTLANMADAN.',
            neden: 'Bu, "DB\'de zaten bozuk bir döngü varsa" savunması — normalde WouldCreateCycleAsync\'in KENDİSİ her PUT isteğinde yeni döngüleri ENGELLEDİĞİ için DB\'de asla döngü OLUŞMAMASI gerekir, ama migration\'la elle girilen veri/gelecekteki bir bug ihtimaline karşı sonsuz döngüye girmeden \`false\` dönmek, bir 500 hatasından/timeout\'tan daha GÜVENLİ bir başarısızlık modu.',
            olmasaydi: 'Bu kontrol olmadan DB\'de (herhangi bir sebeple) A→B→A gibi bozuk bir zincir OLUŞMUŞ olsaydı, \`while (current is not null)\` döngüsü categoryId\'ye HİÇ rastlamadan sonsuza kadar DÖNER, isteği işleyen thread\'i tıkardı — bir kullanıcı isteği tüm uygulamayı YAVAŞLATABİLİRDİ.'
          },
          {
            satir: 'current = await _set.Where(c => c.Id == current.Value).Select(c => c.ParentCategoryId).FirstOrDefaultAsync(ct);',
            aciklama: 'Her adımda TÜM Category nesnesi DEĞİL, yalnızca ParentCategoryId kolonu \`Select\` ile PROJEKSIYONLANIR — Icon/Color/Translations gibi o an gerek DUYULMAYAN alanlar hiç ÇEKİLMEZ.',
            neden: 'Bu döngü, ağacın DERİNLİĞİ kadar (genelde 2-3 seviye, DATABASE_SCHEMA.md\'nin öngördüğü ölçekte) ayrı bir DB round-trip\'i YAPIYOR — her adımda mümkün olan en KÜÇÜK veriyi çekmek, N adımlık bu döngünün toplam maliyetini MİNİMİZE eder.',
            olmasaydi: '\`Select(c => c.ParentCategoryId)\` yerine \`FirstOrDefaultAsync(c => c.Id == current.Value)\` ile TÜM Category nesnesi çekilseydi, her tırmanma adımı gereksiz yere Icon/Color/MinLevel/MaxLevel gibi hiç KULLANILMAYAN alanları da DB\'den taşırdı — küçük ama gereksiz bir performans MALİYETİ.'
          }
        ]
      },
      {
        tur: 'kavram',
        baslik: 'Neden AutoMapper DEĞİL — CategoryDtoBuilder Elle Yazıldı',

        neden: '\`BuildTree\`\'nin kaynağı TEK bir Category DEĞİL — \`IReadOnlyList<Category> flat\` + bunlardan kurulan bir \`ILookup<int?, Category> byParent\`. AutoMapper\'ın \`CreateMap<TSource,TDest>()\` konvansiyonu, TEK bir kaynak nesnenin alanlarını TEK bir hedef nesnenin alanlarına eşler — burada her düğümün DTO\'sunu üretmek için KOMŞU düğümlerin (byParent lookup\'ındaki kardeşlerinin) bilgisine ihtiyaç var, bu AutoMapper\'ın "kaynak nesnenin kendi alanlarına bakarak eşleştirme yap" modelinin DIŞINDA. Ayrıca \`BuildTree\`\'nin "level filtresinden sonra kalan orphan düğümleri köke terfi ettir" kuralı (\`idSet\`/\`roots\` satırları) tamamen alana özgü bir İŞ KURALI — bir alan eşleştirmesi değil, bir VERİ BÜTÜNLÜĞÜ kararı.',

        kod: `public static IReadOnlyList<CategoryDto> BuildTree(
    IReadOnlyList<Category> flat,
    IReadOnlyDictionary<int, int>? wordCounts
)
{
    var idSet = flat.Select(c => c.Id).ToHashSet();
    var byParent = flat.ToLookup(c => c.ParentCategoryId);

    var roots = flat.Where(c => c.ParentCategoryId is null || !idSet.Contains(c.ParentCategoryId.Value));

    return roots.OrderBy(c => c.DisplayOrder).Select(c => Build(c, byParent, wordCounts)).ToList();
}

    ILookup<int?, Category> byParent,

        wordCounts is null ? null : wordCounts.GetValueOrDefault(category.Id),
        byParent[category.Id]
            .OrderBy(c => c.DisplayOrder)
            .Select(c => Build(c, byParent, wordCounts))
            .ToList()
    );`,
