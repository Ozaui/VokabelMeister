// QrLoginSessionConfiguration.cs
//
// AMAÇ: QrLoginSession entity'sinin EF Core tablo eşlemesini tanımlar.
// NEDEN: QrTokenHash üzerinde her scan/status isteğinde arama yapılır; ExpiresAt
//        üzerindeki index süresi dolmuş kayıtları ayrıştıran sorguları hızlandırır
//        (temizlik job'ı yok — süre lazy olarak okuma anında yorumlanır, bkz. TASK).
//        UserId nullable olduğu için (henüz taranmamış oturumlarda null) FK CASCADE
//        yerine SET NULL kullanılır — kullanıcı silinse bile oturum kaydı audit için kalır.

// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using Microsoft.EntityFrameworkCore.Metadata.Builders;
using WordLearner.Domain.Entities.Auth;
using WordLearner.Domain.Enums.Auth;

namespace WordLearner.Infrastructure.Data.Configurations.Auth;

public class QrLoginSessionConfiguration : IEntityTypeConfiguration<QrLoginSession>
{
    public void Configure(EntityTypeBuilder<QrLoginSession> builder)
    {
        builder.Property(q => q.QrTokenHash).HasMaxLength(88).IsRequired();
        builder.Property(q => q.PairingCode).HasMaxLength(4).IsRequired();

        // NEDEN: Enum DB'de okunabilir bir string olarak tutulur (sayısal index'e bağımlı kalmaz).
        builder
            .Property(q => q.Status)
            .HasConversion<string>()
            .HasMaxLength(20)
            .HasDefaultValue(QrLoginStatus.Pending);

        builder.Property(q => q.RequesterIp).HasMaxLength(45);
        builder.Property(q => q.RequesterDeviceInfo).HasMaxLength(500);

        // NEDEN: Her scan/confirm/deny/status isteğinde token hash'e göre arama yapılır.
        builder.HasIndex(q => q.QrTokenHash);
        // NEDEN: Süresi dolmuş oturumları ayrıştıran sorgular bu index'i kullanır.
        builder.HasIndex(q => q.ExpiresAt);

        builder
            .HasOne(q => q.User)
            .WithMany()
            .HasForeignKey(q => q.UserId)
            .OnDelete(DeleteBehavior.SetNull);

        // NEDEN: Status C# tarafında enum olsa da DB'de string tutulduğu için,
        //        geçersiz bir değer yazılmasını DB seviyesinde engelleyen son savunma hattı.
        builder.ToTable(t =>
        {
            t.HasCheckConstraint(
                "CK_QrLoginSessions_Status",
                "Status IN ('Pending','Scanned','Confirmed','Consumed','Denied','Expired')"
            );
        });
    }
}`

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(
        RequestDelegate next,

    )
    {
        _next = next;

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları İngilizce; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(
                ex,
                "Unhandled exception caught: {Method} {Path}",
                context.Request.Method,
                context.Request.Path
            );

            await WriteErrorResponseAsync(context, ex);

    //        hâlidir (bkz. AppException.cs NEDEN açıklaması). Bilinmeyen her exception'ın
    //        gerçek mesajı istemciye sızdırılmaz (bilgi ifşası riski) — sabit, güvenli
    //        bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "NOT_FOUND"),
            AppException appEx => (StatusCodeFor(appEx), appEx.Code),
            _ => (HttpStatusCode.InternalServerError, "INTERNAL_SERVER_ERROR"),
        };

            EntityNotFoundException => ex.Message,
            AppException appEx => ErrorMessages.Resolve(appEx.Code, RequestLanguageResolver.Resolve(context)),

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(
            response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase }
        );

            AccountNotActiveException => HttpStatusCode.Forbidden,

            InvalidRefreshTokenException => HttpStatusCode.Unauthorized,
            InvalidSocialTokenException => HttpStatusCode.Unauthorized,
##NEW##            QrSessionGoneException => HttpStatusCode.Gone,
##NEW##            QrSessionForbiddenException => HttpStatusCode.Forbidden,

using System.Security.Cryptography;
using MediatR;
using WordLearner.Application.DTOs.Auth;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Application.Interfaces.Services;
using WordLearner.Domain.Entities.Auth;

namespace WordLearner.Application.Features.QrLogin;

// AMAÇ: Oturumu isteyen (web) tarafın IP/cihaz bilgisini taşır — controller
//       action parametresinden değil \`with\` ile eklenir (bkz. RefreshCommand deseni).
public record GenerateQrLoginCommand : IRequest<QrGenerateResponse>
{
    public string? ClientIp { get; init; }
    public string? DeviceInfo { get; init; }
}

public class GenerateQrLoginCommandHandler : IRequestHandler<GenerateQrLoginCommand, QrGenerateResponse>
{
    // NEDEN 2dk: REFERENCE/SECURITY.md §1.3 — QR oturumunun geçerlilik süresi.
    private const int ExpirySeconds = 120;

    private readonly IQrLoginSessionRepository _qrLoginSessionRepository;
    private readonly IPasswordService _passwordService;

    public GenerateQrLoginCommandHandler(
        IQrLoginSessionRepository qrLoginSessionRepository,
        IPasswordService passwordService
    )
    {
        _qrLoginSessionRepository = qrLoginSessionRepository;
        _passwordService = passwordService;
    }

    public async Task<QrGenerateResponse> Handle(GenerateQrLoginCommand request, CancellationToken ct)
    {
        var tokenBytes = new byte[64];
        RandomNumberGenerator.Fill(tokenBytes);
        // NEDEN URL-safe Base64: token doğrudan route'a (/auth/qr/{token}/...) gömülür;
        //       standart Base64'teki '+'/'/' karakterleri path segment'inde sorun çıkarır.
        var qrToken = Convert
            .ToBase64String(tokenBytes)
            .Replace('+', '-')
            .Replace('/', '_')
            .TrimEnd('=');

        // NEDEN RandomNumberGenerator (Random değil): PairingCode kriptografik rastgele
        //       olmasa da (yalnızca gözle karşılaştırma amaçlı) proje genelinde OTP/token
        //       üretiminde tutarlı olarak güvenli rastgelelik kullanılır (bkz. OtpService).
        var pairingCode = RandomNumberGenerator.GetInt32(0, 10_000).ToString("D4");

        var session = new QrLoginSession
        {
            QrTokenHash = _passwordService.HashToken(qrToken),
            PairingCode = pairingCode,
            ExpiresAt = DateTime.UtcNow.AddSeconds(ExpirySeconds),
            RequesterIp = request.ClientIp,
            RequesterDeviceInfo = request.DeviceInfo,
        };
        await _qrLoginSessionRepository.AddAsync(session, ct: ct);

        return new QrGenerateResponse(qrToken, pairingCode, ExpirySeconds);
    }
        }`

public class ScanQrLoginCommandHandler : IRequestHandler<ScanQrLoginCommand, QrScanResponse>
{
    private readonly IQrLoginSessionRepository _qrLoginSessionRepository;
    private readonly IPasswordService _passwordService;

    public ScanQrLoginCommandHandler(

    )

using MediatR;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.DTOs.Auth;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Application.Interfaces.Services;
using WordLearner.Domain.Entities.Auth;
using WordLearner.Domain.Enums.Auth;

namespace WordLearner.Application.Features.QrLogin;

// NEDEN ClientIp init-property: bkz. RefreshCommand — web'in bu isteği attığı
//       IP, telefonun IP'si değil, token üretiminde User.LastLoginIP'ye yazılır.
public record GetQrLoginStatusCommand(string QrToken) : IRequest<QrStatusResponse>
{
    public string? ClientIp { get; init; }
}

public class GetQrLoginStatusCommandHandler : IRequestHandler<GetQrLoginStatusCommand, QrStatusResponse>
{
    private readonly IQrLoginSessionRepository _qrLoginSessionRepository;
    private readonly IPasswordService _passwordService;
    private readonly IUserRepository _userRepository;
    private readonly ILoginCompletionService _loginCompletionService;

    public GetQrLoginStatusCommandHandler(
        IQrLoginSessionRepository qrLoginSessionRepository,
        IPasswordService passwordService,
        IUserRepository userRepository,
        ILoginCompletionService loginCompletionService
    )
    {
        _qrLoginSessionRepository = qrLoginSessionRepository;
        _passwordService = passwordService;
        _userRepository = userRepository;
        _loginCompletionService = loginCompletionService;
    }

    public async Task<QrStatusResponse> Handle(GetQrLoginStatusCommand request, CancellationToken ct)
    {
        var tokenHash = _passwordService.HashToken(request.QrToken);
        var session =
            await _qrLoginSessionRepository.GetByTokenHashAsync(tokenHash, ct)
            ?? throw new EntityNotFoundException(typeof(QrLoginSession), tokenHash);

        if (session.IsExpired(DateTime.UtcNow))
        {
            await _qrLoginSessionRepository.UpdateAsync(session, ct: ct);
            return new QrStatusResponse(session.Status.ToString(), null, null, null, null);
        }

        if (session.Status == QrLoginStatus.Consumed)
            throw new QrSessionGoneException();

        if (session.Status != QrLoginStatus.Confirmed)
            return new QrStatusResponse(session.Status.ToString(), null, null, null, null);

        // NEDEN GetByIdIncludingDeletedAsync (GetByIdAsync DEĞİL): normal login
        //       (LoginCommand/LoginWithGoogle/Apple) kullanıcıyı GetByEmailAsync ile
        //       soft-delete filtresi YOK SAYILARAK bulur, böylece CompleteLoginAsync'in
        //       grace-period kurtarma mantığı çalışabilir. GetByIdAsync (filtreli)
        //       kullanılsaydı, hesabını yeni silmiş bir kullanıcı burada anlamsız bir
        //       404 alırdı — diğer giriş yollarıyla tutarsız bir davranış.
        var user =
            await _userRepository.GetByIdIncludingDeletedAsync(session.UserId!.Value, ct)
            ?? throw new EntityNotFoundException(typeof(User), session.UserId.Value);

        // NEDEN: LoginCommand/LoginWithGoogleCommand/LoginWithAppleCommand'ın hepsi
        //        CompleteLoginAsync'e girmeden önce IsActive kontrolü yapıyor (dondurulmuş
        //        hesap giriş yapamaz) — QR akışının token üretimi de aynı ortak son
        //        adımdan geçtiği için aynı kontrole tabi olmalı.
        if (!user.IsActive)
            throw new AccountNotActiveException();

        var authResponse = await _loginCompletionService.CompleteLoginAsync(user, request.ClientIp, ct);

        session.Status = QrLoginStatus.Consumed;
        await _qrLoginSessionRepository.UpdateAsync(session, user.Id, ct);

        return new QrStatusResponse(
            QrLoginStatus.Confirmed.ToString(),
            authResponse.AccessToken,
            authResponse.RefreshToken,
            authResponse.ExpiresIn,
            authResponse.User
        );
    }
}`

      kod: `// ─────────────────────────────────────────────────────────────────────────────
// GetQrLoginStatusCommandHandlerTests.cs
//
// AMAÇ: GetQrLoginStatusCommandHandler'ın Confirmed'i İLK okuduğunda token
//       üretip Consumed'e geçtiğini, Consumed sonrası tekrar okumanın 410
//       döndüğünü, Expired'ın ise 410 DEĞİL sadece durum bilgisiyle döndüğünü doğrulamak.
// BAĞIMLILIKLAR: xUnit, Moq, FluentAssertions.
// ─────────────────────────────────────────────────────────────────────────────

using FluentAssertions;
using Moq;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.DTOs.Auth;
using WordLearner.Application.Features.QrLogin;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Application.Interfaces.Services;
using WordLearner.Domain.Entities.Auth;
using WordLearner.Domain.Enums.Auth;

// NEDEN bu dosyaya ek testler (2026-07-11, denetim sonrası): GetQrLoginStatusCommandHandler
// artık GetByIdIncludingDeletedAsync kullanıyor (soft-delete filtresi YOK SAYILARAK) ve
// CompleteLoginAsync'ten önce IsActive kontrolü ekliyor — normal login akışlarıyla tutarlılık
// için (bkz. IUserRepository.GetByIdIncludingDeletedAsync NEDEN notu).

namespace WordLearner.Tests.Features.QrLogin;

public class GetQrLoginStatusCommandHandlerTests
{
    private readonly Mock<IQrLoginSessionRepository> _qrRepo = new();
    private readonly Mock<IPasswordService> _passwordService = new();
    private readonly Mock<IUserRepository> _userRepo = new();
    private readonly Mock<ILoginCompletionService> _loginCompletionService = new();

    private GetQrLoginStatusCommandHandler CreateHandler() =>
        new(_qrRepo.Object, _passwordService.Object, _userRepo.Object, _loginCompletionService.Object);

    /// <summary>
    /// GetStatus_ConfirmedSession_CompletesLoginAndConsumesSession
    ///
    /// AMAÇ: Confirmed bir oturum İLK okunduğunda ILoginCompletionService ile token
    ///       üretildiğini, oturumun Consumed'e geçtiğini ve yanıtta token'ların döndüğünü doğrulamak.
    /// </summary>
    [Fact]
    public async Task GetStatus_ConfirmedSession_CompletesLoginAndConsumesSession()
    {
        // ARRANGE
        var user = new User { Id = 5, Email = "test@example.com" };
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Confirmed,
            UserId = 5,
            ExpiresAt = DateTime.UtcNow.AddMinutes(1),
        };
        _passwordService.Setup(p => p.HashToken("token")).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        _userRepo.Setup(r => r.GetByIdIncludingDeletedAsync(5, default)).ReturnsAsync(user);
        var authResponse = new AuthTokenResponse("access", "refresh", 900, new AuthUserDto(5, "A1"), false);
        _loginCompletionService
            .Setup(l => l.CompleteLoginAsync(user, "1.2.3.4", default))
            .ReturnsAsync(authResponse);
        var handler = CreateHandler();

        // ACT
        var result = await handler.Handle(new GetQrLoginStatusCommand("token") { ClientIp = "1.2.3.4" }, default);

        // ASSERT
        result.Status.Should().Be("Confirmed");
        result.AccessToken.Should().Be("access");
        result.RefreshToken.Should().Be("refresh");
        session.Status.Should().Be(QrLoginStatus.Consumed);
        // NEDEN: audit alanı (UpdatedByUserId) token'ı alan kullanıcının Id'siyle doldurulmalı.
        _qrRepo.Verify(r => r.UpdateAsync(session, 5, default), Times.Once);
    }

    /// <summary>
    /// GetStatus_ConfirmedSession_SoftDeletedUserWithinGracePeriod_StillCompletesLogin
    ///
    /// AMAÇ: Kullanıcı QR akışı sırasında soft-delete'li (grace period içinde) olsa bile
    ///       GetByIdIncludingDeletedAsync ile bulunup CompleteLoginAsync'e ulaştığını
    ///       doğrulamak — normal login (GetByEmailAsync, IgnoreQueryFilters) ile aynı
    ///       davranış. Öncesinde GetByIdAsync (filtreli) kullanıldığı için bu senaryoda
    ///       anlamsız bir 404 dönüyordu; bu regresyon testidir.
    /// </summary>
    [Fact]
    public async Task GetStatus_ConfirmedSession_SoftDeletedUserWithinGracePeriod_StillCompletesLogin()
    {
        // ARRANGE
        var user = new User
        {
            Id = 5,
            Email = "test@example.com",
            IsActive = true,
            IsDeleted = true,
            IsAnonymized = false,
        };
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Confirmed,
            UserId = 5,
            ExpiresAt = DateTime.UtcNow.AddMinutes(1),
        };
        _passwordService.Setup(p => p.HashToken("token")).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        _userRepo.Setup(r => r.GetByIdIncludingDeletedAsync(5, default)).ReturnsAsync(user);
        var authResponse = new AuthTokenResponse("access", "refresh", 900, new AuthUserDto(5, "A1"), true);
        _loginCompletionService
            .Setup(l => l.CompleteLoginAsync(user, null, default))
            .ReturnsAsync(authResponse);
        var handler = CreateHandler();

        // ACT
        var result = await handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        result.AccessToken.Should().Be("access");
        session.Status.Should().Be(QrLoginStatus.Consumed);
    }

    /// <summary>
    /// GetStatus_ConfirmedSession_InactiveUser_ThrowsAccountNotActiveExceptionWithoutCompletingLogin
    ///
    /// AMAÇ: Kullanıcı dondurulmuşsa (IsActive=false) CompleteLoginAsync'e hiç
    ///       ulaşılmadan AccountNotActiveException fırlatıldığını ve oturumun
    ///       Consumed'e geçmediğini doğrulamak — LoginCommand/LoginWithGoogle/Apple
    ///       ile aynı kontrol.
    /// </summary>
    [Fact]
    public async Task GetStatus_ConfirmedSession_InactiveUser_ThrowsAccountNotActiveExceptionWithoutCompletingLogin()
    {
        // ARRANGE
        var user = new User { Id = 5, Email = "test@example.com", IsActive = false };
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Confirmed,
            UserId = 5,
            ExpiresAt = DateTime.UtcNow.AddMinutes(1),
        };
        _passwordService.Setup(p => p.HashToken("token")).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        _userRepo.Setup(r => r.GetByIdIncludingDeletedAsync(5, default)).ReturnsAsync(user);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        await act.Should().ThrowAsync<AccountNotActiveException>();
        session.Status.Should().Be(QrLoginStatus.Confirmed);
        _loginCompletionService.Verify(
            l => l.CompleteLoginAsync(It.IsAny<User>(), It.IsAny<string?>(), default),
            Times.Never
        );
    }

    /// <summary>
    /// GetStatus_ConfirmedSession_AnonymizedUser_PropagatesExceptionWithoutConsumingSession
    ///
    /// AMAÇ: CompleteLoginAsync (kullanıcı anonimleştirilmişse) AccountAnonymizedException
    ///       fırlatırsa, bu exception'ın yutulmadan yukarı taşındığını VE oturumun
    ///       Consumed'e geçirilmediğini (token hiç üretilmediği için) doğrulamak.
    /// </summary>
    [Fact]
    public async Task GetStatus_ConfirmedSession_AnonymizedUser_PropagatesExceptionWithoutConsumingSession()
    {
        // ARRANGE
        var user = new User { Id = 5, Email = "test@example.com", IsActive = true, IsAnonymized = true };
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Confirmed,
            UserId = 5,
            ExpiresAt = DateTime.UtcNow.AddMinutes(1),
        };
        _passwordService.Setup(p => p.HashToken("token")).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        _userRepo.Setup(r => r.GetByIdIncludingDeletedAsync(5, default)).ReturnsAsync(user);
        _loginCompletionService
            .Setup(l => l.CompleteLoginAsync(user, null, default))
            .ThrowsAsync(new AccountAnonymizedException());
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        await act.Should().ThrowAsync<AccountAnonymizedException>();
        session.Status.Should().Be(QrLoginStatus.Confirmed);
        _qrRepo.Verify(r => r.UpdateAsync(session, It.IsAny<int?>(), default), Times.Never);
    }

    /// <summary>
    /// GetStatus_ConsumedSession_ThrowsQrSessionGoneException
    ///
    /// AMAÇ: Token'lar bir kez döndükten sonra (Consumed) aynı oturum TEKRAR
    ///       okunmaya çalışılırsa QrSessionGoneException (410) fırlatıldığını doğrulamak.
    /// </summary>
    [Fact]
    public async Task GetStatus_ConsumedSession_ThrowsQrSessionGoneException()
    {
        // ARRANGE
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Consumed,
            ExpiresAt = DateTime.UtcNow.AddMinutes(1),
        };
        _passwordService.Setup(p => p.HashToken(It.IsAny<string>())).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        await act.Should().ThrowAsync<QrSessionGoneException>();
        _loginCompletionService.Verify(
            l => l.CompleteLoginAsync(It.IsAny<User>(), It.IsAny<string?>(), default),
            Times.Never
        );
    }

    /// <summary>
    /// GetStatus_PendingSession_ReturnsStatusOnlyWithoutTokens
    ///
    /// AMAÇ: Henüz Confirmed olmayan bir oturum için yalnızca Status alanının
    ///       dolduğunu, token alanlarının null döndüğünü doğrulamak.
    /// </summary>
    [Fact]
    public async Task GetStatus_PendingSession_ReturnsStatusOnlyWithoutTokens()
    {
        // ARRANGE
        var session = new QrLoginSession { Status = QrLoginStatus.Pending, ExpiresAt = DateTime.UtcNow.AddMinutes(1) };
        _passwordService.Setup(p => p.HashToken(It.IsAny<string>())).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        var handler = CreateHandler();

        // ACT
        var result = await handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        result.Status.Should().Be("Pending");
        result.AccessToken.Should().BeNull();
    }

    /// <summary>
    /// GetStatus_ExpiredSession_ReturnsExpiredStatusWithoutThrowing
    ///
    /// AMAÇ: ExpiresAt geçmiş bir oturum sorgulandığında 410 DEĞİL, 200 +
    ///       {status:"Expired"} döndüğünü doğrulamak — web bunu "yeni QR üret"
    ///       sinyali olarak kullanır, henüz hiçbir token sızmadığı için "gone" değildir.
    /// </summary>
    [Fact]
    public async Task GetStatus_ExpiredSession_ReturnsExpiredStatusWithoutThrowing()
    {
        // ARRANGE
        var session = new QrLoginSession
        {
            Status = QrLoginStatus.Pending,
            ExpiresAt = DateTime.UtcNow.AddMinutes(-1),
        };
        _passwordService.Setup(p => p.HashToken(It.IsAny<string>())).Returns("hash");
        _qrRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(session);
        var handler = CreateHandler();

        // ACT
        var result = await handler.Handle(new GetQrLoginStatusCommand("token"), default);

        // ASSERT
        result.Status.Should().Be("Expired");
        session.Status.Should().Be(QrLoginStatus.Expired);
    }

    /// <summary>
    /// GetStatus_TokenNotFound_ThrowsEntityNotFoundException
    ///
    /// AMAÇ: Hash'e karşılık gelen bir oturum bulunamazsa EntityNotFoundException (404) fırlatıldığını doğrulamak.
    /// </summary>
    [Fact]
    public async Task GetStatus_TokenNotFound_ThrowsEntityNotFoundException()
    {
        // ARRANGE
        _passwordService.Setup(p => p.HashToken("gecersiz-token")).Returns("opaque-sha256-abc123");
        _qrRepo
            .Setup(r => r.GetByTokenHashAsync("opaque-sha256-abc123", default))
            .ReturnsAsync((QrLoginSession?)null);
        var handler = CreateHandler();

        // ACT
        var act = () => handler.Handle(new GetQrLoginStatusCommand("gecersiz-token"), default);

        // ASSERT
        var sonuc = await act.Should().ThrowAsync<EntityNotFoundException>();
        // NEDEN: exception mesajı ham token'ı DEĞİL, hash'ini taşımalı — bkz. ScanQrLoginCommandHandlerTests.
        sonuc.Which.Message.Should().NotContain("gecersiz-token");
        sonuc.Which.Message.Should().Contain("opaque-sha256-abc123");
    }
}`,
