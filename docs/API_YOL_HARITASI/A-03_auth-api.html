// WordLearnerDbContext.cs
//
// AMAÇ: EF Core'un veritabanıyla konuştuğu merkezi DbContext sınıfı.
// NEDEN: Tüm entity konfigürasyonlarını tek yerden yükler; soft delete global filtresi
//        ile silinmiş kayıtların sorgulara otomatik karışmasını önler; SaveChangesAsync
//        override'ı UpdatedAt alanını elle set etme zorunluluğunu ortadan kaldırır.
// BAĞIMLILIKLAR: Microsoft.EntityFrameworkCore, WordLearner.Domain.Entities.BaseEntity.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data;

public class WordLearnerDbContext : DbContext
{
    // AMAÇ: DI tarafından enjekte edilen seçenekleri (connection string vb.) taban sınıfa iletir.
    // NEDEN: EF Core'un standart constructor kalıbı; farklı ortamlar (dev/prod/test) için
    //        farklı seçenek setleri enjekte edilebilir.
    public WordLearnerDbContext(DbContextOptions<WordLearnerDbContext> options)
        : base(options) { }

    // AMAÇ: Kullanıcı hesapları (A-03 — Auth API).
    public DbSet<User> Users => Set<User>();

    // AMAÇ: Kullanıcıların refresh token geçmişi (A-03 — Auth API).
    public DbSet<RefreshToken> RefreshTokens => Set<RefreshToken>();

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // AMAÇ: Infrastructure assembly'sindeki tüm IEntityTypeConfiguration<T> sınıflarını
        //       otomatik olarak tarar ve uygular.
        // NEDEN: Her entity için tek tek modelBuilder.ApplyConfiguration(...) çağırmak yerine
        //        assembly taraması yaparız; yeni entity eklendikçe bu satır değişmez.
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

        // AMAÇ: BaseEntity'den türeyen tüm entity'lere global soft delete filtresi uygular.
        // NEDEN: IsDeleted == true olan kayıtlar hiçbir sorguda görünmez; her sorguda
        //        .Where(e => !e.IsDeleted) yazmak zorunda kalmayız.
        //        IgnoreQueryFilters() ile gerektiğinde (admin silinen kayıtları görme) bypass edilir.
        foreach (var entityType in modelBuilder.Model.GetEntityTypes())
        {
            if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
            {
                var parameter = System.Linq.Expressions.Expression.Parameter(
                    entityType.ClrType,
                    "e"
                );
                var property = System.Linq.Expressions.Expression.Property(
                    parameter,
                    nameof(BaseEntity.IsDeleted)
                );
                var notDeleted = System.Linq.Expressions.Expression.Not(property);
                var lambda = System.Linq.Expressions.Expression.Lambda(notDeleted, parameter);
                modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
            }
        }

        base.OnModelCreating(modelBuilder);
    }

    // AMAÇ: Her kayıt güncellendiğinde UpdatedAt alanını otomatik olarak UTC şimdiki zamana set eder.
    // NEDEN: Servis veya repository katmanında her entity.UpdatedAt = DateTime.UtcNow yazmak
    //        kod tekrarına yol açar; bu override ile merkezi olarak yönetilir.
    public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
    {
        foreach (var entry in ChangeTracker.Entries<BaseEntity>())
        {
            if (entry.State == EntityState.Modified)
                entry.Entity.UpdatedAt = DateTime.UtcNow;

            // NEDEN: Yeni eklenen entity'lerde CreatedAt varsayılan olarak DateTime.UtcNow ile
            //        başlatılıyor (BaseEntity'de); UpdatedAt ise burada dokunulmadığı için
            //        insert sonrası null kalır — "hiç güncellenmedi" bilgisini korur.
        }

        return base.SaveChangesAsync(cancellationToken);
    }
}`

// UserConfiguration.cs
//
// AMAÇ: User entity'sinin EF Core tablo eşlemesini (kolon uzunlukları, index'ler,
//       CHECK constraint'leri) tanımlar.
// NEDEN: DATABASE_SCHEMA/Auth.md'deki Users şemasıyla birebir eşleşen kısıtları
//        kod tarafında da uygulamak için — ör. Email UNIQUE, Role/CurrentLevel/
//        AuthProvider yalnızca izinli değerleri alabilir.
// BAĞIMLILIKLAR: EF Core, User entity, OtpPurpose enum.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using Microsoft.EntityFrameworkCore.Metadata.Builders;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data.Configurations;

public class UserConfiguration : IEntityTypeConfiguration<User>
{
    public void Configure(EntityTypeBuilder<User> builder)
    {
        builder.Property(u => u.Email).HasMaxLength(254).IsRequired();
        // NEDEN: Aynı e-posta ile birden fazla hesap açılmasını DB seviyesinde engeller.
        builder.HasIndex(u => u.Email).IsUnique();

        builder.Property(u => u.PasswordHash).HasMaxLength(60);
        builder.Property(u => u.GoogleId).HasMaxLength(255);
        builder.Property(u => u.AppleId).HasMaxLength(255);
        builder.Property(u => u.AuthProvider).HasMaxLength(20).HasDefaultValue("Local");

        builder.Property(u => u.FirstName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.LastName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.DisplayName).HasMaxLength(100);
        builder.Property(u => u.AvatarUrl).HasMaxLength(500);

        builder.Property(u => u.DailyWordGoal).HasDefaultValue(10);
        builder.Property(u => u.DailyNewWordLimit).HasDefaultValue(5);
        builder.Property(u => u.CurrentLevel).HasMaxLength(2).HasDefaultValue("A1");

        builder.Property(u => u.PendingOtpCodeHash).HasMaxLength(88);
        // NEDEN: Enum DB'de okunabilir bir string olarak tutulur (sayısal index'e bağımlı kalmaz).
        builder.Property(u => u.PendingOtpCodePurpose).HasConversion<string>().HasMaxLength(20);

        builder.Property(u => u.IsActive).HasDefaultValue(true);
        builder.Property(u => u.LastLoginIP).HasMaxLength(45);
        builder.Property(u => u.OriginalEmailHash).HasMaxLength(88);
        builder.Property(u => u.OneSignalPlayerId).HasMaxLength(100);
        builder.Property(u => u.Role).HasMaxLength(20).HasDefaultValue("User");

        builder.HasIndex(u => u.Role);
        builder.HasIndex(u => u.GoogleId);
        builder.HasIndex(u => u.AppleId);

        // NEDEN: Bu üç alan, C# tarafında enum yerine string tutulduğu için
        //        geçersiz değer yazılmasını DB seviyesinde engelleyen son savunma hattı.
        builder.ToTable(t =>
        {
            t.HasCheckConstraint("CK_Users_Level", "CurrentLevel IN ('A1','A2','B1','B2','C1','C2')");
            t.HasCheckConstraint("CK_Users_Role", "Role IN ('User','Admin')");
            t.HasCheckConstraint("CK_Users_AuthProvider", "AuthProvider IN ('Local','Google','Apple')");
        });
    }
}`

using Microsoft.EntityFrameworkCore;
using Microsoft.EntityFrameworkCore.Metadata.Builders;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data.Configurations;

public class RefreshTokenConfiguration : IEntityTypeConfiguration<RefreshToken>
{
    public void Configure(EntityTypeBuilder<RefreshToken> builder)
    {
        builder.Property(r => r.TokenHash).HasMaxLength(88).IsRequired();
        builder.Property(r => r.TokenFamily).HasMaxLength(36).IsRequired();
        builder.Property(r => r.DeviceInfo).HasMaxLength(500);

        // NEDEN: Replay tespitinde aynı family'deki tüm token'lar tek sorguda bulunur.
        builder.HasIndex(r => r.TokenFamily);

        builder
            .HasOne(r => r.User)
            .WithMany(u => u.RefreshTokens)
            .HasForeignKey(r => r.UserId)
            .OnDelete(DeleteBehavior.Cascade);
    }

    {
      num: 9, tur: 'service',
      baslik: 'PasswordService.cs', dosya: 'Application/Services/PasswordService.cs',
      aciklama: 'ASP.NET Identity kullanılmadığı için (SECURITY.md §1) şifre hash\'leme manuel yazıldı. Work factor 12, TECHNICAL_SPECIFICATIONS.md §6\'da pinlenen değer — 10\'dan güvenli, 14+\'ten hızlı; her login isteğinde kabul edilebilir bir gecikme (~200-300ms) verir. HashToken şifre değil (zaten yüksek entropili rastgele veri) olduğu için BCrypt yerine hızlı SHA-256 kullanır — RefreshToken ve OTP kodları için aynı metot paylaşılır (kod tekrarı yok). ApplicationServiceExtensions\'a Scoped olarak kaydedildi.',
      kod: `// ─────────────────────────────────────────────────────────────────────────────
// PasswordService.cs
//
// AMAÇ: IPasswordService'in BCrypt (şifre) + SHA-256 (token) tabanlı implementasyonu.
// NEDEN: ASP.NET Identity kullanılmadığı için (REFERENCE/SECURITY.md §1) şifre
//        hash'leme manuel yazılır; work factor 12, saldırganın brute-force
//        maliyetini kabul edilebilir ölçüde artırırken login gecikmesini makul tutar.
// BAĞIMLILIKLAR: BCrypt.Net-Next, System.Security.Cryptography (SHA256).
// ─────────────────────────────────────────────────────────────────────────────

using System.Security.Cryptography;
using System.Text;
using WordLearner.Application.Interfaces.Services;

namespace WordLearner.Application.Services;

public class PasswordService : IPasswordService
{
    // NEDEN 12: REFERENCE/TECHNICAL_SPECIFICATIONS.md §6'da pinlenen değer — 10'dan güvenli,
    //        14+'ten hızlı; her login isteğinde kabul edilebilir bir gecikme (~200-300ms) verir.
    private const int WorkFactor = 12;

    // AMAÇ: Düz metin şifreyi BCrypt ile hash'ler (60 karakter, otomatik rastgele salt).
    public string Hash(string password) =>
        BCrypt.Net.BCrypt.HashPassword(password, workFactor: WorkFactor);

    // AMAÇ: Düz metin şifreyi mevcut hash ile constant-time karşılaştırır.
    // NEDEN: BCrypt.Verify salt'ı hash içinden kendi çıkarır, work factor'e bakılmaksızın çalışır.
    public bool Verify(string password, string hash) => BCrypt.Net.BCrypt.Verify(password, hash);

    // AMAÇ: Refresh token / OTP kodu gibi rastgele üretilen değerleri SHA-256 ile hash'ler.
    // NEDEN: Bu değerler şifre değildir (zaten yüksek entropili rastgele veridir), bu yüzden
    //        BCrypt'in yavaş/salt'lı tasarımına ihtiyaç yoktur — SHA-256 hızlı ve yeterlidir;
    //        RefreshTokens.TokenHash ve Users.PendingOtpCodeHash bu metotla üretilir.
    public string HashToken(string token)
    {
        var bytes = SHA256.HashData(Encoding.UTF8.GetBytes(token));
        return Convert.ToBase64String(bytes);
    }
}`

// ApplicationServiceExtensions.cs
//
// AMAÇ: Application katmanına ait tüm servisleri (MediatR, AutoMapper, FluentValidation)
//       DI konteynerine kaydetmek için Program.cs'den çağrılan tek extension metot.
// NEDEN: Program.cs'i temiz tutar; InfrastructureServiceExtensions'ın Application
//        katmanındaki karşılığıdır — yeni bir validator/handler/mapping profili
//        eklenince yalnızca assembly taraması sayesinde otomatik kaydolur, Program.cs'e dokunulmaz.
// BAĞIMLILIKLAR: MediatR, AutoMapper, FluentValidation.DependencyInjectionExtensions.
// ─────────────────────────────────────────────────────────────────────────────

using FluentValidation;
using MediatR;
using Microsoft.Extensions.DependencyInjection;
using WordLearner.Application.Interfaces.Services;
using WordLearner.Application.Services;

namespace WordLearner.Application.Extensions;

public static class ApplicationServiceExtensions
{
    // AMAÇ: MediatR handler'larını, AutoMapper profillerini ve FluentValidation
    //       validator'larını Application katmanı assembly'sinden tarayıp kaydeder.
    // NEDEN: Henüz (A-02) hiçbir feature command/handler/validator yazılmadığı için
    //        somut bir tip yerine bu extension'ın bulunduğu assembly referans alınır;
    //        A-03'ten itibaren eklenecek her CreateWordCommand/CreateWordCommandValidator
    //        vb. otomatik olarak bulunur, tek tek kayıt gerekmez.
    public static IServiceCollection AddApplicationServices(this IServiceCollection services)
    {
        var applicationAssembly = typeof(ApplicationServiceExtensions).Assembly;

        // NEDEN MediatR: Controller'lar servisleri doğrudan çağırmak yerine
        //       IMediator.Send(command/query) ile çağırır; controller ince katman kalır.
        services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(applicationAssembly));

        // NEDEN AutoMapper: Entity ↔ DTO dönüşümlerini elle yazmak yerine profil
        //       sınıflarına (Profile) devreder; her feature kendi profilini ekler.
        services.AddAutoMapper(applicationAssembly);

        // NEDEN FluentValidation: Request DTO'larının doğrulama kuralları (RuleFor)
        //       controller'a girmeden, ASP.NET Core'un model binding aşamasında çalışır.
        services.AddValidatorsFromAssembly(applicationAssembly);

        // NEDEN Scoped: Stateless bir servis olduğu için Singleton da olabilirdi, ama
        //       diğer Application servisleriyle (DbContext'e bağımlı olacaklar) tutarlı
        //       yaşam süresi için Scoped seçildi (A-03 — Auth API).
        services.AddScoped<IPasswordService, PasswordService>();

        return services;
    }
}`
