// WordLearnerDbContext.cs
//
// AMAÇ: EF Core'un veritabanıyla konuştuğu merkezi DbContext sınıfı.

using Microsoft.EntityFrameworkCore;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data;

public class WordLearnerDbContext : DbContext
{
    // AMAÇ: DI tarafından enjekte edilen seçenekleri (connection string vb.) taban sınıfa iletir.
    // NEDEN: EF Core'un standart constructor kalıbı; farklı ortamlar (dev/prod/test) için
    //        farklı seçenek setleri enjekte edilebilir.
    public WordLearnerDbContext(DbContextOptions<WordLearnerDbContext> options)
        : base(options) { }

##NEW##    // AMAÇ: Kullanıcı hesapları (A-03 — Auth API).
##NEW##    public DbSet<User> Users => Set<User>();
##NEW##
##NEW##    // AMAÇ: Kullanıcıların refresh token geçmişi (A-03 — Auth API).
##NEW##    public DbSet<RefreshToken> RefreshTokens => Set<RefreshToken>();

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // AMAÇ: Infrastructure assembly'sindeki tüm IEntityTypeConfiguration<T> sınıflarını
        //       otomatik olarak tarar ve uygular.
        // NEDEN: Her entity için tek tek modelBuilder.ApplyConfiguration(...) çağırmak yerine
        //        assembly taraması yaparız; yeni entity eklendikçe bu satır değişmez.
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

        // AMAÇ: BaseEntity'den türeyen tüm entity'lere global soft delete filtresi uygular.
        // NEDEN: IsDeleted == true olan kayıtlar hiçbir sorguda görünmez; her sorguda
        //        .Where(e => !e.IsDeleted) yazmak zorunda kalmayız.
        //        IgnoreQueryFilters() ile gerektiğinde (admin silinen kayıtları görme) bypass edilir.
        foreach (var entityType in modelBuilder.Model.GetEntityTypes())
        {
            if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
            {
                var parameter = System.Linq.Expressions.Expression.Parameter(
                    entityType.ClrType,
                    "e"
                );
                var property = System.Linq.Expressions.Expression.Property(
                    parameter,
                    nameof(BaseEntity.IsDeleted)
                );
                var notDeleted = System.Linq.Expressions.Expression.Not(property);
                var lambda = System.Linq.Expressions.Expression.Lambda(notDeleted, parameter);
                modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
            }
        }

        base.OnModelCreating(modelBuilder);
    }

    // AMAÇ: Her kayıt güncellendiğinde UpdatedAt alanını otomatik olarak UTC şimdiki zamana set eder.
    // NEDEN: Servis veya repository katmanında her entity.UpdatedAt = DateTime.UtcNow yazmak
    //        kod tekrarına yol açar; bu override ile merkezi olarak yönetilir.
    public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
    {
        foreach (var entry in ChangeTracker.Entries<BaseEntity>())
        {
            if (entry.State == EntityState.Modified)
                entry.Entity.UpdatedAt = DateTime.UtcNow;

            // NEDEN: Yeni eklenen entity'lerde CreatedAt varsayılan olarak DateTime.UtcNow ile
            //        başlatılıyor (BaseEntity'de); UpdatedAt ise burada dokunulmadığı için
            //        insert sonrası null kalır — "hiç güncellenmedi" bilgisini korur.
        }

        return base.SaveChangesAsync(cancellationToken);
    }
}`

// UserConfiguration.cs
//
// AMAÇ: User entity'sinin EF Core tablo eşlemesini (kolon uzunlukları, index'ler,
//       CHECK constraint'leri) tanımlar.
// NEDEN: DATABASE_SCHEMA/Auth.md'deki Users şemasıyla birebir eşleşen kısıtları
//        kod tarafında da uygulamak için — ör. Email UNIQUE, Role/CurrentLevel/
//        AuthProvider yalnızca izinli değerleri alabilir.
// BAĞIMLILIKLAR: EF Core, User entity, OtpPurpose enum.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using Microsoft.EntityFrameworkCore.Metadata.Builders;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data.Configurations;

public class UserConfiguration : IEntityTypeConfiguration<User>
{
    public void Configure(EntityTypeBuilder<User> builder)
    {
        builder.Property(u => u.Email).HasMaxLength(254).IsRequired();
        // NEDEN: Aynı e-posta ile birden fazla hesap açılmasını DB seviyesinde engeller.
        builder.HasIndex(u => u.Email).IsUnique();

        builder.Property(u => u.PasswordHash).HasMaxLength(60);
        builder.Property(u => u.GoogleId).HasMaxLength(255);
        builder.Property(u => u.AppleId).HasMaxLength(255);
        builder.Property(u => u.AuthProvider).HasMaxLength(20).HasDefaultValue("Local");

        builder.Property(u => u.FirstName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.LastName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.DisplayName).HasMaxLength(100);
        builder.Property(u => u.AvatarUrl).HasMaxLength(500);

        builder.Property(u => u.DailyWordGoal).HasDefaultValue(10);
        builder.Property(u => u.DailyNewWordLimit).HasDefaultValue(5);
        builder.Property(u => u.CurrentLevel).HasMaxLength(2).HasDefaultValue("A1");

        builder.Property(u => u.PendingOtpCodeHash).HasMaxLength(88);
        // NEDEN: Enum DB'de okunabilir bir string olarak tutulur (sayısal index'e bağımlı kalmaz).
        builder.Property(u => u.PendingOtpCodePurpose).HasConversion<string>().HasMaxLength(20);

        builder.Property(u => u.IsActive).HasDefaultValue(true);
        builder.Property(u => u.LastLoginIP).HasMaxLength(45);
        builder.Property(u => u.OriginalEmailHash).HasMaxLength(88);
        builder.Property(u => u.OneSignalPlayerId).HasMaxLength(100);
        builder.Property(u => u.Role).HasMaxLength(20).HasDefaultValue("User");

        builder.HasIndex(u => u.Role);
        builder.HasIndex(u => u.GoogleId);
        builder.HasIndex(u => u.AppleId);

        // NEDEN: Bu üç alan, C# tarafında enum yerine string tutulduğu için
        //        geçersiz değer yazılmasını DB seviyesinde engelleyen son savunma hattı.
        builder.ToTable(t =>
        {
            t.HasCheckConstraint("CK_Users_Level", "CurrentLevel IN ('A1','A2','B1','B2','C1','C2')");
            t.HasCheckConstraint("CK_Users_Role", "Role IN ('User','Admin')");
            t.HasCheckConstraint("CK_Users_AuthProvider", "AuthProvider IN ('Local','Google','Apple')");
        });
    }
}`

        builder.HasIndex(r => r.TokenFamily);

        builder
            .HasOne(r => r.User)
            .WithMany(u => u.RefreshTokens)
            .HasForeignKey(r => r.UserId)
            .OnDelete(DeleteBehavior.Cascade);
    }

using System.Security.Cryptography;

            new Claim(ClaimTypes.Email, user.Email),
            new Claim(ClaimTypes.Role, user.Role),
            new Claim("firstName", user.FirstName),

        var expirationMinutes = _configuration.GetValue("Jwt:ExpirationMinutes", 15);

            issuer: _configuration["Jwt:Issuer"],
            audience: _configuration["Jwt:Audience"],
            claims: claims,
            expires: DateTime.UtcNow.AddMinutes(expirationMinutes),

        var days = _configuration.GetValue("Jwt:RefreshTokenExpirationDays", 7);

    //        token'ın header'ındaki algoritmanın gerçekten HS256 olduğunu kontrol et
    //        (Algorithm Confusion önlemi — TECHNICAL_SPECIFICATIONS.md §5)  3) Geçersizse null dön.
    public ClaimsPrincipal? GetPrincipalFromExpiredToken(string token)
    {
        var key = new SymmetricSecurityKey(
            Encoding.UTF8.GetBytes(_configuration["Jwt:SecretKey"]!)
        );
        var validationParameters = new TokenValidationParameters
        {
            ValidateIssuerSigningKey = true,
            IssuerSigningKey = key,
            ValidateIssuer = false,
            ValidateAudience = false,
            ValidateLifetime = false,
        };

        try
        {
            var principal = new JwtSecurityTokenHandler().ValidateToken(
                token,
                validationParameters,
                out var validatedToken
            );

            // NEDEN: Saldırgan "alg: none" veya asimetrik bir algoritmaya geçirilmiş bir token
            //        sunarsa, ValidateToken bunu SecretKey ile doğrulamadan geçirebilir —
            //        bu yüzden doğrulanan token'ın header'ında GERÇEKTEN HS256 kullanıldığı
            //        elle teyit edilir (Algorithm Confusion Attack önlemi).
            if (
                validatedToken is not JwtSecurityToken jwtToken
                || !jwtToken.Header.Alg.Equals(
                    SecurityAlgorithms.HmacSha256,
                    StringComparison.OrdinalIgnoreCase
                )
            )
                return null;

            return principal;
        }
        catch
        {
            return null;
        }
    }

using System.Net;
using System.Text.Json;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Common.Localization;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Middleware;

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(
        RequestDelegate next,
        ILogger<ExceptionHandlingMiddleware> logger
    )
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları Türkçe; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(
                ex,
                "İşlenmemiş hata yakalandı: {Method} {Path}",
                context.Request.Method,
                context.Request.Path
            );

            await WriteErrorResponseAsync(context, ex);

    //        Code'un isteğin diline (Accept-Language) göre ErrorMessages'ten çözülmüş
    //        hâlidir (bkz. AppException.cs NEDEN açıklaması). Bilinmeyen her exception'ın
    //        gerçek mesajı istemciye sızdırılmaz (bilgi ifşası riski) — sabit, güvenli
    //        bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "BULUNAMADI"),
            AppException appEx => (StatusCodeFor(appEx), appEx.Code),
            _ => (HttpStatusCode.InternalServerError, "SUNUCU_HATASI"),

        // NEDEN: EntityNotFoundException'ın mesajı dinamiktir (entity adı içerir),
        //        doğrudan ex.Message kullanılır. AppException'lar Code üzerinden
        //        isteğin diline göre çözülür. SUNUCU_HATASI ise hiçbir zaman gerçek
        //        exception mesajını sızdırmaz, sabit bir metin döner.
        var message = ex switch
        {
            EntityNotFoundException => ex.Message,
            AppException appEx => ErrorMessages.Resolve(appEx.Code, GetRequestLanguage(context)),
            _ => "Beklenmeyen bir hata oluştu.",
        };

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(
            response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase }
        );

        return context.Response.WriteAsync(json);
    }

    // AMAÇ: Her AppException alt tipini kendi HTTP durum koduna eşler.
    // NEDEN: Kod (Code) ile HTTP durumu ayrı kavramlar — aynı Code farklı senaryoda
    //        farklı statü dönebilir ihtimaline karşı, statü ayrı bir switch'te tutulur.
    private static HttpStatusCode StatusCodeFor(AppException ex) =>
        ex switch
        {
            DuplicateEmailException => HttpStatusCode.Conflict,
            InvalidCredentialsException => HttpStatusCode.Unauthorized,
            InvalidOtpException => HttpStatusCode.BadRequest,
            AccountNotActiveException => HttpStatusCode.Forbidden,
            AccountAnonymizedException => HttpStatusCode.Forbidden,
            InvalidRefreshTokenException => HttpStatusCode.Unauthorized,
            InvalidSocialTokenException => HttpStatusCode.Unauthorized,
            _ => HttpStatusCode.BadRequest,
        };

    // AMAÇ: İsteğin Accept-Language header'ından ilk dil kodunu (ör. "en-US" → "en") çıkarır.
    // NEDEN: Header yoksa/parse edilemezse null döner; ErrorMessages.Resolve bu durumda
    //        varsayılan Türkçe'ye düşer (proje Türkçe öncelikli, 00_INDEX.md kuralı).
    private static string? GetRequestLanguage(HttpContext context)
    {
        var header = context.Request.Headers.AcceptLanguage.ToString();
        if (string.IsNullOrWhiteSpace(header))
            return null;

        var firstLanguage = header.Split(',')[0].Split(';')[0].Trim();
        return firstLanguage.Length >= 2 ? firstLanguage[..2].ToLowerInvariant() : null;
    }
}`

using Microsoft.EntityFrameworkCore;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Domain.Entities;
using WordLearner.Infrastructure.Data;

namespace WordLearner.Infrastructure.Repositories;

public class RefreshTokenRepository : Repository<RefreshToken>, IRefreshTokenRepository
{
    public RefreshTokenRepository(WordLearnerDbContext db)
        : base(db) { }

    // AMAÇ: SHA-256 hash'ine göre refresh token kaydını bulur.
    public Task<RefreshToken?> GetByTokenHashAsync(
        string tokenHash,
        CancellationToken ct = default
    ) => _set.FirstOrDefaultAsync(t => t.TokenHash == tokenHash, ct);

    // AMAÇ: Aynı TokenFamily'e ait, henüz iptal edilmemiş tüm token'ları RevokedAt=UtcNow yapar.
    // NEDEN: Replay tespitinde tüm family güvensiz sayılır — tek bir token değil, hepsi iptal edilir.
    public async Task RevokeFamilyAsync(string tokenFamily, CancellationToken ct = default)
    {
        var tokens = await _set.Where(t => t.TokenFamily == tokenFamily && t.RevokedAt == null)
            .ToListAsync(ct);

        foreach (var token in tokens)
            token.RevokedAt = DateTime.UtcNow;

        await _db.SaveChangesAsync(ct);
    }

    // AMAÇ: Bir kullanıcının, hangi family'den olursa olsun, henüz iptal edilmemiş
    //       tüm refresh token'larını RevokedAt=UtcNow yapar.
    // NEDEN: Şifre sıfırlama/hesap silme sonrası "tüm cihazlardan çıkış" gereksinimi.
    public async Task RevokeAllForUserAsync(int userId, CancellationToken ct = default)
    {
        var tokens = await _set.Where(t => t.UserId == userId && t.RevokedAt == null)
            .ToListAsync(ct);

        foreach (var token in tokens)
            token.RevokedAt = DateTime.UtcNow;

        await _db.SaveChangesAsync(ct);
    }

using Google.Apis.Auth;
using Microsoft.Extensions.Configuration;
using WordLearner.Application.Interfaces.Services;

namespace WordLearner.Application.Services;

public class GoogleTokenValidator : IGoogleTokenValidator
{
    private readonly IConfiguration _configuration;

    public GoogleTokenValidator(IConfiguration configuration) => _configuration = configuration;

    // AMAÇ: Google ID token'ını doğrular, geçerliyse kullanıcı bilgilerini döner.
    // NEDEN: GoogleJsonWebSignature.ValidateAsync Google'ın JWKS'sinden anahtarları
    //        kendi indirir/önbellekler; biz yalnızca audience'ın bizim Client Id'mize
    //        eşit olduğunu doğrulatırız (aksi hâlde başka bir uygulama için üretilmiş
    //        bir token da kabul edilirdi).
    public async Task<GoogleTokenPayload?> ValidateAsync(string idToken, CancellationToken ct = default)
    {
        try
        {
            var settings = new GoogleJsonWebSignature.ValidationSettings
            {
                Audience = new[] { _configuration["Google:ClientId"]! },
            };
            var payload = await GoogleJsonWebSignature.ValidateAsync(idToken, settings);

            return new GoogleTokenPayload(payload.Subject, payload.Email, payload.GivenName, payload.FamilyName);
        }
        catch (InvalidJwtException)
        {
            // NEDEN: İmza geçersiz, süre dolmuş veya audience uyuşmuyor — hepsi bu tek
            //        exception tipinde toplanır; AuthService'e null dönüp karar verdiririz.
            return null;
        }
    }
}`
