// WordLearnerDbContext.cs
//
// AMAÇ: EF Core'un veritabanıyla konuştuğu merkezi DbContext sınıfı.
// NEDEN: Tüm entity konfigürasyonlarını tek yerden yükler; soft delete global filtresi

using Microsoft.EntityFrameworkCore;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data;

public class WordLearnerDbContext : DbContext
{
    // AMAÇ: DI tarafından enjekte edilen seçenekleri (connection string vb.) taban sınıfa iletir.
    // NEDEN: EF Core'un standart constructor kalıbı; farklı ortamlar (dev/prod/test) için
    //        farklı seçenek setleri enjekte edilebilir.
    public WordLearnerDbContext(DbContextOptions<WordLearnerDbContext> options)
        : base(options) { }

##NEW##    // AMAÇ: Kullanıcı hesapları (A-03 — Auth API).
##NEW##    public DbSet<User> Users => Set<User>();
##NEW##
##NEW##    // AMAÇ: Kullanıcıların refresh token geçmişi (A-03 — Auth API).
##NEW##    public DbSet<RefreshToken> RefreshTokens => Set<RefreshToken>();

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // AMAÇ: Infrastructure assembly'sindeki tüm IEntityTypeConfiguration<T> sınıflarını
        //       otomatik olarak tarar ve uygular.
        // NEDEN: Her entity için tek tek modelBuilder.ApplyConfiguration(...) çağırmak yerine
        //        assembly taraması yaparız; yeni entity eklendikçe bu satır değişmez.
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

        // AMAÇ: BaseEntity'den türeyen tüm entity'lere global soft delete filtresi uygular.
        // NEDEN: IsDeleted == true olan kayıtlar hiçbir sorguda görünmez; her sorguda
        //        .Where(e => !e.IsDeleted) yazmak zorunda kalmayız.
        //        IgnoreQueryFilters() ile gerektiğinde (admin silinen kayıtları görme) bypass edilir.
        foreach (var entityType in modelBuilder.Model.GetEntityTypes())
        {
            if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
            {
                var parameter = System.Linq.Expressions.Expression.Parameter(
                    entityType.ClrType,
                    "e"
                );
                var property = System.Linq.Expressions.Expression.Property(
                    parameter,
                    nameof(BaseEntity.IsDeleted)
                );
                var notDeleted = System.Linq.Expressions.Expression.Not(property);
                var lambda = System.Linq.Expressions.Expression.Lambda(notDeleted, parameter);
                modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
            }
        }

        base.OnModelCreating(modelBuilder);
    }

    // AMAÇ: Her kayıt güncellendiğinde UpdatedAt alanını otomatik olarak UTC şimdiki zamana set eder.
    // NEDEN: Servis veya repository katmanında her entity.UpdatedAt = DateTime.UtcNow yazmak
    //        kod tekrarına yol açar; bu override ile merkezi olarak yönetilir.
    public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
    {
        foreach (var entry in ChangeTracker.Entries<BaseEntity>())
        {
            if (entry.State == EntityState.Modified)
                entry.Entity.UpdatedAt = DateTime.UtcNow;

            // NEDEN: Yeni eklenen entity'lerde CreatedAt varsayılan olarak DateTime.UtcNow ile
            //        başlatılıyor (BaseEntity'de); UpdatedAt ise burada dokunulmadığı için
            //        insert sonrası null kalır — "hiç güncellenmedi" bilgisini korur.
        }

        return base.SaveChangesAsync(cancellationToken);
    }
}`

// UserConfiguration.cs
//
// AMAÇ: User entity'sinin EF Core tablo eşlemesini (kolon uzunlukları, index'ler,
//       CHECK constraint'leri) tanımlar.
// NEDEN: DATABASE_SCHEMA/Auth.md'deki Users şemasıyla birebir eşleşen kısıtları
//        kod tarafında da uygulamak için — ör. Email UNIQUE, Role/CurrentLevel/
//        AuthProvider yalnızca izinli değerleri alabilir.
// BAĞIMLILIKLAR: EF Core, User entity, OtpPurpose enum.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using Microsoft.EntityFrameworkCore.Metadata.Builders;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data.Configurations;

public class UserConfiguration : IEntityTypeConfiguration<User>
{
    public void Configure(EntityTypeBuilder<User> builder)
    {
        builder.Property(u => u.Email).HasMaxLength(254).IsRequired();
        // NEDEN: Aynı e-posta ile birden fazla hesap açılmasını DB seviyesinde engeller.
        builder.HasIndex(u => u.Email).IsUnique();

        builder.Property(u => u.PasswordHash).HasMaxLength(60);
        builder.Property(u => u.GoogleId).HasMaxLength(255);
        builder.Property(u => u.AppleId).HasMaxLength(255);
        builder.Property(u => u.AuthProvider).HasMaxLength(20).HasDefaultValue("Local");

        builder.Property(u => u.FirstName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.LastName).HasMaxLength(50).IsRequired();
        builder.Property(u => u.DisplayName).HasMaxLength(100);
        builder.Property(u => u.AvatarUrl).HasMaxLength(500);

        builder.Property(u => u.DailyWordGoal).HasDefaultValue(10);
        builder.Property(u => u.DailyNewWordLimit).HasDefaultValue(5);
        builder.Property(u => u.CurrentLevel).HasMaxLength(2).HasDefaultValue("A1");

        builder.Property(u => u.PendingOtpCodeHash).HasMaxLength(88);
        // NEDEN: Enum DB'de okunabilir bir string olarak tutulur (sayısal index'e bağımlı kalmaz).
        builder.Property(u => u.PendingOtpCodePurpose).HasConversion<string>().HasMaxLength(20);

        builder.Property(u => u.IsActive).HasDefaultValue(true);
        builder.Property(u => u.LastLoginIP).HasMaxLength(45);
        builder.Property(u => u.OriginalEmailHash).HasMaxLength(88);
        builder.Property(u => u.OneSignalPlayerId).HasMaxLength(100);
        builder.Property(u => u.Role).HasMaxLength(20).HasDefaultValue("User");

        builder.HasIndex(u => u.Role);
        builder.HasIndex(u => u.GoogleId);
        builder.HasIndex(u => u.AppleId);

        // NEDEN: Bu üç alan, C# tarafında enum yerine string tutulduğu için
        //        geçersiz değer yazılmasını DB seviyesinde engelleyen son savunma hattı.
        builder.ToTable(t =>
        {
            t.HasCheckConstraint("CK_Users_Level", "CurrentLevel IN ('A1','A2','B1','B2','C1','C2')");
            t.HasCheckConstraint("CK_Users_Role", "Role IN ('User','Admin')");
            t.HasCheckConstraint("CK_Users_AuthProvider", "AuthProvider IN ('Local','Google','Apple')");
        });
    }
}`

        builder.HasIndex(r => r.TokenFamily);

        builder
            .HasOne(r => r.User)
            .WithMany(u => u.RefreshTokens)
            .HasForeignKey(r => r.UserId)
            .OnDelete(DeleteBehavior.Cascade);
    }

using System.Security.Cryptography;

            new Claim(ClaimTypes.Email, user.Email),
            new Claim(ClaimTypes.Role, user.Role),
            new Claim("firstName", user.FirstName),

        var expirationMinutes = _configuration.GetValue("Jwt:ExpirationMinutes", 15);

            issuer: _configuration["Jwt:Issuer"],
            audience: _configuration["Jwt:Audience"],
            claims: claims,
            expires: DateTime.UtcNow.AddMinutes(expirationMinutes),

                    StringComparison.OrdinalIgnoreCase

// ExceptionHandlingMiddleware.cs
//
// AMAÇ: İstek hattında (pipeline) yakalanmayan tüm exception'ları tek yerden
//       yakalayıp standart ApiErrorResponse JSON'ına çevirmek.
// NEDEN: Controller'larda try/catch tekrar etmeyi önler; her hatanın HTTP durum
//        kodu ve JSON şekli tek bir dosyadan yönetilir (REFERENCE/API_ENDPOINTS.md §1).
// BAĞIMLILIKLAR: WordLearner.Application.Common.Exceptions.EntityNotFoundException/AppException,
//                WordLearner.Application.Common.Localization.ErrorMessages,
//                WordLearner.Application.Common.Models.ApiErrorResponse.
// ─────────────────────────────────────────────────────────────────────────────

using System.Net;
using System.Text.Json;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Common.Localization;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Middleware;

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(
        RequestDelegate next,
        ILogger<ExceptionHandlingMiddleware> logger
    )
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları Türkçe; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(
                ex,
                "Unhandled exception caught: {Method} {Path}",
                context.Request.Method,
                context.Request.Path
            );

            await WriteErrorResponseAsync(context, ex);
        }
    }

    // AMAÇ: Exception tipine göre HTTP durum kodu + hata kodu eşlemesi yapıp
    //       ApiErrorResponse'u JSON olarak yanıta yazar.
    // NEDEN: EntityNotFoundException bilinen bir iş kuralı olduğu için 404 + kendi
    //        (dinamik entity adı içeren) mesajıyla döner. AppException'dan türeyen
    //        Auth vb. exception'ların istemciye giden mesajı ise ex.Message DEĞİL —
    //        Code'un isteğin diline (Accept-Language) göre ErrorMessages'ten çözülmüş
    //        hâlidir (bkz. AppException.cs NEDEN açıklaması). Bilinmeyen her exception'ın
    //        gerçek mesajı istemciye sızdırılmaz (bilgi ifşası riski) — sabit, güvenli
    //        bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "NOT_FOUND"),
            AppException appEx => (StatusCodeFor(appEx), appEx.Code),
            _ => (HttpStatusCode.InternalServerError, "INTERNAL_SERVER_ERROR"),
        };

        // NEDEN: EntityNotFoundException'ın mesajı dinamiktir (entity adı içerir),
        //        doğrudan ex.Message kullanılır. AppException'lar Code üzerinden
        //        isteğin diline göre çözülür. INTERNAL_SERVER_ERROR ise hiçbir zaman gerçek
        //        exception mesajını sızdırmaz, sabit bir metin döner.
        var message = ex switch
        {
            EntityNotFoundException => ex.Message,
            AppException appEx => ErrorMessages.Resolve(appEx.Code, GetRequestLanguage(context)),
            _ => "Beklenmeyen bir hata oluştu.",
        };

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(
            response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase }
        );

        return context.Response.WriteAsync(json);
    }

    // AMAÇ: Her AppException alt tipini kendi HTTP durum koduna eşler.
    // NEDEN: Kod (Code) ile HTTP durumu ayrı kavramlar — aynı Code farklı senaryoda
    //        farklı statü dönebilir ihtimaline karşı, statü ayrı bir switch'te tutulur.
    private static HttpStatusCode StatusCodeFor(AppException ex) =>
        ex switch
        {
            DuplicateEmailException => HttpStatusCode.Conflict,
            InvalidCredentialsException => HttpStatusCode.Unauthorized,
            InvalidOtpException => HttpStatusCode.BadRequest,
            AccountNotActiveException => HttpStatusCode.Forbidden,
            AccountAnonymizedException => HttpStatusCode.Forbidden,
            InvalidRefreshTokenException => HttpStatusCode.Unauthorized,
            InvalidSocialTokenException => HttpStatusCode.Unauthorized,
            _ => HttpStatusCode.BadRequest,
        };

    // AMAÇ: İsteğin Accept-Language header'ından ilk dil kodunu (ör. "en-US" → "en") çıkarır.
    // NEDEN: Header yoksa/parse edilemezse null döner; ErrorMessages.Resolve bu durumda
    //        varsayılan Türkçe'ye düşer (proje Türkçe öncelikli, 00_INDEX.md kuralı).
    private static string? GetRequestLanguage(HttpContext context)
    {
        var header = context.Request.Headers.AcceptLanguage.ToString();
        if (string.IsNullOrWhiteSpace(header))
            return null;

        var firstLanguage = header.Split(',')[0].Split(';')[0].Trim();
        return firstLanguage.Length >= 2 ? firstLanguage[..2].ToLowerInvariant() : null;
    }
}`

public class UserRepository : Repository<User>, IUserRepository
{
    public UserRepository(WordLearnerDbContext db)
        : base(db) { }

    // AMAÇ: E-postaya göre kullanıcı bulur, soft delete filtresini bilerek yok sayar.
    // NEDEN: IgnoreQueryFilters() olmadan grace period içindeki (soft-delete'li) bir
    //        hesap login/register akışlarında hiç görünmez — hesap kurtarma ve
    //        "e-posta zaten kullanımda" kontrolü bu satır olmadan çalışamaz.
    public Task<User?> GetByEmailAsync(string email, CancellationToken ct = default) =>
        _set.IgnoreQueryFilters().FirstOrDefaultAsync(u => u.Email == email, ct);

    // AMAÇ: Google Sign-In sub (GoogleId) değerine göre kullanıcı bulur.
    public Task<User?> GetByGoogleIdAsync(string googleId, CancellationToken ct = default) =>
        _set.IgnoreQueryFilters().FirstOrDefaultAsync(u => u.GoogleId == googleId, ct);

    // AMAÇ: Apple Sign-In sub (AppleId) değerine göre kullanıcı bulur.
    public Task<User?> GetByAppleIdAsync(string appleId, CancellationToken ct = default) =>
        _set.IgnoreQueryFilters().FirstOrDefaultAsync(u => u.AppleId == appleId, ct);

    // AMAÇ: Anonimleştirilmiş bir hesabın OriginalEmailHash'i verilen hash ile eşleşiyor mu bakar.
    public Task<bool> OriginalEmailHashExistsAsync(
        string emailHash,
        CancellationToken ct = default
    ) => _set.IgnoreQueryFilters().AnyAsync(u => u.OriginalEmailHash == emailHash, ct);

using Microsoft.EntityFrameworkCore;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Domain.Entities;
using WordLearner.Infrastructure.Data;

namespace WordLearner.Infrastructure.Repositories;

public class RefreshTokenRepository : Repository<RefreshToken>, IRefreshTokenRepository
{
    public RefreshTokenRepository(WordLearnerDbContext db)
        : base(db) { }

    // AMAÇ: SHA-256 hash'ine göre refresh token kaydını bulur.
    public Task<RefreshToken?> GetByTokenHashAsync(
        string tokenHash,
        CancellationToken ct = default
    ) => _set.FirstOrDefaultAsync(t => t.TokenHash == tokenHash, ct);

    // AMAÇ: Aynı TokenFamily'e ait, henüz iptal edilmemiş tüm token'ları RevokedAt=UtcNow yapar.
    // NEDEN: Replay tespitinde tüm family güvensiz sayılır — tek bir token değil, hepsi iptal edilir.
    public async Task RevokeFamilyAsync(string tokenFamily, CancellationToken ct = default)
    {
        var tokens = await _set.Where(t => t.TokenFamily == tokenFamily && t.RevokedAt == null)
            .ToListAsync(ct);

        foreach (var token in tokens)
            token.RevokedAt = DateTime.UtcNow;

        await _db.SaveChangesAsync(ct);
    }

    // AMAÇ: Bir kullanıcının, hangi family'den olursa olsun, henüz iptal edilmemiş
    //       tüm refresh token'larını RevokedAt=UtcNow yapar.
    // NEDEN: Şifre sıfırlama/hesap silme sonrası "tüm cihazlardan çıkış" gereksinimi.
    public async Task RevokeAllForUserAsync(int userId, CancellationToken ct = default)
    {
        var tokens = await _set.Where(t => t.UserId == userId && t.RevokedAt == null)
            .ToListAsync(ct);

        foreach (var token in tokens)
            token.RevokedAt = DateTime.UtcNow;

        await _db.SaveChangesAsync(ct);
    }
}`

using System.IdentityModel.Tokens.Jwt;
using System.Net.Http.Json;
using Microsoft.Extensions.Configuration;
using Microsoft.IdentityModel.Tokens;
using WordLearner.Application.Interfaces.Services;

namespace WordLearner.Application.Services;

public class AppleTokenValidator : IAppleTokenValidator
{
    // NEDEN sabit: Apple'ın kimlik sağlayıcı adresi hiç değişmez, appsettings'e taşımaya gerek yok.
    private const string AppleIssuer = "https://appleid.apple.com";
    private const string AppleJwksUrl = "https://appleid.apple.com/auth/keys";

    private readonly HttpClient _httpClient;
    private readonly IConfiguration _configuration;

    public AppleTokenValidator(HttpClient httpClient, IConfiguration configuration)
    {
        _httpClient = httpClient;
        _configuration = configuration;
    }

    // AMAÇ: Apple identity token'ını doğrular, geçerliyse kullanıcı bilgilerini döner.
    // NEDEN: Apple e-postayı yalnızca İLK yetkilendirmede identity token'ın içine koyar;
    //        sonraki girişlerde "email" claim'i olmayabilir — bu normaldir, AuthService
    //        bu durumda DB'deki mevcut Users.Email'i korur, üzerine yazmaz.
    // NASIL: 1) Apple'ın JWKS'sini çek  2) Token'ı bu anahtarlarla + issuer/audience'a
    //        göre doğrula  3) "sub" (AppleId) ve varsa "email" claim'lerini çıkar.
    public async Task<AppleTokenPayload?> ValidateAsync(
        string identityToken,
        CancellationToken ct = default
    )
    {
        try
        {
            var jwks = await _httpClient.GetFromJsonAsync<JsonWebKeySet>(AppleJwksUrl, ct);
            if (jwks is null)
                return null;

            var validationParameters = new TokenValidationParameters
            {
                ValidateIssuer = true,
                ValidIssuer = AppleIssuer,
                ValidateAudience = true,
                ValidAudience = _configuration["Apple:BundleId"],
                ValidateLifetime = true,
                ValidateIssuerSigningKey = true,
                IssuerSigningKeys = jwks.Keys,
            };

            var principal = new JwtSecurityTokenHandler().ValidateToken(
                identityToken,
                validationParameters,
                out var validatedToken
            );

            // NEDEN: JwtTokenService.GetPrincipalFromExpiredToken'daki Algorithm Confusion
            //        önlemiyle aynı gerekçe — imzalanan algoritmanın gerçekten Apple'ın
            //        kullandığı RS256 olduğu elle teyit edilir.
            if (
                validatedToken is not JwtSecurityToken jwtToken
                || !jwtToken.Header.Alg.Equals(
                    SecurityAlgorithms.RsaSha256,
                    StringComparison.OrdinalIgnoreCase
                )
            )
                return null;

            var appleId = principal.FindFirst("sub")?.Value;
            if (string.IsNullOrEmpty(appleId))
                return null;

            var email = principal.FindFirst("email")?.Value;
            return new AppleTokenPayload(appleId, email);
        }
        catch
        {
            // NEDEN: JWKS çekilemezse (ağ hatası) veya token doğrulama başarısız olursa
            //        (imza/issuer/audience/süre) AuthService'e null dönüp karar verdiririz.
            return null;
        }
    }

using Microsoft.Extensions.Configuration;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.DTOs.Auth;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Application.Interfaces.Services;
using WordLearner.Domain.Entities;
using WordLearner.Domain.Enums;

namespace WordLearner.Application.Services;

public class AuthService : IAuthService
{
    // NEDEN 5dk: REFERENCE/SECURITY.md §1'de pinlenen OTP geçerlilik süresi (login/kayıt/şifre sıfırlama).
    private const int OtpExpiryMinutes = 5;

    // NEDEN 15dk: Hesap silme OTP'si diğerlerinden daha kısa — geri alınamaz bir işlem
    //        olduğu için pencere daraltılır (REFERENCE/API_ENDPOINTS.md §3).
    private const int DeleteAccountOtpExpiryMinutes = 15;

    // NEDEN 30 gün: REFERENCE/SECURITY.md §9 — hesap silme grace period.
    private const int AccountDeletionGraceDays = 30;

    // AMAÇ: Kullanıcı bulunamadığında/şifresi olmadığında (sosyal hesap) bile SABİT
    //       SÜRELİ bir BCrypt karşılaştırması yapılabilmesi için önceden hesaplanmış,
    //       geçerli formatlı ama hiçbir gerçek şifreyle eşleşmeyecek bir hash.
    // NEDEN static + doğrudan BCrypt.Net: Bu alan tip yüklenirken (instance yokken) bir
    //        kez hesaplanır — IPasswordService instance metodu bu bağlamda kullanılamaz;
    //        PasswordService.Hash'in yaptığı işlemin aynısı (workFactor:12) burada tekrarlanır.
    private static readonly string FakePasswordHashForTiming = BCrypt.Net.BCrypt.HashPassword(
        Guid.NewGuid().ToString(),
        workFactor: 12
    );

    private readonly IUserRepository _userRepository;
    private readonly IRefreshTokenRepository _refreshTokenRepository;
    private readonly IPasswordService _passwordService;
    private readonly ITokenService _tokenService;
    private readonly IEmailService _emailService;
    private readonly IGoogleTokenValidator _googleTokenValidator;
    private readonly IAppleTokenValidator _appleTokenValidator;
    private readonly IConfiguration _configuration;

    public AuthService(
        IUserRepository userRepository,
        IRefreshTokenRepository refreshTokenRepository,
        IPasswordService passwordService,
        ITokenService tokenService,
        IEmailService emailService,
        IGoogleTokenValidator googleTokenValidator,
        IAppleTokenValidator appleTokenValidator,
        IConfiguration configuration
    )
    {
        _userRepository = userRepository;
        _refreshTokenRepository = refreshTokenRepository;
        _passwordService = passwordService;
        _tokenService = tokenService;
        _emailService = emailService;
        _googleTokenValidator = googleTokenValidator;
        _appleTokenValidator = appleTokenValidator;
        _configuration = configuration;
    }

    // AMAÇ: Yeni kullanıcı kaydı oluşturur, e-posta doğrulama OTP'si gönderir.
    // NEDEN: Şifre asla düz metin saklanmaz (Hash); e-posta hem aktif kullanıcılar hem
    //        de daha önce anonimleştirilmiş hesaplar arasında benzersiz olmalı.
    // NASIL: 1) E-posta çakışması kontrol et (aktif + anonimleştirilmiş)  2) Şifreyi hash'le
    //        3) OTP üret  4) Kullanıcıyı kaydet  5) Doğrulama e-postası gönder.
    public async Task<RegisterResponse> RegisterAsync(RegisterRequest request, CancellationToken ct = default)
    {
        var existingUser = await _userRepository.GetByEmailAsync(request.Email, ct);
        if (existingUser is not null)
            throw new DuplicateEmailException();

        // NEDEN: Anonimleştirilmiş bir hesabın orijinal e-postasıyla tekrar kayıt
        //        açılmasını engeller (REFERENCE/SECURITY.md §9).
        var emailHash = _passwordService.HashToken(request.Email);
        if (await _userRepository.OriginalEmailHashExistsAsync(emailHash, ct))
            throw new DuplicateEmailException();

        var (otpCode, otpHash) = GenerateOtp();

        var user = new User
        {
            Email = request.Email,
            PasswordHash = _passwordService.Hash(request.Password),
            FirstName = request.FirstName,
            LastName = request.LastName,
            AuthProvider = "Local",
            PendingOtpCodeHash = otpHash,
            PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(OtpExpiryMinutes),
            PendingOtpCodePurpose = OtpPurpose.EmailVerification,
        };

        await _userRepository.AddAsync(user, ct: ct);
        await _emailService.SendEmailVerificationOtpAsync(user.Email, otpCode, ct);

        return new RegisterResponse(user.Id, user.Email, user.FirstName, user.CurrentLevel);
    }

    // AMAÇ: Kayıt sonrası e-postaya gelen OTP kodunu doğrular, hesabı aktive eder.
    public async Task<MessageResponse> VerifyEmailAsync(
        VerifyEmailRequest request,
        CancellationToken ct = default
    )
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        ValidateOtp(user, request.OtpCode, OtpPurpose.EmailVerification);

        user!.IsEmailVerified = true;
        user.EmailVerifiedAt = DateTime.UtcNow;
        ClearOtp(user);
        await _userRepository.UpdateAsync(user, ct: ct);

        return new MessageResponse("E-posta doğrulandı.");
    }

    // AMAÇ: E-posta doğrulama kodunu tekrar gönderir.
    // NEDEN: Kullanıcı bulunamasa da aynı yanıt döner — e-posta numaralandırma
    //        saldırısını önlemek için (ForgotPasswordAsync ile aynı desen).
    public async Task<MessageResponse> ResendVerificationAsync(
        ResendVerificationRequest request,
        CancellationToken ct = default
    )
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        if (user is not null && !user.IsEmailVerified)
        {
            var (otpCode, otpHash) = GenerateOtp();
            user.PendingOtpCodeHash = otpHash;
            user.PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(OtpExpiryMinutes);
            user.PendingOtpCodePurpose = OtpPurpose.EmailVerification;
            await _userRepository.UpdateAsync(user, ct: ct);
            await _emailService.SendEmailVerificationOtpAsync(user.Email, otpCode, ct);
        }

        return new MessageResponse("Doğrulama kodu gönderildi.");
    }

    // AMAÇ: Login adım 1 — şifreyi doğrular, başarılıysa OTP gönderir (token DÖNMEZ).
    // NEDEN: REFERENCE/SECURITY.md §1 — 2 adımlı OTP girişinin ilk adımı. Timing attack
    //        önlemi: kullanıcı yoksa veya şifresi yoksa (sosyal hesap) bile SABİT
    //        SÜRELİ bir BCrypt karşılaştırması yapılır, bu yüzden hangi durumun
    //        gerçekleştiği fark etmeksizin aynı sürede aynı hata döner.
    public async Task<MessageResponse> LoginAsync(LoginRequest request, CancellationToken ct = default)
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        var hashToVerify = user?.PasswordHash ?? FakePasswordHashForTiming;
        var passwordValid = _passwordService.Verify(request.Password, hashToVerify);

        if (user is null || user.PasswordHash is null || !passwordValid)
            throw new InvalidCredentialsException();

        if (!user.IsActive)
            throw new AccountNotActiveException();

        var (otpCode, otpHash) = GenerateOtp();
        user.PendingOtpCodeHash = otpHash;
        user.PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(OtpExpiryMinutes);
        user.PendingOtpCodePurpose = OtpPurpose.LoginOtp;
        await _userRepository.UpdateAsync(user, ct: ct);

        await _emailService.SendLoginOtpAsync(user.Email, otpCode, ct);
        return new MessageResponse("OTP gönderildi.");
    }

    // AMAÇ: Login adım 2 — OTP'yi doğrular, başarılıysa access+refresh token üretir.
    public async Task<AuthTokenResponse> VerifyLoginOtpAsync(
        VerifyOtpRequest request,
        string? ipAddress,
        CancellationToken ct = default
    )
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        ValidateOtp(user, request.OtpCode, OtpPurpose.LoginOtp);

        return await CompleteLoginAsync(user!, ipAddress, ct);
    }

    // AMAÇ: Google ID token'ı ile giriş yapar; hesap yoksa oluşturur, e-posta eşleşen
    //       yerel hesap varsa GoogleId'yi ona bağlar (account linking).
    // NEDEN: Google zaten kimliği doğruladığı için 2FA OTP adımı GEREKMEZ.
    public async Task<AuthTokenResponse> LoginWithGoogleAsync(
        GoogleLoginRequest request,
        string? ipAddress,
        CancellationToken ct = default
    )
    {
        var payload =
            await _googleTokenValidator.ValidateAsync(request.IdToken, ct)
            ?? throw new InvalidSocialTokenException();

        var user = await _userRepository.GetByGoogleIdAsync(payload.GoogleId, ct);
        if (user is null)
        {
            user = await _userRepository.GetByEmailAsync(payload.Email, ct);
            if (user is not null)
            {
                // NEDEN: Aynı e-postayla önceden yerel/başka sağlayıcı hesabı varsa,
                //        yeni bir hesap açmak yerine GoogleId bu hesaba bağlanır —
                //        aksi hâlde kullanıcı aynı e-posta için iki ayrı hesaba sahip olurdu.
                user.GoogleId = payload.GoogleId;
            }
            else
            {
                user = new User
                {
                    Email = payload.Email,
                    FirstName = payload.FirstName ?? "Kullanıcı",
                    LastName = payload.LastName ?? string.Empty,
                    AuthProvider = "Google",
                    GoogleId = payload.GoogleId,
                    IsEmailVerified = true,
                };
                await _userRepository.AddAsync(user, ct: ct);
            }
        }

        if (!user.IsActive)
            throw new AccountNotActiveException();

        return await CompleteLoginAsync(user, ipAddress, ct);
    }

    // AMAÇ: Apple identity token'ı ile giriş yapar; hesap yoksa oluşturur, e-posta
    //       eşleşen yerel hesap varsa AppleId'yi ona bağlar.
    // NEDEN: Apple e-postayı yalnızca İLK yetkilendirmede verir — sonraki girişlerde
    //        payload.Email null olabilir; bu durumda yalnızca AppleId ile aranır,
    //        DB'deki mevcut e-posta asla üzerine yazılmaz.
    public async Task<AuthTokenResponse> LoginWithAppleAsync(
        AppleLoginRequest request,
        string? ipAddress,
        CancellationToken ct = default
    )
    {
        var payload =
            await _appleTokenValidator.ValidateAsync(request.IdentityToken, ct)
            ?? throw new InvalidSocialTokenException();

        var user = await _userRepository.GetByAppleIdAsync(payload.AppleId, ct);
        if (user is null)
        {
            if (payload.Email is not null)
                user = await _userRepository.GetByEmailAsync(payload.Email, ct);

            if (user is not null)
            {
                user.AppleId = payload.AppleId;
            }
            else
            {
                // NEDEN: İlk yetkilendirmede email gelmemesi teorik olarak beklenmez;
                //        savunmacı olarak ele alınır — email yoksa yeni kayıt açılamaz.
                if (payload.Email is null)
                    throw new InvalidSocialTokenException();

                user = new User
                {
                    Email = payload.Email,
                    FirstName = "Kullanıcı",
                    LastName = string.Empty,
                    AuthProvider = "Apple",
                    AppleId = payload.AppleId,
                    IsEmailVerified = true,
                };
                await _userRepository.AddAsync(user, ct: ct);
            }
        }

        if (!user.IsActive)
            throw new AccountNotActiveException();

        return await CompleteLoginAsync(user, ipAddress, ct);
    }

    // AMAÇ: Refresh token'ı doğrular, rotate eder, yeni access+refresh token çifti üretir.
    // NEDEN: Token Family Pattern (REFERENCE/SECURITY.md §1) — eski token tek kullanımlık;
    //        aynı family'den ikinci kullanım replay sayılır ve TÜM family iptal edilir.
    // NASIL: 1) Hash'e göre token'ı bul  2) Geçersiz/süresi dolmuş/iptalse reddet
    //        3) Zaten kullanılmışsa (replay) family'yi iptal et ve reddet  4) Kullanıldı
    //        işaretle  5) Aynı family'de yeni bir token üret.
    public async Task<AuthTokenResponse> RefreshAsync(
        RefreshRequest request,
        string? ipAddress,
        CancellationToken ct = default
    )
    {
        var tokenHash = _passwordService.HashToken(request.RefreshToken);
        var existingToken = await _refreshTokenRepository.GetByTokenHashAsync(tokenHash, ct);

        if (
            existingToken is null
            || existingToken.RevokedAt is not null
            || existingToken.ExpiresAt < DateTime.UtcNow
        )
            throw new InvalidRefreshTokenException();

        if (existingToken.IsUsed)
        {
            // NEDEN: SecurityLog:TokenReplay entegrasyonu A-04'ten sonra eklenecek
            //        (bkz. TASK/A_admin_panel_backend.md A-03 notu).
            await _refreshTokenRepository.RevokeFamilyAsync(existingToken.TokenFamily, ct);
            throw new InvalidRefreshTokenException();
        }

        existingToken.IsUsed = true;
        await _refreshTokenRepository.UpdateAsync(existingToken, ct: ct);

        var user = await _userRepository.GetByIdAsync(existingToken.UserId, ct);
        if (user is null || !user.IsActive || user.IsAnonymized)
            throw new InvalidRefreshTokenException();

        var accessToken = _tokenService.GenerateAccessToken(user);
        var refreshTokenResult = _tokenService.GenerateRefreshToken();

        var newRefreshToken = new RefreshToken
        {
            UserId = user.Id,
            TokenHash = _passwordService.HashToken(refreshTokenResult.Token),
            TokenFamily = existingToken.TokenFamily,
            ExpiresAt = refreshTokenResult.ExpiresAt,
            DeviceInfo = existingToken.DeviceInfo,
            IpAddress = ipAddress,
        };
        await _refreshTokenRepository.AddAsync(newRefreshToken, ct: ct);

        return new AuthTokenResponse(
            accessToken,
            refreshTokenResult.Token,
            ExpiresInSeconds(),
            new AuthUserDto(user.Id, user.CurrentLevel),
            false
        );
    }

    // AMAÇ: Verilen refresh token'ı kalıcı olarak iptal eder.
    // NEDEN: Sahiplik kontrolü — başkasının refresh token'ı bu userId ile iptal edilemez.
    public async Task LogoutAsync(int userId, RefreshRequest request, CancellationToken ct = default)
    {
        var tokenHash = _passwordService.HashToken(request.RefreshToken);
        var token = await _refreshTokenRepository.GetByTokenHashAsync(tokenHash, ct);

        if (token is null || token.UserId != userId)
            throw new InvalidRefreshTokenException();

        token.RevokedAt = DateTime.UtcNow;
        await _refreshTokenRepository.UpdateAsync(token, ct: ct);
    }

    // AMAÇ: Şifre sıfırlama OTP'si gönderir.
    // NEDEN: Kullanıcı yoksa/anonimleştirilmişse bile AYNI yanıt döner — e-posta
    //        numaralandırma saldırısını önler (REFERENCE/SECURITY.md §7).
    public async Task<MessageResponse> ForgotPasswordAsync(
        ForgotPasswordRequest request,
        CancellationToken ct = default
    )
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        if (user is not null && !user.IsAnonymized)
        {
            var (otpCode, otpHash) = GenerateOtp();
            user.PendingOtpCodeHash = otpHash;
            user.PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(OtpExpiryMinutes);
            user.PendingOtpCodePurpose = OtpPurpose.PasswordReset;
            await _userRepository.UpdateAsync(user, ct: ct);
            await _emailService.SendPasswordResetOtpAsync(user.Email, otpCode, ct);
        }

        return new MessageResponse("Şifre sıfırlama kodu gönderildi.");
    }

    // AMAÇ: OTP + yeni şifre ile şifreyi değiştirir, tüm cihazlardan çıkış yapar.
    public async Task<MessageResponse> ResetPasswordAsync(
        ResetPasswordRequest request,
        CancellationToken ct = default
    )
    {
        var user = await _userRepository.GetByEmailAsync(request.Email, ct);
        ValidateOtp(user, request.OtpCode, OtpPurpose.PasswordReset);

        user!.PasswordHash = _passwordService.Hash(request.NewPassword);
        ClearOtp(user);
        await _userRepository.UpdateAsync(user, ct: ct);

        // NEDEN: Şifre değiştiğinde tüm cihazlardan çıkış yapılır (REFERENCE/SECURITY.md §7).
        await _refreshTokenRepository.RevokeAllForUserAsync(user.Id, ct);
        await _emailService.SendPasswordChangedNotificationAsync(user.Email, ct);

        return new MessageResponse("Şifreniz güncellendi.");
    }

    // AMAÇ: Hesap silme OTP'si gönderir (15dk geçerli).
    public async Task<MessageResponse> RequestAccountDeletionAsync(
        int userId,
        CancellationToken ct = default
    )
    {
        var user =
            await _userRepository.GetByIdAsync(userId, ct)
            ?? throw new EntityNotFoundException(typeof(User), userId);

        var (otpCode, otpHash) = GenerateOtp();
        user.PendingOtpCodeHash = otpHash;
        user.PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(DeleteAccountOtpExpiryMinutes);
        user.PendingOtpCodePurpose = OtpPurpose.AccountDeletion;
        await _userRepository.UpdateAsync(user, ct: ct);

        await _emailService.SendAccountDeletionOtpAsync(user.Email, otpCode, ct);
        return new MessageResponse("Hesap silme onay kodu gönderildi.");
    }

    // AMAÇ: OTP + şifre ile hesap silmeyi onaylar; soft delete yapar, 30 gün sonra
    //       kalıcı anonimleştirme için zamanlar (AccountCleanupBackgroundService, A-10).
    // NEDEN: Geri alınamaz bir işlem olduğu için OTP'ye ek olarak şifre de istenir (çift onay).
    public async Task<MessageResponse> ConfirmAccountDeletionAsync(
        int userId,
        DeleteAccountConfirmRequest request,
        CancellationToken ct = default
    )
    {
        var user =
            await _userRepository.GetByIdAsync(userId, ct)
            ?? throw new EntityNotFoundException(typeof(User), userId);

        ValidateOtp(user, request.OtpCode, OtpPurpose.AccountDeletion);

        if (!_passwordService.Verify(request.Password, user.PasswordHash ?? FakePasswordHashForTiming))
            throw new InvalidCredentialsException();

        user.IsDeleted = true;
        user.DeletedAt = DateTime.UtcNow;
        user.ScheduledDeletionAt = DateTime.UtcNow.AddDays(AccountDeletionGraceDays);
        ClearOtp(user);
        await _userRepository.UpdateAsync(user, ct: ct);

        await _refreshTokenRepository.RevokeAllForUserAsync(user.Id, ct);

        return new MessageResponse("Hesabınız silindi. 30 gün içinde tekrar giriş yaparak geri alabilirsiniz.");
    }

    // ═══ Yardımcı Metotlar ═══

    // AMAÇ: 6 haneli rastgele OTP kodu + DB'ye yazılacak hash'ini üretir.
    // NEDEN: RandomNumberGenerator kriptografik olarak güvenli rastgelelik sağlar
    //        (Random sınıfı tahmin edilebilir olduğu için OTP üretiminde kullanılmaz).
    private (string Code, string Hash) GenerateOtp()
    {
        var code = RandomNumberGenerator.GetInt32(0, 1_000_000).ToString("D6");
        return (code, _passwordService.HashToken(code));
    }

    // AMAÇ: Bir kullanıcının bekleyen OTP'sini amaç/hash/süre bakımından doğrular.
    // NEDEN: EmailVerification/LoginOtp/PasswordReset/AccountDeletion akışlarının HEPSİ
    //        aynı doğrulama mantığını paylaşır — kod tekrarını önler.
    //        NOT: "3 yanlış deneme → kod geçersiz" sayacı SecurityLog'a bağımlı olduğu
    //        için A-04 (loglama) tamamlandıktan sonra buraya entegre edilecek — bkz.
    //        TASK/A_admin_panel_backend.md A-03'ün sonundaki not.
    private void ValidateOtp(User? user, string otpCode, OtpPurpose expectedPurpose)
    {
        var isValid =
            user is not null
            && user.PendingOtpCodePurpose == expectedPurpose
            && user.PendingOtpCodeExpiresAt is not null
            && user.PendingOtpCodeExpiresAt >= DateTime.UtcNow
            && user.PendingOtpCodeHash == _passwordService.HashToken(otpCode);

        if (!isValid)
            throw new InvalidOtpException();
    }

    // AMAÇ: Kullanılan/süresi dolan bir OTP'nin alanlarını temizler.
    private static void ClearOtp(User user)
    {
        user.PendingOtpCodeHash = null;
        user.PendingOtpCodeExpiresAt = null;
        user.PendingOtpCodePurpose = null;
    }

    // AMAÇ: OTP doğrulama/Google/Apple girişlerinin ORTAK son adımı — grace period
    //       kurtarma, anonimleştirme kontrolü, giriş istatistikleri ve token üretimi.
    // NEDEN: Üç farklı giriş yönteminin (OTP, Google, Apple) hepsi aynı noktada
    //        birleşir; kod tekrarını önler (SECURITY.md §1 — Adım 2 mantığı).
    private async Task<AuthTokenResponse> CompleteLoginAsync(
        User user,
        string? ipAddress,
        CancellationToken ct
    )
    {
        if (user.IsAnonymized)
            throw new AccountAnonymizedException();

        var accountWasRecovered = false;
        if (user.IsDeleted)
        {
            // NEDEN: 30 günlük grace period içinde soft-delete'li bir hesap otomatik
            //        kurtarılır (REFERENCE/SECURITY.md §1).
            user.IsDeleted = false;
            user.DeletedAt = null;
            user.ScheduledDeletionAt = null;
            accountWasRecovered = true;
        }

        ClearOtp(user);
        user.LastLoginAt = DateTime.UtcNow;
        user.LastLoginIP = ipAddress;
        user.LoginCount += 1;
        await _userRepository.UpdateAsync(user, ct: ct);

        var accessToken = _tokenService.GenerateAccessToken(user);
        var refreshTokenResult = _tokenService.GenerateRefreshToken();

        var refreshToken = new RefreshToken
        {
            UserId = user.Id,
            TokenHash = _passwordService.HashToken(refreshTokenResult.Token),
            TokenFamily = Guid.NewGuid().ToString(),
            ExpiresAt = refreshTokenResult.ExpiresAt,
            IpAddress = ipAddress,
        };
        await _refreshTokenRepository.AddAsync(refreshToken, ct: ct);

        return new AuthTokenResponse(
            accessToken,
            refreshTokenResult.Token,
            ExpiresInSeconds(),
            new AuthUserDto(user.Id, user.CurrentLevel),
            accountWasRecovered
        );
    }

    // AMAÇ: appsettings.json'daki Jwt:ExpirationMinutes'i saniyeye çevirir.
    // NEDEN: AuthTokenResponse.ExpiresIn saniye cinsinden döner (REFERENCE/API_ENDPOINTS.md §3 örneği).
    private int ExpiresInSeconds() => _configuration.GetValue("Jwt:ExpirationMinutes", 15) * 60;
}`

public static class ApplicationServiceExtensions
{
    // AMAÇ: MediatR handler'larını, AutoMapper profillerini ve FluentValidation
    //       validator'larını Application katmanı assembly'sinden tarayıp kaydeder.
    // NEDEN: Henüz (A-02) hiçbir feature command/handler/validator yazılmadığı için

    public static IServiceCollection AddApplicationServices(this IServiceCollection services)
    {

        //       IMediator.Send(command/query) ile çağırır; controller ince katman kalır.
        services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(applicationAssembly));

        services.AddAutoMapper(applicationAssembly);

        //       controller'a girmeden, ASP.NET Core'un model binding aşamasında çalışır.
        services.AddValidatorsFromAssembly(applicationAssembly);

        //       diğer Application servisleriyle (DbContext'e bağımlı olacaklar) tutarlı
        //       yaşam süresi için Scoped seçildi (A-03 — Auth API).
        services.AddScoped<IPasswordService, PasswordService>();
        services.AddScoped<ITokenService, JwtTokenService>();
        services.AddScoped<IEmailService, DevEmailService>();
        services.AddScoped<IGoogleTokenValidator, GoogleTokenValidator>();

        //       yerine IHttpClientFactory kullanmak soket tükenmesi (socket exhaustion) riskini
        //       önler ve testlerde HttpClient'ın mock'lanmasını kolaylaştırır.
        services.AddHttpClient<IAppleTokenValidator, AppleTokenValidator>();

##NEW##        // NEDEN Scoped: Yukarıdaki tüm bağımlılıklarıyla (repository'ler DbContext'e
##NEW##        //       bağımlı) aynı yaşam süresinde olmalı — AuthService'in kendisi de A-03'ün
##NEW##        //       ana servisi.
##NEW##        services.AddScoped<IAuthService, AuthService>();

        return services;
    }
}`

//       paylaşılan yardımcı.
// NEDEN: ExceptionHandlingMiddleware VE ValidationFilter aynı mantığa ihtiyaç
//        duyuyordu (ikisi de ErrorMessages.Resolve'a hangi dilin isteneceğini

// BAĞIMLILIKLAR: Yok — saf ASP.NET Core HttpContext.
// ─────────────────────────────────────────────────────────────────────────────

namespace WordLearner.API.Common;

public static class RequestLanguageResolver
{
    // AMAÇ: "Accept-Language: de-DE,de;q=0.9" gibi bir header'dan "de" çıkarır.
    // NEDEN: Header yoksa/parse edilemezse null döner; ErrorMessages.Resolve bu
    //        durumda varsayılan Türkçe'ye düşer (proje Türkçe öncelikli).
    public static string? Resolve(HttpContext context)
    {
        var header = context.Request.Headers.AcceptLanguage.ToString();
        if (string.IsNullOrWhiteSpace(header))
            return null;

        var firstLanguage = header.Split(',')[0].Split(';')[0].Trim();
        return firstLanguage.Length >= 2 ? firstLanguage[..2].ToLowerInvariant() : null;
    }
}

using System.Net;
using System.Text.Json;
using WordLearner.API.Common;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Common.Localization;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Middleware;

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(
        RequestDelegate next,
        ILogger<ExceptionHandlingMiddleware> logger
    )
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları Türkçe; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(
                ex,
                "Unhandled exception caught: {Method} {Path}",
                context.Request.Method,
                context.Request.Path
            );

            await WriteErrorResponseAsync(context, ex);
        }
    }

    // AMAÇ: Exception tipine göre HTTP durum kodu + hata kodu eşlemesi yapıp
    //       ApiErrorResponse'u JSON olarak yanıta yazar.
    // NEDEN: EntityNotFoundException bilinen bir iş kuralı olduğu için 404 + kendi
    //        (dinamik entity adı içeren) mesajıyla döner. AppException'dan türeyen
    //        Auth vb. exception'ların istemciye giden mesajı ise ex.Message DEĞİL —
    //        Code'un isteğin diline (Accept-Language) göre ErrorMessages'ten çözülmüş
    //        hâlidir (bkz. AppException.cs NEDEN açıklaması). Bilinmeyen her exception'ın
    //        gerçek mesajı istemciye sızdırılmaz (bilgi ifşası riski) — sabit, güvenli
    //        bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "NOT_FOUND"),
            AppException appEx => (StatusCodeFor(appEx), appEx.Code),
            _ => (HttpStatusCode.InternalServerError, "INTERNAL_SERVER_ERROR"),
        };

        // NEDEN: EntityNotFoundException'ın mesajı dinamiktir (entity adı içerir),
        //        doğrudan ex.Message kullanılır. AppException'lar Code üzerinden
        //        isteğin diline göre çözülür. INTERNAL_SERVER_ERROR ise hiçbir zaman gerçek
        //        exception mesajını sızdırmaz, sabit bir metin döner.
        var message = ex switch
        {
            EntityNotFoundException => ex.Message,
            AppException appEx => ErrorMessages.Resolve(appEx.Code, RequestLanguageResolver.Resolve(context)),
            _ => "Beklenmeyen bir hata oluştu.",
        };

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(
            response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase }
        );

        return context.Response.WriteAsync(json);
    }

    // AMAÇ: Her AppException alt tipini kendi HTTP durum koduna eşler.
    // NEDEN: Kod (Code) ile HTTP durumu ayrı kavramlar — aynı Code farklı senaryoda
    //        farklı statü dönebilir ihtimaline karşı, statü ayrı bir switch'te tutulur.
    private static HttpStatusCode StatusCodeFor(AppException ex) =>
        ex switch
        {
            DuplicateEmailException => HttpStatusCode.Conflict,
            InvalidCredentialsException => HttpStatusCode.Unauthorized,
            InvalidOtpException => HttpStatusCode.BadRequest,
            AccountNotActiveException => HttpStatusCode.Forbidden,
            AccountAnonymizedException => HttpStatusCode.Forbidden,
            InvalidRefreshTokenException => HttpStatusCode.Unauthorized,
            InvalidSocialTokenException => HttpStatusCode.Unauthorized,
            _ => HttpStatusCode.BadRequest,
        };
}`

using FluentValidation;
using Microsoft.AspNetCore.Mvc;
using Microsoft.AspNetCore.Mvc.Filters;
using WordLearner.API.Common;
using WordLearner.Application.Common.Localization;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Filters;

public class ValidationFilter : IAsyncActionFilter
{
    private readonly IServiceProvider _serviceProvider;

    public ValidationFilter(IServiceProvider serviceProvider) => _serviceProvider = serviceProvider;

    // AMAÇ: Action çalışmadan önce, argümanlardan biri için DI'da kayıtlı bir
    //       IValidator<T> varsa çalıştırır; başarısızsa 400 döner ve action'ı
    //       hiç çalıştırmaz.
    // NEDEN: Tek bir yerden tüm controller'lar için doğrulama sağlanır — yeni bir
    //        controller/endpoint eklenince yalnızca ilgili Validator yazılır,
    //        bu filter'a dokunulmaz.
    // NASIL: 1) Her action argümanı için tipine uygun IValidator<T> ara
    //        2) Bulunursa ValidateAsync çağır  3) Geçersizse her hatanın
    //        ErrorCode'unu isteğin diline göre ErrorMessages'ten çözüp birleştir,
    //        400 + ApiErrorResponse dön  4) Geçerliyse bir sonraki argümana geç.
    public async Task OnActionExecutionAsync(
        ActionExecutingContext context,
        ActionExecutionDelegate next
    )
    {
        var language = RequestLanguageResolver.Resolve(context.HttpContext);

        foreach (var argument in context.ActionArguments.Values)
        {
            if (argument is null)
                continue;

            var validatorType = typeof(IValidator<>).MakeGenericType(argument.GetType());
            if (_serviceProvider.GetService(validatorType) is not IValidator validator)
                continue;

            var validationContext = new ValidationContext<object>(argument);
            var result = await validator.ValidateAsync(validationContext);

            if (!result.IsValid)
            {
                // NEDEN: e.ErrorMessage KULLANILMAZ (sabit İngilizce log metni) — e.ErrorCode
                //        üzerinden ErrorMessages.Resolve ile isteğin diline göre çözülür.
                var messages = result
                    .Errors.Select(e => ErrorMessages.Resolve(e.ErrorCode, language))
                    .Distinct();
                var combinedMessage = string.Join(" ", messages);

                context.Result = new BadRequestObjectResult(
                    new ApiErrorResponse("INVALID_REQUEST", combinedMessage)
                );
                return;
            }
        }

        await next();
    }
}`

builder.Host.UseSerilog((context, configuration) => configuration
    .MinimumLevel.Information()
    .MinimumLevel.Override("Microsoft.AspNetCore", Serilog.Events.LogEventLevel.Warning)
    .Enrich.FromLogContext()
    .WriteTo.Console()
    .WriteTo.File("logs/app-.txt", rollingInterval: RollingInterval.Day));

// ADIM 2: Controller'ları ekle — API uç noktaları controller sınıflarında tanımlanır.
// NEDEN ValidationFilter: FluentValidation.AspNetCore paketi kullanılmıyor
//       (TECHNICAL_SPECIFICATIONS.md §1'de yok) — bu global filter, DI'a kayıtlı
//       IValidator<T>'leri action çalışmadan önce otomatik çalıştırır (A-03).
builder.Services.AddControllers(options => options.Filters.Add<ValidationFilter>());

// ADIM 3: Swagger/OpenAPI — yazılan endpoint'ler geliştirme ortamında otomatik
// belgelenir ve http://localhost:5001/swagger adresinden test edilir.
// NEDEN: Junior geliştirici ve manuel test için canlı API dokümantasyonu sağlar.
builder.Services.AddEndpointsApiExplorer();
builder.Services.AddSwaggerGen(c =>
{
    c.SwaggerDoc(
        "v1",
        new OpenApiInfo
        {
            Title = "VokabelMeister API",
            Version = "v1",
            Description = "Almanca-Türkçe kelime öğrenme uygulaması Web API'si.",
        }
    );
});

// ADIM 4: Infrastructure (DbContext + repository) ve Application (MediatR,
// AutoMapper, FluentValidation) servislerini tek satırla kaydet.
// NEDEN: Program.cs'i temiz tutar; yeni repository/handler/validator eklenince
//        bu iki extension metodun içeriği değişir, burası değişmez.
builder.Services.AddInfrastructureServices(builder.Configuration);
builder.Services.AddApplicationServices();

// ADIM 5: JWT Authentication — REFERENCE/SECURITY.md §1, TECHNICAL_SPECIFICATIONS.md §5.
// NEDEN: Auth (A-03) henüz yazılmadı ama pipeline'ın doğru yerinde durması ve
//        [Authorize] öznitelikli endpoint'lerin ileride çalışması için burada kurulur.
builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)
    .AddJwtBearer(options =>
    {
        options.TokenValidationParameters = new TokenValidationParameters
        {
            ValidateIssuerSigningKey = true,
            IssuerSigningKey = new SymmetricSecurityKey(
                Encoding.UTF8.GetBytes(builder.Configuration["Jwt:SecretKey"]!)),
            ValidateIssuer = true,
            ValidIssuer = builder.Configuration["Jwt:Issuer"],
            ValidateAudience = true,
            ValidAudience = builder.Configuration["Jwt:Audience"],
            // NEDEN: Sunucu saatleri arasında tolerans tanımamak için sıfırlanır;
            //        access token 15dk gibi kısa ömürlü olduğundan gevşek tolerans gerekmez.
            ClockSkew = TimeSpan.Zero

builder.Services.AddAuthorization();

// ADIM 6: CORS — yalnızca appsettings'teki tanımlı origin'lere izin verir, "*" yok.
// NEDEN: REFERENCE/SECURITY.md §5 — tarayıcıdan yalnızca bilinen Web/Admin/Mobil
//        (Expo) adresleri istek atabilir.
builder.Services.AddCors(options => options.AddPolicy("Default", policy =>
    policy.WithOrigins(builder.Configuration.GetSection("Cors:AllowedOrigins").Get<string[]>() ?? [])
          .AllowAnyMethod()
          .AllowAnyHeader()));

// ADIM 7: Rate Limiting — REFERENCE/SECURITY.md §4: genel 100/dk (kimliği doğrulanmış
// istekler), 10/dk (anonim istekler). Controller/action'lar [EnableRateLimiting("...")]
// ile bu isimli policy'lerden birini seçer (A-03 — AuthController).
// NEDEN sabit pencere (FixedWindow): basit ve öngörülebilir; "login 5/15dk" ve
//       "OTP 3 yanlış" gibi BAŞARISIZ deneme sayaçları bundan ayrıdır — SecurityLog'a
//       bağımlı oldukları için A-04'ten sonraya bırakıldı (bkz. TASK/A_admin_panel_backend.md).
builder.Services.AddRateLimiter(options =>
{
    options.RejectionStatusCode = StatusCodes.Status429TooManyRequests;

    options.AddFixedWindowLimiter("anonymous", limiterOptions =>
    {
        limiterOptions.PermitLimit = 10;
        limiterOptions.Window = TimeSpan.FromMinutes(1);
        limiterOptions.QueueLimit = 0;
    });
    options.AddFixedWindowLimiter("authenticated", limiterOptions =>
    {
        limiterOptions.PermitLimit = 100;
        limiterOptions.Window = TimeSpan.FromMinutes(1);
        limiterOptions.QueueLimit = 0;
    });
});

var app = builder.Build();

// ADIM 8: İstek hattı (pipeline) — yalnızca geliştirmede Swagger arayüzü açılır.
if (app.Environment.IsDevelopment())
{
    app.UseSwagger();
    app.UseSwaggerUI(c => c.SwaggerEndpoint("/swagger/v1/swagger.json", "VokabelMeister API v1"));
}

// NEDEN SIRALAMA: Loglama en dışta durur ki exception fırlasa bile (ExceptionHandlingMiddleware
// onu yakalayıp 500'e çevirse bile) gerçek süre ve nihai durum kodu loglanabilsin.
// Güvenlik başlıkları, hata yanıtı da dahil her yanıta eklenmesi için exception
// middleware'inden önce (dışında) durur.
app.UseMiddleware<RequestResponseLoggingMiddleware>();
app.UseMiddleware<SecurityHeadersMiddleware>();
app.UseMiddleware<ExceptionHandlingMiddleware>();

app.UseHttpsRedirection();
app.UseCors("Default");
app.UseAuthentication();
app.UseAuthorization();

// NEDEN UseAuthorization'dan SONRA: Rate limiter, [EnableRateLimiting] öznitelikli
// endpoint'e ulaşmadan hemen önce devreye girmeli — kimlik/yetki kontrolünden sonra,
// controller'dan hemen önce (A-03).
app.UseRateLimiter();

app.MapControllers();

app.Run();`

        // ACT
        var principal = servis.GetPrincipalFromExpiredToken("bu-bir-jwt-degil");

        // ASSERT
        principal.Should().BeNull();

    private static IConfiguration CreateConfiguration() =>
        new ConfigurationBuilder()
            .AddInMemoryCollection(new Dictionary<string, string?> { ["Jwt:ExpirationMinutes"] = "15" })
            .Build();

    private AuthService CreateService() =>
        new(
            _userRepo.Object,
            _refreshTokenRepo.Object,
            _passwordService.Object,
            _tokenService.Object,
            _emailService.Object,
            _googleValidator.Object,
            _appleValidator.Object,
            CreateConfiguration()
        );

    private static User CreateActiveUser(int id = 1, string email = "test@example.com", string? passwordHash = "hash") =>
        new()
        {
            Id = id,
            Email = email,
            PasswordHash = passwordHash,
            IsActive = true,
            IsEmailVerified = true,
        };

    // AMAÇ: ITokenService mock'unun her testte tutarlı bir access/refresh token üretmesini sağlar.
    private void SetupTokenService()
    {
        _tokenService.Setup(t => t.GenerateAccessToken(It.IsAny<User>())).Returns("access-token");
        _tokenService
            .Setup(t => t.GenerateRefreshToken())
            .Returns(new RefreshTokenResult("refresh-token", DateTime.UtcNow.AddDays(7)));
    }

    /// <summary>
    /// VerifyLoginOtpAsync_AccountWithinGracePeriod_RecoversAccountAndFlagsResponse
    ///
    /// AMAÇ: Soft-delete'li (IsDeleted=true) ama grace period içindeki bir hesabın OTP
    ///       doğrulaması sırasında otomatik kurtarıldığını ve yanıtta accountWasRecovered=true
    ///       döndüğünü doğrulamak.
    /// NEDEN: REFERENCE/SECURITY.md §1 — kullanıcı 30 gün içinde tekrar login olursa
    ///        hesap silme işlemi geri alınır; bu davranış CompleteLoginAsync'in kritik dalı.
    /// </summary>
    [Fact]
    public async Task VerifyLoginOtpAsync_AccountWithinGracePeriod_RecoversAccountAndFlagsResponse()
    {
        // ARRANGE
        var user = CreateActiveUser();
        user.PendingOtpCodeHash = "otp-hash";
        user.PendingOtpCodeExpiresAt = DateTime.UtcNow.AddMinutes(5);
        user.PendingOtpCodePurpose = OtpPurpose.LoginOtp;
        user.IsDeleted = true;
        user.DeletedAt = DateTime.UtcNow.AddDays(-10);
        user.ScheduledDeletionAt = DateTime.UtcNow.AddDays(20);
        _userRepo.Setup(r => r.GetByEmailAsync(user.Email, default)).ReturnsAsync(user);
        _passwordService.Setup(p => p.HashToken(It.IsAny<string>())).Returns("otp-hash");
        SetupTokenService();
        var servis = CreateService();

        // ACT
        var sonuc = await servis.VerifyLoginOtpAsync(new VerifyOtpRequest(user.Email, "123456"), null);

        // ASSERT
        sonuc.AccountWasRecovered.Should().BeTrue();
        user.IsDeleted.Should().BeFalse();
        user.ScheduledDeletionAt.Should().BeNull();
    }

    /// <summary>

        _refreshTokenRepo.Verify(

            Times.Once

    ///

    /// NEDEN: Token Family Pattern'in en kritik davranışı — bir token çalınıp kullanılmışsa

    {
        // ARRANGE
        var kullanilmisToken = new RefreshToken
        {
            TokenFamily = "family-replay",
            ExpiresAt = DateTime.UtcNow.AddDays(1),
            IsUsed = true,
        };
        _passwordService.Setup(p => p.HashToken(It.IsAny<string>())).Returns("hash");
        _refreshTokenRepo.Setup(r => r.GetByTokenHashAsync("hash", default)).ReturnsAsync(kullanilmisToken);
        var servis = CreateService();

        // ACT
        var act = () => servis.RefreshAsync(new RefreshRequest("kullanilmis-token"), null);

        // ASSERT
        await act.Should().ThrowAsync<InvalidRefreshTokenException>();
        _refreshTokenRepo.Verify(r => r.RevokeFamilyAsync("family-replay", default), Times.Once);
    }
