      kod: `// ─────────────────────────────────────────────────────────────────────────────
// WordLearnerDbContext.cs
//
// AMAÇ: EF Core'un veritabanıyla konuştuğu merkezi DbContext sınıfı.
// NEDEN: Tüm entity konfigürasyonlarını tek yerden yükler; soft delete global filtresi
//        ile silinmiş kayıtların sorgulara otomatik karışmasını önler; SaveChangesAsync
//        override'ı UpdatedAt alanını elle set etme zorunluluğunu ortadan kaldırır.
// BAĞIMLILIKLAR: Microsoft.EntityFrameworkCore, WordLearner.Domain.Entities.BaseEntity.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data;

public class WordLearnerDbContext : DbContext
{
    // AMAÇ: DI tarafından enjekte edilen seçenekleri (connection string vb.) taban sınıfa iletir.
    // NEDEN: EF Core'un standart constructor kalıbı; farklı ortamlar (dev/prod/test) için
    //        farklı seçenek setleri enjekte edilebilir.
    public WordLearnerDbContext(DbContextOptions<WordLearnerDbContext> options) : base(options) { }

    // AMAÇ: DbSet'ler feature entity'ler eklendikçe buraya yazılır (A-03'ten itibaren).
    // NEDEN: Şu an A-02 aşamasındayız; DbContext'in temel yapısı hazır, entity'ler henüz yok.

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // AMAÇ: Infrastructure assembly'sindeki tüm IEntityTypeConfiguration<T> sınıflarını
        //       otomatik olarak tarar ve uygular.
        // NEDEN: Her entity için tek tek modelBuilder.ApplyConfiguration(...) çağırmak yerine
        //        assembly taraması yaparız; yeni entity eklendikçe bu satır değişmez.
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

        // AMAÇ: BaseEntity'den türeyen tüm entity'lere global soft delete filtresi uygular.
        // NEDEN: IsDeleted == true olan kayıtlar hiçbir sorguda görünmez; her sorguda
        //        .Where(e => !e.IsDeleted) yazmak zorunda kalmayız.
        //        IgnoreQueryFilters() ile gerektiğinde (admin silinen kayıtları görme) bypass edilir.
        foreach (var entityType in modelBuilder.Model.GetEntityTypes())
        {
            if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
            {
                var parameter = System.Linq.Expressions.Expression.Parameter(entityType.ClrType, "e");
                var property = System.Linq.Expressions.Expression.Property(parameter, nameof(BaseEntity.IsDeleted));
                var notDeleted = System.Linq.Expressions.Expression.Not(property);
                var lambda = System.Linq.Expressions.Expression.Lambda(notDeleted, parameter);
                modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
            }
        }

        base.OnModelCreating(modelBuilder);
    }

    // AMAÇ: Her kayıt güncellendiğinde UpdatedAt alanını otomatik olarak UTC şimdiki zamana set eder.
    // NEDEN: Servis veya repository katmanında her entity.UpdatedAt = DateTime.UtcNow yazmak
    //        kod tekrarına yol açar; bu override ile merkezi olarak yönetilir.
    public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
    {
        foreach (var entry in ChangeTracker.Entries<BaseEntity>())
        {
            if (entry.State == EntityState.Modified)
                entry.Entity.UpdatedAt = DateTime.UtcNow;

            // NEDEN: Yeni eklenen entity'lerde CreatedAt varsayılan olarak DateTime.UtcNow ile
            //        başlatılıyor (BaseEntity'de); UpdatedAt ise burada dokunulmadığı için
            //        insert sonrası null kalır — "hiç güncellenmedi" bilgisini korur.
        }

        return base.SaveChangesAsync(cancellationToken);
    }
}`
    }

      kod: `// ─────────────────────────────────────────────────────────────────────────────
// EntityNotFoundException.cs
//
// AMAÇ: İstenilen entity DB'de bulunamadığında fırlatılan özel exception.
// NEDEN: Genel KeyNotFoundException veya Exception yerine özel tip kullanmak,
//        global exception middleware'inin bu durumu yakalayıp 404 döndürmesini sağlar.
// BAĞIMLILIKLAR: Yok — saf C# sınıfı.
// ─────────────────────────────────────────────────────────────────────────────

namespace WordLearner.Application.Common.Exceptions;

public class EntityNotFoundException : Exception
{
    public EntityNotFoundException(string message) : base(message) { }

    // AMAÇ: Entity tipini ve aranan anahtarı alıp standart formatta mesaj üreten kısayol.
    // NEDEN: Repository<T> gibi çağıranların "{Entity} not found: Id={key}" string'ini
    //        elle interpolate etmesini önler; format tek yerden yönetilir. Mesaj İngilizce
    //        yazılır (CODING_STANDARDS.md §1 — log/exception .Message İngilizce kuralı).
    public EntityNotFoundException(Type entityType, object key)
        : base($"{entityType.Name} not found: Id={key}") { }
}`

      num: 4, tur: 'repository',
      baslik: 'IRepository.cs', dosya: 'Application/Interfaces/Repositories/IRepository.cs',
      aciklama: 'Arayüz (interface) nedir: bir sınıfın "neler yapabildiğini" (imza/sözleşme) tanımlar ama "nasıl yaptığını" söylemez — `IRepository<T>` "bir GetByIdAsync metodu olmalı" der, ama bu metodun EF Core mu yoksa başka bir teknoloji mi kullandığını belirtmez, o kararı somut sınıf (adım 5\'teki Repository<T>) verir. Repository pattern nedir: veritabanı erişim kodunu (SQL/EF Core sorguları) iş mantığından ayıran, "kayıt getir/ekle/güncelle/sil" gibi işlemleri tek bir yerde toplayan tasarım deseni — bu sayede servis katmanı "veri NASIL saklanıyor" ile değil "hangi veriye ihtiyacım var" ile ilgilenir. Bu arayüz somut implementasyona değil soyutlamaya bağımlılık kurar (Dependency Inversion Principle: üst katman alt katmanın DETAYINA değil, bir SÖZLEŞMEYE bağımlı olmalı) — bu sayede testlerde gerçek veritabanına dokunmadan sahte (mock) bir IRepository enjekte edilebilir, testler hızlı ve DB\'den bağımsız kalır. EntityNotFoundException tanımlı olduktan sonra yazılır çünkü GetByIdAsync\'in döndürdüğü null\'u servis katmanı bu exception ile işleyecek.',
      kod: `// ─────────────────────────────────────────────────────────────────────────────
// IRepository.cs
//
// AMAÇ: Tüm repository'lerin uygulaması gereken generic CRUD sözleşmesi.
// NEDEN: Servis katmanı somut repository implementasyonuna değil bu arayüze bağımlıdır;
//        böylece testlerde mock repository kolayca enjekte edilebilir (bağımlılığı tersine çevirme).
// BAĞIMLILIKLAR: WordLearner.Domain.Entities.BaseEntity.
// ─────────────────────────────────────────────────────────────────────────────

using WordLearner.Domain.Entities;

namespace WordLearner.Application.Interfaces.Repositories;

public interface IRepository<T> where T : BaseEntity
{
    // AMAÇ: Birincil anahtara göre tek kayıt getirir. Bulunamazsa null döner.
    // NEDEN: Nullable dönüş tipi ile "bulunamadı" durumu açıkça ifade edilir;
    //        servis katmanı null kontrolü yaparak EntityNotFoundException fırlatır.
    Task<T?> GetByIdAsync(int id, CancellationToken ct = default);

    // AMAÇ: Soft delete filtresi aktifken tüm kayıtları getirir.
    // NEDEN: Genel liste işlemleri için temel metot; özel filtreler için
    //        feature repository'ler bu interface'i genişletir.
    Task<IEnumerable<T>> GetAllAsync(CancellationToken ct = default);

    // AMAÇ: Yeni kayıt ekler ve eklenen entity'yi (Id dolu hâliyle) döner.
    // NEDEN: Dönüş değeri sayesinde controller, oluşturulan kaydın Id'sini
    //        hemen alıp 201 Created response'una ekleyebilir.
    //        userId verilirse BaseEntity.CreatedByUserId/UpdatedByUserId'ye yazılır.
    //        NEDEN null kalabilir (Auth/QrLogin'deki gerçek kullanım): kaydın
    //        SAHİBİ olan aktör henüz bir Id'ye sahip değilse (self-servis kayıt —
    //        RegisterCommand, LoginWithGoogle/AppleCommand'ın yeni-kullanıcı dalı,
    //        GenerateQrLoginCommand — kaydı oluşturan işlem kendi kimliğini de o
    //        anda üretiyor) null geçilir; bir admin başkası adına oluşturursa
    //        adminin Id'si geçilir (bkz. wiki Auth_Domain.md "self-servis kayıtta
    //        null kalır" notu).
    Task<T> AddAsync(T entity, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Mevcut kaydı günceller. UpdatedAt WordLearnerDbContext.SaveChangesAsync'te otomatik set edilir.
    // NEDEN: userId verilirse BaseEntity.UpdatedByUserId'ye yazılır — kaydın
    //        SAHİBİ kendi eylemiyle güncelliyorsa o kullanıcının Id'si geçilir;
    //        sistemin kendiliğinden yaptığı geçişlerde (ör. süresi dolmuş bir QR
    //        oturumunun otomatik Expired'a çevrilmesi) aktör olmadığı için null kalır.
    Task UpdateAsync(T entity, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Kaydı fiziksel olarak silmek yerine IsDeleted=true, DeletedAt=UtcNow yapar (soft delete).
    // NEDEN: Silinen veriler DB'de tutulur; audit trail korunur; admin gerektiğinde geri yükleyebilir.
    //        userId verilirse BaseEntity.DeletedByUserId/UpdatedByUserId'ye yazılır.
    Task SoftDeleteAsync(int id, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Birden fazla değişikliği tek seferde kaydetmek gerektiğinde kullanılır.
    // NEDEN: AddAsync/UpdateAsync zaten SaveChanges çağırır; bu metot yalnızca
    //        birden fazla işlemi toplu commit etmek için vardır.
    Task SaveChangesAsync(CancellationToken ct = default);
}`
    }

      aciklama: 'Generic (jenerik) sınıf nedir: `Repository<T>` yazımındaki `T` bir "yer tutucu tip" — bu sınıf User için de, ileride Word için de, hangi entity verilirse onun için de aynı CRUD kodunu ÇALIŞTIRABİLİR hâle gelir (`T : BaseEntity` kısıtı, T\'nin illa BaseEntity\'den türemiş bir entity olmasını zorunlu kılar). Bu sayede her yeni entity için AddAsync/GetByIdAsync gibi metotları yeniden yazmaya gerek kalmaz — bir kez yazılır, hepsi kullanır (DRY). `virtual` metot nedir: bu anahtar kelime, alt sınıfların (ör. ileride yazılacak UserRepository) bu metodu `override` ederek DAVRANIŞINI değiştirebileceğini belirtir — ör. UserRepository, GetByIdAsync\'i override edip `.Include(u => u.RefreshTokens)` ekleyebilir; virtual olmasaydı bu mümkün olmazdı. WordLearnerDbContext ve EntityNotFoundException hazır olduktan sonra yazılır — her ikisine de bağımlıdır (DbContext olmadan sorgu atılamaz, EntityNotFoundException olmadan SoftDeleteAsync "bulunamadı" durumunu bildiremez). NOT (denetim sonrası düzeltme, 2026-07-11): UpdateAsync içindeki gereksiz \`_set.Update(entity)\` çağrısı kaldırıldı — bu Repository\'den GetByIdAsync ile alınan bir entity zaten DbContext tarafından takip edilir, \`_set.Update(entity)\` çağırmak TÜM property\'leri (değişmemiş olanlar dahil) Modified işaretleyip UPDATE ifadesini gereksiz yere genişletiyordu; EF\'in change tracking\'i zaten yalnızca gerçekten değişen kolonları yazar.',

    // AMAÇ: Soft delete filtresi aktifken Id'ye göre kayıt getirir.

    public virtual Task<T?> GetByIdAsync(int id, CancellationToken ct = default) =>
        _set.FirstOrDefaultAsync(e => e.Id == id, ct);

    // AMAÇ: Filtresiz tüm (silinmemiş) kayıtları belleğe yükler.
    // NEDEN: virtual — feature repository sayfalama veya projeksiyon için override edebilir.
    public virtual async Task<IEnumerable<T>> GetAllAsync(CancellationToken ct = default) =>
        await _set.ToListAsync(ct);

        int? userId = null,
        CancellationToken ct = default

        await _db.SaveChangesAsync(ct);
        return entity;

    // AMAÇ: Mevcut entity'yi günceller. UpdatedAt WordLearnerDbContext.SaveChangesAsync'te otomatik set edilir.

    //       \`_set.Update(entity)\` çağırmak entity'nin TÜM property'lerini (değişmemiş
    //       olanlar dahil) Modified işaretler ve UPDATE ifadesini gereksiz yere
    //       genişletir; hâlbuki EF'in otomatik change tracking'i zaten yalnızca

    public virtual async Task UpdateAsync(
        T entity,
        int? userId = null,

        await _db.SaveChangesAsync(ct);
    }

    // AMAÇ: Kaydı fiziksel silmek yerine IsDeleted ve DeletedAt alanlarını set eder.
    // NEDEN: Fiziksel silme geri alınamaz; soft delete ile veri kaybı olmaz,

        CancellationToken ct = default

        entity.IsDeleted = true;
        entity.DeletedAt = DateTime.UtcNow;
        entity.DeletedByUserId = userId;
        await UpdateAsync(entity, userId, ct);

using System.Net;
using System.Text.Json;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Middleware;

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(RequestDelegate next, ILogger<ExceptionHandlingMiddleware> logger)
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları Türkçe; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(ex, "Unhandled exception caught: {Method} {Path}",
                context.Request.Method, context.Request.Path);

            await WriteErrorResponseAsync(context, ex);
        }
    }

    // AMAÇ: Exception tipine göre HTTP durum kodu + hata kodu + mesaj eşlemesi yapıp
    //       ApiErrorResponse'u JSON olarak yanıta yazar.
    // NEDEN: EntityNotFoundException bilinen bir iş kuralı olduğu için 404 + kendi
    //        mesajıyla döner; bilinmeyen her exception'ın gerçek mesajı istemciye
    //        sızdırılmaz (bilgi ifşası riski) — yerine sabit, güvenli bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code, message) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "NOT_FOUND", ex.Message),
            _ => (HttpStatusCode.InternalServerError, "INTERNAL_SERVER_ERROR", "An unexpected error occurred.")
        };

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase });

        return context.Response.WriteAsync(json);
    }
}

namespace WordLearner.API.Middleware;

public class SecurityHeadersMiddleware
{
    private readonly RequestDelegate _next;

    public SecurityHeadersMiddleware(RequestDelegate next) => _next = next;

    // AMAÇ: Yanıt başlıklarını, gövde yazılmadan önce ekleyip pipeline'ı devam ettirir.
    // NEDEN: Başlıklar response başlamadan (headers gönderilmeden) eklenmelidir;
    //        bu yüzden _next(context) çağrısından ÖNCE set edilir.
    public async Task InvokeAsync(HttpContext context)
    {
        // NEDEN: Sayfanın başka bir sitede <iframe> içine alınmasını (clickjacking) engeller.
        context.Response.Headers["X-Frame-Options"] = "DENY";

        // NEDEN: Tarayıcının Content-Type'ı görmezden gelip dosyayı "tahmin ederek"
        //        çalıştırmasını (MIME sniffing) engeller.
        context.Response.Headers["X-Content-Type-Options"] = "nosniff";

        // NEDEN: Farklı origin'e giden isteklerde tam URL yerine yalnızca origin'i gönderir;
        //        query string'deki hassas verilerin (token, id) sızmasını azaltır.
        context.Response.Headers["Referrer-Policy"] = "strict-origin-when-cross-origin";

        // NEDEN: Yalnızca kendi origin'inden script/stil yüklenmesine izin vererek
        //        XSS ile enjekte edilen dış kaynaklı script'leri engeller.
        context.Response.Headers["Content-Security-Policy"] = "default-src 'self'";

        // NEDEN: Uygulama konum/mikrofon/kamera kullanmadığı için tarayıcı bu
        //        API'lere erişimi baştan reddeder (izin istenemez).
        context.Response.Headers["Permissions-Policy"] = "geolocation=(), microphone=(), camera=()";

        await _next(context);
    }
}

public class RequestResponseLoggingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<RequestResponseLoggingMiddleware> _logger;

    public RequestResponseLoggingMiddleware(RequestDelegate next, ILogger<RequestResponseLoggingMiddleware> logger)
    {

    // AMAÇ: İsteğin başlangıcını, bitişini ve geçen süreyi (ms) loglar.

    public async Task InvokeAsync(HttpContext context)
    {
        var stopwatch = Stopwatch.StartNew();

            context.Request.Method, context.Request.Path);

        try
        {
            await _next(context);
        }
        finally
        {
            stopwatch.Stop();
            _logger.LogInformation("Request finished: {Method} {Path} → {StatusCode} ({ElapsedMs}ms)",
                context.Request.Method, context.Request.Path,
                context.Response.StatusCode, stopwatch.ElapsedMilliseconds);
        }
    }

//                WordLearner.API.Middleware (SecurityHeaders/ExceptionHandling/RequestResponseLogging).
//
// NOT (A-02 — Ortak Altyapı, tamamlandı): DbContext, JWT auth, CORS, Serilog
//   (konsol+dosya), FluentValidation, MediatR, AutoMapper kayıtları ve güvenlik
//   başlıkları/global exception/istek-yanıt log middleware'leri burada kuruldu.
//   Serilog'un MSSqlServer (ApplicationLog) sink'i A-04'te eklenecek — o tablo
//   henüz bir migration ile oluşturulmadı (bkz. TASK/A_admin_panel_backend.md A-04).
// ─────────────────────────────────────────────────────────────────────────────

using System.Text;
using Microsoft.AspNetCore.Authentication.JwtBearer;
using Microsoft.IdentityModel.Tokens;
using Microsoft.OpenApi.Models;
using Serilog;
using WordLearner.API.Middleware;
using WordLearner.Application.Extensions;
using WordLearner.Infrastructure.Extensions;

var builder = WebApplication.CreateBuilder(args);

// ADIM 1: Serilog — konsol + dosya sink. DB (ApplicationLog) sink'i A-04'te eklenir.
// NEDEN: _logger.LogInformation/.LogError çağrıları artık ASP.NET Core'un varsayılan
//        konsol logger'ı yerine Serilog üzerinden akar; ileride tek satırla DB sink eklenebilir.
// NEDEN Override: appsettings.json'daki Logging:LogLevel:Microsoft.AspNetCore=Warning
//        ayarı yalnızca ASP.NET Core'un kendi builtin logger'ı içindir; Serilog kod
//        üzerinden yapılandırıldığı için aynı susturma burada elle tekrarlanır —
//        aksi halde framework'ün "Request starting/finished" logları RequestResponseLoggingMiddleware
//        ile çakışıp konsolu ikiye katlar.
builder.Host.UseSerilog((context, configuration) => configuration
    .MinimumLevel.Information()
    .MinimumLevel.Override("Microsoft.AspNetCore", Serilog.Events.LogEventLevel.Warning)
    .Enrich.FromLogContext()
    .WriteTo.Console()
    .WriteTo.File("logs/app-.txt", rollingInterval: RollingInterval.Day));

// ADIM 2: Controller'ları ekle — API uç noktaları controller sınıflarında tanımlanır.
builder.Services.AddControllers();

// ADIM 3: Swagger/OpenAPI — yazılan endpoint'ler geliştirme ortamında otomatik
// belgelenir ve http://localhost:5001/swagger adresinden test edilir.
// NEDEN: Junior geliştirici ve manuel test için canlı API dokümantasyonu sağlar.
builder.Services.AddEndpointsApiExplorer();
builder.Services.AddSwaggerGen(c =>
{
    c.SwaggerDoc(
        "v1",
        new OpenApiInfo
        {
            Title = "VokabelMeister API",
            Version = "v1",
            Description = "Almanca-Türkçe kelime öğrenme uygulaması Web API'si.",
        }
    );
});

// ADIM 4: Infrastructure (DbContext + repository) ve Application (MediatR,
// AutoMapper, FluentValidation) servislerini tek satırla kaydet.
// NEDEN: Program.cs'i temiz tutar; yeni repository/handler/validator eklenince
//        bu iki extension metodun içeriği değişir, burası değişmez.
builder.Services.AddInfrastructureServices(builder.Configuration);
builder.Services.AddApplicationServices();

// ADIM 5: JWT Authentication — REFERENCE/SECURITY.md §1, TECHNICAL_SPECIFICATIONS.md §5.
// NEDEN: Auth (A-03) henüz yazılmadı ama pipeline'ın doğru yerinde durması ve
//        [Authorize] öznitelikli endpoint'lerin ileride çalışması için burada kurulur.
builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)
    .AddJwtBearer(options =>
    {
        options.TokenValidationParameters = new TokenValidationParameters
        {
            ValidateIssuerSigningKey = true,
            IssuerSigningKey = new SymmetricSecurityKey(
                Encoding.UTF8.GetBytes(builder.Configuration["Jwt:SecretKey"]!)),
            ValidateIssuer = true,
            ValidIssuer = builder.Configuration["Jwt:Issuer"],
            ValidateAudience = true,
            ValidAudience = builder.Configuration["Jwt:Audience"],
            // NEDEN: Sunucu saatleri arasında tolerans tanımamak için sıfırlanır;
            //        access token 15dk gibi kısa ömürlü olduğundan gevşek tolerans gerekmez.
            ClockSkew = TimeSpan.Zero
        };
    });
builder.Services.AddAuthorization();

// ADIM 6: CORS — yalnızca appsettings'teki tanımlı origin'lere izin verir, "*" yok.
// NEDEN: REFERENCE/SECURITY.md §5 — tarayıcıdan yalnızca bilinen Web/Admin/Mobil
//        (Expo) adresleri istek atabilir.
builder.Services.AddCors(options => options.AddPolicy("Default", policy =>
    policy.WithOrigins(builder.Configuration.GetSection("Cors:AllowedOrigins").Get<string[]>() ?? [])
          .AllowAnyMethod()
          .AllowAnyHeader()));

var app = builder.Build();

// ADIM 7: İstek hattı (pipeline) — yalnızca geliştirmede Swagger arayüzü açılır.
if (app.Environment.IsDevelopment())
{
    app.UseSwagger();
    app.UseSwaggerUI(c => c.SwaggerEndpoint("/swagger/v1/swagger.json", "VokabelMeister API v1"));
}

// NEDEN UseHttpsRedirection EN BAŞTA (2026-07-12'de düzeltildi — önceden loglama/güvenlik
// başlıkları/exception middleware'lerinden SONRA çağrılıyordu): düz HTTP ile gelen bir
// istek hiçbir iş yapılmadan (loglanmadan, başlık eklenmeden) doğrudan HTTPS'e yönlendirilmeli
// — ASP.NET Core'un standart konvansiyonu budur.
app.UseHttpsRedirection();

// NEDEN SIRALAMA: Loglama en dışta durur ki exception fırlasa bile (ExceptionHandlingMiddleware
// onu yakalayıp 500'e çevirse bile) gerçek süre ve nihai durum kodu loglanabilsin.
// Güvenlik başlıkları, hata yanıtı da dahil her yanıta eklenmesi için exception
// middleware'inden önce (dışında) durur.
app.UseMiddleware<RequestResponseLoggingMiddleware>();
app.UseMiddleware<SecurityHeadersMiddleware>();
app.UseMiddleware<ExceptionHandlingMiddleware>();

app.UseCors("Default");
app.UseAuthentication();
app.UseAuthorization();

app.MapControllers();

app.Run();`
    }
  ]
};
</script>
<script src="render.js"></script>
</body>
</html>
