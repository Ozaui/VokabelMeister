      aciklama: 'EF Core\'un veritabanıyla konuştuğu merkezi DbContext. BaseEntity\'den sonra ikinci yazılır çünkü soft delete filtresi BaseEntity.IsDeleted\'a bağımlıdır. Üç kritik özelliği var: (1) ApplyConfigurationsFromAssembly — yeni entity eklenince bu satır değişmez. (2) Global soft delete query filter — IsDeleted==false filtresi otomatik uygulanır. (3) SaveChangesAsync override — UpdatedAt otomatik güncellenir.',
      kod: `// ─────────────────────────────────────────────────────────────────────────────
// WordLearnerDbContext.cs
//
// AMAÇ: EF Core'un veritabanıyla konuştuğu merkezi DbContext sınıfı.
// NEDEN: Tüm entity konfigürasyonlarını tek yerden yükler; soft delete global filtresi
//        ile silinmiş kayıtların sorgulara otomatik karışmasını önler; SaveChangesAsync
//        override'ı UpdatedAt alanını elle set etme zorunluluğunu ortadan kaldırır.
// BAĞIMLILIKLAR: Microsoft.EntityFrameworkCore, WordLearner.Domain.Entities.BaseEntity.
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using WordLearner.Domain.Entities;

namespace WordLearner.Infrastructure.Data;

public class WordLearnerDbContext : DbContext
{
    // AMAÇ: DI tarafından enjekte edilen seçenekleri (connection string vb.) taban sınıfa iletir.
    // NEDEN: EF Core'un standart constructor kalıbı; farklı ortamlar (dev/prod/test) için
    //        farklı seçenek setleri enjekte edilebilir.
    public WordLearnerDbContext(DbContextOptions<WordLearnerDbContext> options) : base(options) { }

    // AMAÇ: DbSet'ler feature entity'ler eklendikçe buraya yazılır (A-03'ten itibaren).
    // NEDEN: Şu an A-02 aşamasındayız; DbContext'in temel yapısı hazır, entity'ler henüz yok.

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // AMAÇ: Infrastructure assembly'sindeki tüm IEntityTypeConfiguration<T> sınıflarını
        //       otomatik olarak tarar ve uygular.
        // NEDEN: Her entity için tek tek modelBuilder.ApplyConfiguration(...) çağırmak yerine
        //        assembly taraması yaparız; yeni entity eklendikçe bu satır değişmez.
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(WordLearnerDbContext).Assembly);

        // AMAÇ: BaseEntity'den türeyen tüm entity'lere global soft delete filtresi uygular.
        // NEDEN: IsDeleted == true olan kayıtlar hiçbir sorguda görünmez; her sorguda
        //        .Where(e => !e.IsDeleted) yazmak zorunda kalmayız.
        //        IgnoreQueryFilters() ile gerektiğinde (admin silinen kayıtları görme) bypass edilir.
        foreach (var entityType in modelBuilder.Model.GetEntityTypes())
        {
            if (typeof(BaseEntity).IsAssignableFrom(entityType.ClrType))
            {
                var parameter = System.Linq.Expressions.Expression.Parameter(entityType.ClrType, "e");
                var property = System.Linq.Expressions.Expression.Property(parameter, nameof(BaseEntity.IsDeleted));
                var notDeleted = System.Linq.Expressions.Expression.Not(property);
                var lambda = System.Linq.Expressions.Expression.Lambda(notDeleted, parameter);
                modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
            }
        }

        base.OnModelCreating(modelBuilder);
    }

    // AMAÇ: Her kayıt güncellendiğinde UpdatedAt alanını otomatik olarak UTC şimdiki zamana set eder.
    // NEDEN: Servis veya repository katmanında her entity.UpdatedAt = DateTime.UtcNow yazmak
    //        kod tekrarına yol açar; bu override ile merkezi olarak yönetilir.
    public override Task<int> SaveChangesAsync(CancellationToken cancellationToken = default)
    {
        foreach (var entry in ChangeTracker.Entries<BaseEntity>())
        {
            if (entry.State == EntityState.Modified)
                entry.Entity.UpdatedAt = DateTime.UtcNow;

            // NEDEN: Yeni eklenen entity'lerde CreatedAt varsayılan olarak DateTime.UtcNow ile
            //        başlatılıyor (BaseEntity'de); UpdatedAt ise burada dokunulmadığı için
            //        insert sonrası null kalır — "hiç güncellenmedi" bilgisini korur.
        }

        return base.SaveChangesAsync(cancellationToken);
    }
}`
    }

// IRepository.cs
//
// AMAÇ: Tüm repository'lerin uygulaması gereken generic CRUD sözleşmesi.
// NEDEN: Servis katmanı somut repository implementasyonuna değil bu arayüze bağımlıdır;
//        böylece testlerde mock repository kolayca enjekte edilebilir (bağımlılığı tersine çevirme).
// BAĞIMLILIKLAR: WordLearner.Domain.Entities.BaseEntity.
// ─────────────────────────────────────────────────────────────────────────────

using WordLearner.Domain.Entities;

namespace WordLearner.Application.Interfaces.Repositories;

public interface IRepository<T> where T : BaseEntity
{
    // AMAÇ: Birincil anahtara göre tek kayıt getirir. Bulunamazsa null döner.
    // NEDEN: Nullable dönüş tipi ile "bulunamadı" durumu açıkça ifade edilir;
    //        servis katmanı null kontrolü yaparak EntityNotFoundException fırlatır.
    Task<T?> GetByIdAsync(int id, CancellationToken ct = default);

    // AMAÇ: Soft delete filtresi aktifken tüm kayıtları getirir.
    // NEDEN: Genel liste işlemleri için temel metot; özel filtreler için
    //        feature repository'ler bu interface'i genişletir.
    Task<IEnumerable<T>> GetAllAsync(CancellationToken ct = default);

    // AMAÇ: Yeni kayıt ekler ve eklenen entity'yi (Id dolu hâliyle) döner.
    // NEDEN: Dönüş değeri sayesinde controller, oluşturulan kaydın Id'sini
    //        hemen alıp 201 Created response'una ekleyebilir.
    //        userId verilirse BaseEntity.CreatedByUserId/UpdatedByUserId'ye yazılır
    //        (Auth/A-03 tamamlanana kadar çağıran taraf null geçer).
    Task<T> AddAsync(T entity, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Mevcut kaydı günceller. UpdatedAt WordLearnerDbContext.SaveChangesAsync'te otomatik set edilir.
    // NEDEN: userId verilirse BaseEntity.UpdatedByUserId'ye yazılır.
    Task UpdateAsync(T entity, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Kaydı fiziksel olarak silmek yerine IsDeleted=true, DeletedAt=UtcNow yapar (soft delete).
    // NEDEN: Silinen veriler DB'de tutulur; audit trail korunur; admin gerektiğinde geri yükleyebilir.
    //        userId verilirse BaseEntity.DeletedByUserId/UpdatedByUserId'ye yazılır.
    Task SoftDeleteAsync(int id, int? userId = null, CancellationToken ct = default);

    // AMAÇ: Birden fazla değişikliği tek seferde kaydetmek gerektiğinde kullanılır.
    // NEDEN: AddAsync/UpdateAsync zaten SaveChanges çağırır; bu metot yalnızca
    //        birden fazla işlemi toplu commit etmek için vardır.
    Task SaveChangesAsync(CancellationToken ct = default);
}`

      num: 5, tur: 'repository',
      baslik: 'Repository.cs', dosya: 'Infrastructure/Repositories/Repository.cs',
      aciklama: 'IRepository<T> arayüzünün EF Core tabanlı generic implementasyonu. WordLearnerDbContext ve EntityNotFoundException hazır olduktan sonra yazılır — her ikisine de bağımlıdır. Tüm metotlar virtual olduğu için feature repository\'ler Include() ekleyerek override edebilir. SoftDeleteAsync bulunamazsa EntityNotFoundException fırlatır.',
      kod: `// ─────────────────────────────────────────────────────────────────────────────
// Repository.cs
//
// AMAÇ: IRepository<T> arayüzünün EF Core tabanlı generic implementasyonu.
// NEDEN: Tekrar eden CRUD kodunu tek sınıfta toplar; feature repository'ler
//        yalnızca ek sorgular için bu sınıfı miras alır, temel işlemleri yeniden yazmaz.
// BAĞIMLILIKLAR: EF Core, WordLearnerDbContext, IRepository<T>, BaseEntity,
//                EntityNotFoundException (Application katmanından).
// ─────────────────────────────────────────────────────────────────────────────

using Microsoft.EntityFrameworkCore;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Interfaces.Repositories;
using WordLearner.Domain.Entities;
using WordLearner.Infrastructure.Data;

namespace WordLearner.Infrastructure.Repositories;

public class Repository<T> : IRepository<T> where T : BaseEntity
{
    protected readonly WordLearnerDbContext _db;
    protected readonly DbSet<T> _set;

    // AMAÇ: DbContext ve DbSet referanslarını DI aracılığıyla alır.
    // NEDEN: _set kısayolu sayesinde alt sınıflar her seferinde _db.Set<T>() yazmak zorunda kalmaz.
    public Repository(WordLearnerDbContext db)
    {
        _db = db;
        _set = db.Set<T>();
    }

    // AMAÇ: Soft delete filtresi aktifken Id'ye göre kayıt getirir.
    // NEDEN: virtual — feature repository gerektiğinde Include() ekleyerek override edebilir.
    public virtual Task<T?> GetByIdAsync(int id, CancellationToken ct = default)
        => _set.FirstOrDefaultAsync(e => e.Id == id, ct);

    // AMAÇ: Filtresiz tüm (silinmemiş) kayıtları belleğe yükler.
    // NEDEN: virtual — feature repository sayfalama veya projeksiyon için override edebilir.
    public virtual async Task<IEnumerable<T>> GetAllAsync(CancellationToken ct = default)
        => await _set.ToListAsync(ct);

    // AMAÇ: Yeni entity'yi DB'ye ekler ve Id'si dolu hâliyle geri döner.
    // NEDEN: userId verilirse CreatedByUserId/UpdatedByUserId set edilir (kim oluşturdu).
    public virtual async Task<T> AddAsync(T entity, int? userId = null, CancellationToken ct = default)
    {
        entity.CreatedByUserId = userId;
        entity.UpdatedByUserId = userId;
        await _set.AddAsync(entity, ct);
        await _db.SaveChangesAsync(ct);
        return entity;
    }

    // AMAÇ: Mevcut entity'yi günceller. UpdatedAt WordLearnerDbContext.SaveChangesAsync'te otomatik set edilir.
    // NEDEN: userId verilirse UpdatedByUserId set edilir (kim güncelledi).
    public virtual async Task UpdateAsync(T entity, int? userId = null, CancellationToken ct = default)
    {
        entity.UpdatedByUserId = userId;
        _set.Update(entity);
        await _db.SaveChangesAsync(ct);
    }

    // AMAÇ: Kaydı fiziksel silmek yerine IsDeleted ve DeletedAt alanlarını set eder.
    // NEDEN: Fiziksel silme geri alınamaz; soft delete ile veri kaybı olmaz,
    //        admin silinmiş kaydı görmek istediğinde IgnoreQueryFilters() kullanır.
    //        userId verilirse DeletedByUserId set edilir (kim sildi).
    public virtual async Task SoftDeleteAsync(int id, int? userId = null, CancellationToken ct = default)
    {
        var entity = await GetByIdAsync(id, ct)
            ?? throw new EntityNotFoundException(typeof(T), id);

        entity.IsDeleted = true;
        entity.DeletedAt = DateTime.UtcNow;
        entity.DeletedByUserId = userId;
        await UpdateAsync(entity, userId, ct);
    }

    // AMAÇ: Birden fazla değişikliği toplu olarak DB'ye yazar.
    public Task SaveChangesAsync(CancellationToken ct = default)
        => _db.SaveChangesAsync(ct);
}`
    }

using Microsoft.EntityFrameworkCore;
using Microsoft.Extensions.Configuration;
using Microsoft.Extensions.DependencyInjection;
using WordLearner.Infrastructure.Data;

namespace WordLearner.Infrastructure.Extensions;

public static class InfrastructureServiceExtensions
{
    // AMAÇ: DbContext ve infrastructure servislerini IServiceCollection'a ekler.
    // NEDEN: Program.cs'de tek satır (builder.Services.AddInfrastructureServices(config))
    //        ile tüm altyapı hazır hâle gelir; composition root temiz kalır.
    // NASIL: Configuration'dan connection string okunur, DbContext Scoped olarak kaydedilir.
    //        Yeni repository'ler ilerleyen task'larda (A-03+) buraya eklenir.
    public static IServiceCollection AddInfrastructureServices(
        this IServiceCollection services,
        IConfiguration configuration)
    {
        // NEDEN Scoped: DbContext request başına bir instance olmalı;
        //       Singleton olsaydı eş zamanlı istekler aynı context'i paylaşırdı (thread-safety sorunu).
        services.AddDbContext<WordLearnerDbContext>(options =>
            options.UseSqlServer(configuration.GetConnectionString("DefaultConnection")));

        // NOT: Feature repository'ler (IUserRepository, IWordRepository vb.) kendi task'larında
        //      (A-03, A-05 ...) bu metoda eklenecek.

        return services;
    }
}`

// BAĞIMLILIKLAR: xUnit, FluentAssertions, Microsoft.EntityFrameworkCore.InMemory,

//                WordLearner.Infrastructure.Data.WordLearnerDbContext.

using FluentAssertions;

namespace WordLearner.Tests.Repositories;

// AMAÇ: Repository<T> testleri için kullanılan, yalnızca bu test dosyasına özel minimal entity.
// NEDEN: Projede henüz (A-02 aşamasında) hiçbir feature entity'si yok; gerçek bir entity
//        yazmak yerine BaseEntity'den türeyen sahte bir sınıf kullanmak, testi gerçek
//        feature'lardan (A-03+) bağımsız ve DB'ye dokunmadan (in-memory) çalıştırmayı sağlar.
public class TestEntity : BaseEntity
{
    public string Name { get; set; } = string.Empty;
}

// AMAÇ: TestEntity'yi EF Core modeline dahil eden, yalnızca test projesinde kullanılan DbContext.
// NEDEN: WordLearnerDbContext'te TestEntity için bir DbSet property'si yok (ve olmamalı —
//        test entity'si production koduna sızmamalı); bu alt sınıf OnModelCreating'i override
//        ederek TestEntity'yi modele elle ekler. Böylece WordLearnerDbContext'in gerçek
//        (BaseEntity.IsDeleted'a bağlı) soft delete filtresi TestEntity üzerinde de çalışır.
public class TestDbContext : WordLearnerDbContext
{
    public TestDbContext(DbContextOptions<WordLearnerDbContext> options)
        : base(options) { }

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // NEDEN: base.OnModelCreating soft delete filtresini modeldeki tüm BaseEntity
        //        türevlerine uygular; TestEntity bu döngüden önce modele eklenmeli.
        modelBuilder.Entity<TestEntity>();
        base.OnModelCreating(modelBuilder);
    }
}

    private static TestDbContext CreateContext()

using System.Net;
using System.Text.Json;
using WordLearner.Application.Common.Exceptions;
using WordLearner.Application.Common.Models;

namespace WordLearner.API.Middleware;

public class ExceptionHandlingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<ExceptionHandlingMiddleware> _logger;

    // AMAÇ: Pipeline'daki bir sonraki middleware'i ve loglama servisini enjekte eder.
    public ExceptionHandlingMiddleware(RequestDelegate next, ILogger<ExceptionHandlingMiddleware> logger)
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteği bir sonraki middleware'e iletir; sırasında fırlatılan her
    //       exception'ı yakalayıp standart hata yanıtına çevirir.
    // NEDEN: try/catch burada tek bir noktada olduğu için controller'lar yalnızca
    //        "mutlu yol" veya bilinen iş kuralı exception'larına (EntityNotFoundException
    //        vb.) odaklanır; beklenmeyen her şey burada 500'e düşer.
    public async Task InvokeAsync(HttpContext context)
    {
        try
        {
            await _next(context);
        }
        catch (Exception ex)
        {
            // NEDEN: CODING_STANDARDS.md §1 — tüm log mesajları Türkçe; exception detayı
            //        (stack trace) yalnızca ApplicationLog'a (A-04'te DB sink) gider, istemciye asla.
            _logger.LogError(ex, "İşlenmemiş hata yakalandı: {Method} {Path}",
                context.Request.Method, context.Request.Path);

            await WriteErrorResponseAsync(context, ex);
        }
    }

    // AMAÇ: Exception tipine göre HTTP durum kodu + hata kodu + mesaj eşlemesi yapıp
    //       ApiErrorResponse'u JSON olarak yanıta yazar.
    // NEDEN: EntityNotFoundException bilinen bir iş kuralı olduğu için 404 + kendi
    //        mesajıyla döner; bilinmeyen her exception'ın gerçek mesajı istemciye
    //        sızdırılmaz (bilgi ifşası riski) — yerine sabit, güvenli bir mesaj döner.
    private static Task WriteErrorResponseAsync(HttpContext context, Exception ex)
    {
        var (statusCode, code, message) = ex switch
        {
            EntityNotFoundException => (HttpStatusCode.NotFound, "BULUNAMADI", ex.Message),
            _ => (HttpStatusCode.InternalServerError, "SUNUCU_HATASI", "Beklenmeyen bir hata oluştu.")
        };

        context.Response.ContentType = "application/json";
        context.Response.StatusCode = (int)statusCode;

        var response = new ApiErrorResponse(code, message);
        var json = JsonSerializer.Serialize(response,
            new JsonSerializerOptions { PropertyNamingPolicy = JsonNamingPolicy.CamelCase });

        return context.Response.WriteAsync(json);
    }
}

namespace WordLearner.API.Middleware;

public class SecurityHeadersMiddleware
{
    private readonly RequestDelegate _next;

    public SecurityHeadersMiddleware(RequestDelegate next) => _next = next;

    // AMAÇ: Yanıt başlıklarını, gövde yazılmadan önce ekleyip pipeline'ı devam ettirir.
    // NEDEN: Başlıklar response başlamadan (headers gönderilmeden) eklenmelidir;
    //        bu yüzden _next(context) çağrısından ÖNCE set edilir.
    public async Task InvokeAsync(HttpContext context)
    {
        // NEDEN: Sayfanın başka bir sitede <iframe> içine alınmasını (clickjacking) engeller.
        context.Response.Headers["X-Frame-Options"] = "DENY";

        // NEDEN: Tarayıcının Content-Type'ı görmezden gelip dosyayı "tahmin ederek"
        //        çalıştırmasını (MIME sniffing) engeller.
        context.Response.Headers["X-Content-Type-Options"] = "nosniff";

        // NEDEN: Farklı origin'e giden isteklerde tam URL yerine yalnızca origin'i gönderir;
        //        query string'deki hassas verilerin (token, id) sızmasını azaltır.
        context.Response.Headers["Referrer-Policy"] = "strict-origin-when-cross-origin";

        // NEDEN: Yalnızca kendi origin'inden script/stil yüklenmesine izin vererek
        //        XSS ile enjekte edilen dış kaynaklı script'leri engeller.
        context.Response.Headers["Content-Security-Policy"] = "default-src 'self'";

        // NEDEN: Uygulama konum/mikrofon/kamera kullanmadığı için tarayıcı bu
        //        API'lere erişimi baştan reddeder (izin istenemez).
        context.Response.Headers["Permissions-Policy"] = "geolocation=(), microphone=(), camera=()";

        await _next(context);
    }
}

using System.Diagnostics;

namespace WordLearner.API.Middleware;

public class RequestResponseLoggingMiddleware
{
    private readonly RequestDelegate _next;
    private readonly ILogger<RequestResponseLoggingMiddleware> _logger;

    public RequestResponseLoggingMiddleware(RequestDelegate next, ILogger<RequestResponseLoggingMiddleware> logger)
    {
        _next = next;
        _logger = logger;
    }

    // AMAÇ: İsteğin başlangıcını, bitişini ve geçen süreyi (ms) loglar.
    // NEDEN: Stopwatch, exception fırlasa bile try/finally ile durdurulur; böylece
    //        hata durumunda da gerçek süre ve nihai durum kodu (ExceptionHandlingMiddleware
    //        tarafından set edilmiş 500 vb.) doğru şekilde loglanır.
    public async Task InvokeAsync(HttpContext context)
    {
        var stopwatch = Stopwatch.StartNew();
        _logger.LogInformation("İstek başladı: {Method} {Path}",
            context.Request.Method, context.Request.Path);

        try
        {
            await _next(context);
        }
        finally
        {
            stopwatch.Stop();
            _logger.LogInformation("İstek bitti: {Method} {Path} → {StatusCode} ({ElapsedMs}ms)",
                context.Request.Method, context.Request.Path,
                context.Response.StatusCode, stopwatch.ElapsedMilliseconds);
        }
    }

using FluentValidation;
using MediatR;
using Microsoft.Extensions.DependencyInjection;

namespace WordLearner.Application.Extensions;

public static class ApplicationServiceExtensions
{
    // AMAÇ: MediatR handler'larını, AutoMapper profillerini ve FluentValidation
    //       validator'larını Application katmanı assembly'sinden tarayıp kaydeder.
    // NEDEN: Henüz (A-02) hiçbir feature command/handler/validator yazılmadığı için
    //        somut bir tip yerine bu extension'ın bulunduğu assembly referans alınır;
    //        A-03'ten itibaren eklenecek her CreateWordCommand/CreateWordCommandValidator
    //        vb. otomatik olarak bulunur, tek tek kayıt gerekmez.
    public static IServiceCollection AddApplicationServices(this IServiceCollection services)
    {
        var applicationAssembly = typeof(ApplicationServiceExtensions).Assembly;

        // NEDEN MediatR: Controller'lar servisleri doğrudan çağırmak yerine
        //       IMediator.Send(command/query) ile çağırır; controller ince katman kalır.
        services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(applicationAssembly));

        // NEDEN AutoMapper: Entity ↔ DTO dönüşümlerini elle yazmak yerine profil
        //       sınıflarına (Profile) devreder; her feature kendi profilini ekler.
        services.AddAutoMapper(applicationAssembly);

        // NEDEN FluentValidation: Request DTO'larının doğrulama kuralları (RuleFor)
        //       controller'a girmeden, ASP.NET Core'un model binding aşamasında çalışır.
        services.AddValidatorsFromAssembly(applicationAssembly);

        return services;
    }
}
