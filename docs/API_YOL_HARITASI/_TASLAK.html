<!DOCTYPE html>
<!--
  ╔═══════════════════════════════════════════════════════════════════════╗
  ║  YENİ API NASIL EKLENİR (3 adım)                                       ║
  ║  1) Bu dosyayı kopyala → "<faz>_<id>.html" yap (örn: A-03_auth-login.html)
  ║  2) Aşağıdaki `API` objesini doldur (adimlar'ı sırayla ekle).          ║
  ║  3) index.html içindeki LISTE dizisine bir satır ekle.                 ║
  ║                                                                         ║
  ║  KOD KURALI: `kod` alanları gerçek dosyanın BİREBİR kopyasıdır —        ║
  ║  kırpılmaz, `...` ile kapatılmaz. Enum kullanılıyorsa ayrı adım olur.   ║
  ║  adim.tur: entity | config | enum | dto | validator | exception |       ║
  ║            repository | service | handler | controller | test           ║
  ║  NEDEN handler: MediatR CQRS ile yazılan bir API'da iş mantığı tek bir   ║
  ║  XxxService yerine her akış için ayrı bir Command/Query + Handler'a      ║
  ║  bölünür (Command record + Handler class genelde AYNI dosyada, dikey    ║
  ║  dilim). Böyle bir adım `tur: 'handler'` olur, `dosya` Command+Handler'ı ║
  ║  birlikte barındıran dosyayı gösterir (örn. A-03_auth-api.html'deki      ║
  ║  Features/Auth/*Command.cs adımlarına bakılabilir — ilk örnek).          ║
  ║                                                                         ║
  ║  ⏱️ ANINDA YAZ: Her parçayı (entity/DTO/...) yazar yazmaz buraya ekle —  ║
  ║     API bitince TOPLU yazmak yasak. Her adımda `aciklama` zorunlu.       ║
  ║  🎓 `aciklama` JUNIOR-EĞİTİCİ OLMALI (2026-07-07, zorunlu kural): bu      ║
  ║     proje bir junior eğitim materyali — `aciklama` yalnızca "ne          ║
  ║     yapıldığını" değil, junior'ın henüz bilmeyebileceği (1) KAVRAM       ║
  ║     TANIMINI ("enum nedir", "DI/Scoped nedir", "migration nedir", "bu    ║
  ║     pattern ne işe yarar" gibi) VE (2) somut GEREKÇEYİ ("şu senaryoda    ║
  ║     şu sorun çıkardı/çıkarırdı" seviyesinde) birlikte anlatmalı.         ║
  ║     YASAK KALIP: "X.md'deki kurala göre böyle yazıldı" gibi dokümana     ║
  ║     self-referential atıf yapıp gerçek gerekçeyi atlamak — kuralın       ║
  ║     KENDİSİNİN gerekçesi yazılmalı, hangi dosyada yazdığı değil.         ║
  ║     Yazmadan önce kontrol: "bir junior bunu okuyup öğrenebilir mi?"      ║
  ║  ♻️ YENİDEN KULLANIM: Bu API daha önce yazılmış bir kodu (örn.           ║
  ║     Repository<T>, PasswordService.Hash, ortak DTO) kullanıyorsa o       ║
  ║     kodun TAM hâlini de buraya bir adım olarak ekle — her API tek         ║
  ║     başına baştan sona okunabilmeli.                                     ║
  ║  🟩🟥 YENİ/ESKİ SATIR VURGUSU (git diff benzeri): Reused bir dosyanın     ║
  ║     TAM hâlini gösterirken, bu API için değişen satırların BAŞINA (ham   ║
  ║     kod string'inde, escape'ten önce) marker koy — render.js sökip       ║
  ║     farklı renkte gösterir:                                             ║
  ║       `##NEW##` → bu API'de EKLENEN satır (yeşil)                       ║
  ║       `##OLD##` → bu API'de KALDIRILAN/değişen eski satır (kırmızı,      ║
  ║                   üstü çizili — dosyada artık YOK, yalnızca neyin       ║
  ║                   yerine geçtiğini göstermek için burada tutulur)        ║
  ║     Örnek — bir alan silinip yerine başkası eklendiyse:                 ║
  ║       kod: `public class Xxx {                                          ║
  ║       ##OLD##    public string EskiAlan { get; set; }                   ║
  ║       ##NEW##    public string YeniAlan { get; set; }                   ║
  ║       }`                                                                 ║
  ║     Marker yalnızca BU API'de değişen satırlarda olur; reused kısım      ║
  ║     işaretsiz kalır. Tamamı yeni bir dosyaysa (ör. entity ilk kez         ║
  ║     yazılıyorsa) hiç marker kullanılmaz — tüm kod zaten "yeni" sayılır.  ║
  ║  🧩 ÇAPRAZ LİNK KURALI: Bu API'yi bir frontend feature (Admin/Web/Mobil)  ║
  ║     tüketiyorsa, en alta `frontendRefs: [{dosya, baslik}]` ekle — sayfa   ║
  ║     "Buradan sonrası frontend tarafında" bandı gösterir. Karşılığı:      ║
  ║     ilgili projenin roadmap klasöründeki (ADMIN_/WEB_/MOBILE_YOL_HARITASI)║
  ║     feature'ın `api` adımına da `backendRef: {dosya, baslik}` eklenir.   ║
  ║  📦 PAKET KURALI: Bu API için `dotnet add` ile eklenen HER yeni NuGet     ║
  ║     paketi `paketler: [{paket, versiyon, proje, neden}]` dizisine yazılır ║
  ║     (adimlar'dan ÖNCE, aşağıda). Paket önceki bir API'de zaten            ║
  ║     eklenmişse tekrar YAZILMAZ — yalnızca bu API'nin ilk kez eklettiği    ║
  ║     paketler listelenir. Sayfa bunu adımlardan önce görünür şekilde       ║
  ║     gösterir; okuyucu kodu çalıştırmadan önce ne kurması gerektiğini      ║
  ║     bilir.                                                                ║
  ║  🗂️ ADIM GRUPLAMA (adim.grup, opsiyonel): 15-20+ adımı geçen büyük        ║
  ║     API'larda her adıma aynı metinli bir `grup: '...'` alanı eklenir      ║
  ║     (ör. "Repository'ler", "13 Auth Command + Handler"). Sayfa üstte      ║
  ║     tıklanabilir bir İçindekiler kutusu + adımların arasına bölüm         ║
  ║     başlığı basar (render.js, `adim.grup` yoksa hiçbir şey değişmez).     ║
  ║     Bu SADECE görsel bir ayraçtır — `kod` alanına dokunmaz, hiçbir adım   ║
  ║     kırpılmaz. Küçük API'lar (≲15 adım, ör. A-02) grup KULLANMAYABİLİR.   ║
  ║  🗃️ KATMAN GRUPLAMA (API.katmanlar, opsiyonel, grup'un ÜSTÜ): grup       ║
  ║     sayısı da çoğalırsa (A-03: 15 grup) bunları mimari katmana göre       ║
  ║     toplayan `katmanlar: [{ad, gruplar:[...]}]` dizisi eklenir — grup     ║
  ║     adları BİREBİR `adim.grup`'takiyle eşleşmeli. adım'a değil API'ye     ║
  ║     yazılır (bir katman birden çok grubu kapsadığı için, tekrar 64 satır  ║
  ║     değiştirmek yerine TEK bir eşleme). İçindekiler kutusu katmanlara     ║
  ║     göre bölünür, adım listesine de daha büyük bir `.step-katman`         ║
  ║     başlığı eklenir. `katmanlar` yoksa `grup` tek seviyeli çalışmaya      ║
  ║     devam eder — bkz. A-03_auth-api.html (gerçek örnek, 4 katman → 15     ║
  ║     grup → 64 adım).                                                     ║
  ║  ✂️ BÜYÜK ALT-GÖREV = AYRI DOSYA: Bir task'ın alt-task'ı (ör. A-03.1)     ║
  ║     kendi entity/service/controller'ına sahipse — yani başlı başına bir  ║
  ║     "API" ise — o alt-task'ın adımlarını ana sayfanın `adimlar[]`'ına     ║
  ║     EKLEMEK YERİNE kendi dosyasını aç (`_TASLAK.html`'i kopyala →         ║
  ║     `<faz>.<alt>_<id>.html`, ör. `A-03.1_qr-login.html`). Sebep: ana      ║
  ║     sayfa zaten büyükse (A-03: 60+ adım) daha da büyütmek okunabilirliği  ║
  ║     bozar; `adim.grup` bunu YALNIZCA bir dosya içinde çözer, dosyalar     ║
  ║     arası şişmeyi çözmez. İki sayfa `relatedRefs` ile birbirine bağlanır  ║
  ║     (aşağıda) — HER İKİSİNE de eklenir (tek yönlü kalması yasak, aynı     ║
  ║     `frontendRefs` kuralı gibi). `index.html`'in LİSTE'sine alt-task için ║
  ║     de ayrı bir satır eklenir (`faz: 'A-03.1'`).                          ║
  ║  🔗 İLGİLİ API KURALI (relatedRefs, opsiyonel): `frontendRefs` katmanlar  ║
  ║     arası (backend→frontend) geçiş içindir; AYNI katmandaki (backend↔     ║
  ║     backend) kardeş sayfalar için `relatedRefs: [{dosya, baslik}]`        ║
  ║     kullanılır — "🔗 İlgili API'lar" bandı basar. Örnek kullanım: bir     ║
  ║     task ikiye bölündüğünde (bkz. yukarıdaki ✂️ kuralı) iki sayfa da      ║
  ║     birbirine bu alanla bağlanır.                                        ║
  ╚═══════════════════════════════════════════════════════════════════════╝
-->

window.API = {

{

}`
