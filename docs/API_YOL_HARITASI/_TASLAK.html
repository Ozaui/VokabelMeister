<!DOCTYPE html>
<!--
  ╔═══════════════════════════════════════════════════════════════════════╗
  ║  YENİ API NASIL EKLENİR (3 adım)                                       ║
  ║  1) Bu dosyayı kopyala → "<faz>_<id>.html" yap (örn: A-03_auth-login.html)
  ║  2) Aşağıdaki `API` objesini doldur (adimlar'ı sırayla ekle).          ║
  ║  3) index.html içindeki LISTE dizisine bir satır ekle.                 ║
  ║                                                                         ║
  ║  KOD KURALI: `kod` alanları gerçek dosyanın BİREBİR kopyasıdır —        ║
  ║  kırpılmaz, `...` ile kapatılmaz. Enum kullanılıyorsa ayrı adım olur.   ║
  ║  adim.tur: entity | config | enum | dto | validator | exception |       ║
  ║            repository | service | controller                            ║
  ║                                                                         ║
  ║  ⏱️ ANINDA YAZ: Her parçayı (entity/DTO/...) yazar yazmaz buraya ekle —  ║
  ║     API bitince TOPLU yazmak yasak. Her adımda `aciklama` zorunlu.       ║
  ║  ♻️ YENİDEN KULLANIM: Bu API daha önce yazılmış bir kodu (örn.           ║
  ║     Repository<T>, PasswordService.Hash, ortak DTO) kullanıyorsa o       ║
  ║     kodun TAM hâlini de buraya bir adım olarak ekle — her API tek         ║
  ║     başına baştan sona okunabilmeli.                                     ║
  ╚═══════════════════════════════════════════════════════════════════════╝
-->
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Yol Haritası — Taslak</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

</div>

<div class="wrap"><div id="content"></div></div>

<script>
// ── Bu objeyi doldur ────────────────────────────────────────────────────────
// NEDEN window.API: `const` top-level olsa bile window'a atanmaz; render.js bunu okur.
window.API = {
  id: 'ornek-id',                 // dosya adındaki id ile aynı
  faz: 'A-03',                    // TASK.md task kodu
  metot: 'POST',                  // GET | POST | PUT | DELETE
  yol: '/api/v1/ornek',
  auth: 'Anonim',                 // Anonim | JWT | Admin
  baslik: 'Örnek Endpoint',
  durum: 'wip',                   // done | wip
  ozet: 'Bu endpoint ne yapar — bir iki cümle.',
  adimlar: [
    {
      num: 1, tur: 'entity',
      baslik: 'Xxx.cs', dosya: 'Domain/Entities/Xxx.cs',
      aciklama: 'NEDEN bu entity kullanıldı; hangi alanlar kritik ve neden.',
      kod: `public class Xxx : BaseEntity
{
    public string Name { get; set; } = string.Empty;
}`
    },
    {
      num: 2, tur: 'config',
      baslik: 'XxxConfiguration.cs', dosya: 'Infrastructure/Data/Configurations/XxxConfiguration.cs',
      aciklama: 'Servis/Controller bu yapılandırmaya ihtiyaç duyduğu için önce belgeliyoruz.',
      kod: `public class XxxConfiguration : IEntityTypeConfiguration<Xxx> { /* tam dosya */ }`
    },
    {
      num: 3, tur: 'dto',
      baslik: 'XxxRequest.cs', dosya: 'Application/DTOs/Xxx/XxxRequest.cs',
      aciklama: 'Endpoint\'in aldığı girdi. Neden bu alanlar var.',
      kod: `public class XxxRequest { /* tam dosya */ }`
    },
    {
      num: 4, tur: 'validator',
      baslik: 'XxxRequestValidator.cs', dosya: 'Application/Validators/Xxx/XxxRequestValidator.cs',
      aciklama: 'Controller bu bağımlılığa ihtiyaç duyduğu için önce belgeliyoruz.',
      kod: `public class XxxRequestValidator : AbstractValidator<XxxRequest> { /* tam */ }`
    },
    {
      num: 5, tur: 'repository',
      baslik: 'IXxxRepository / XxxRepository', dosya: 'Infrastructure/Repositories/XxxRepository.cs',
      aciklama: 'Servis bu repository metoduna ihtiyaç duyduğu için önce belgeliyoruz.',
      kod: `public class XxxRepository : Repository<Xxx>, IXxxRepository { /* tam */ }`
    },
    {
      num: 6, tur: 'service',
      baslik: 'IXxxService / XxxService', dosya: 'Application/Services/Xxx/XxxService.cs',
      aciklama: 'Yukarıdaki tüm yardımcıları bir araya getiren iş mantığı katmanı.',
      kod: `public async Task<XxxDto> CreateAsync(...) { /* tam metot */ }`
    },
    {
      num: 7, tur: 'controller',
      baslik: 'XxxController.cs', dosya: 'API/Controllers/XxxController.cs',
      aciklama: 'Tüm parçaları (1-6) bir araya getiren ince katman.',
      kod: `[HttpPost] public async Task<IActionResult> Create(...) { /* tam */ }`
    }
  ]
};
</script>
<script src="render.js"></script>
</body>
</html>
