<!--
  ╔═══════════════════════════════════════════════════════════════════════╗
  ║  YENİ FRONTEND FEATURE NASIL EKLENİR (3 adım)                          ║
  ║  1) Bu dosyayı kopyala → "<faz>_<id>.html" yap (örn: D-04_kelime-karti.html)
  ║  2) Aşağıdaki `FEATURE` objesini doldur (adimlar'ı sırayla ekle).      ║
  ║  3) index.html içindeki LISTE dizisine bir satır ekle.                 ║
  ║                                                                         ║
  ║  KOD KURALI: `kod` alanları gerçek dosyanın BİREBİR kopyasıdır —        ║
  ║  kırpılmaz, `...` ile kapatılmaz.                                      ║
  ║  adim.tur: tip | api | slice | hook | component | route | style | test  ║
  ║                                                                         ║
  ║  ⏱️ ANINDA YAZ: Her parçayı (tip/api/slice/component/...) yazar yazmaz  ║
  ║     buraya ekle — feature bitince TOPLU yazmak yasak.                   ║
  ║     Her adımda `aciklama` zorunlu.                                      ║
  ║  ♻️ YENİDEN KULLANIM: Bu feature daha önce yazılmış bir component/hook/  ║
  ║     slice (örn. `useAuth`, ortak `Button`) kullanıyorsa o kodun TAM      ║
  ║     hâlini de buraya bir adım olarak ekle — her feature tek başına       ║
  ║     baştan sona okunabilmeli.                                           ║
  ║  🟩🟥 YENİ/ESKİ SATIR VURGUSU (git diff benzeri): Reused bir dosyanın     ║
  ║     TAM hâlini gösterirken, bu feature için değişen satırların BAŞINA    ║
  ║     (ham kod string'inde, escape'ten önce) marker koy:                  ║
  ║       `##NEW##` → bu feature'da EKLENEN satır (yeşil)                   ║
  ║       `##OLD##` → bu feature'da KALDIRILAN/değişen eski satır (kırmızı,  ║
  ║                   üstü çizili)                                          ║
  ║     Marker yalnızca BU feature'da değişen satırlarda olur; reused kısım  ║
  ║     işaretsiz kalır. Tamamı yeni bir dosyaysa hiç marker kullanılmaz.    ║
  ║  🧩 ÇAPRAZ LİNK KURALI: `tur:'api'` adımı (RTK Query — backend'e istek   ║
  ║     atılan nokta) bir `backendRef: {dosya, baslik}` alanı alır — o adımın║
  ║     hemen altında "Buradan sonrası backend tarafında" bandı gösterilir. ║
  ║     Karşılığı: API_YOL_HARITASI'ndaki o API sayfasının en altına da     ║
  ║     `frontendRefs` içine bu feature eklenir (iki yönlü link).           ║
  ║  📦 PAKET KURALI: Bu feature için `npm i` ile eklenen HER yeni paket      ║
  ║     `paketler: [{paket, versiyon, neden}]` dizisine yazılır (adimlar'dan  ║
  ║     ÖNCE, aşağıda). Paket önceki bir feature'da zaten eklenmişse tekrar   ║
  ║     YAZILMAZ — yalnızca bu feature'ın ilk kez eklettiği paketler yazılır. ║
  ║                                                                         ║
  ║  Detay ve yöntem → ../TASK.md (⭐ Frontend Çalışma Yöntemi)             ║
  ╚═══════════════════════════════════════════════════════════════════════╝

<script>
// ── Bu objeyi doldur ────────────────────────────────────────────────────────
// NEDEN window.FEATURE: `const` top-level olsa bile window'a atanmaz; render.js bunu okur.
window.FEATURE = {
  id: 'ornek-id',                 // dosya adındaki id ile aynı
  faz: 'D-04',                    // TASK/ klasöründeki task kodu
  uygulama: 'web',                 // web | admin | mobile
  tip: 'component',                // bu feature'ın ana ürünü: sayfa | component | hook
  baslik: 'Örnek Feature',
  durum: 'wip',                   // done | wip
  ozet: 'Bu feature ne yapar — bir iki cümle.',
  // 📦 ZORUNLU KURAL: Bu feature için YENİ eklenen her npm paketi buraya yazılır (npm i ile
  // eklenen her paket). NEDEN: Her feature tek başına baştan sona kurulabilir/okunabilir olmalı.
  // Paket zaten önceki bir feature'da eklenmişse (ör. axios D-02'de) burada TEKRAR yazılmaz —
  // yalnızca BU feature'ın İLK KEZ eklettiği paketler listelenir.
  paketler: [
    { paket: 'ornek-paket', versiyon: '1.0.0', neden: 'Bir iki cümleyle ne için eklendi.' }
  ],
  adimlar: [
    {
      num: 1, tur: 'tip',
      baslik: 'xxx.types.ts', dosya: 'web/src/types/xxx.ts',
      aciklama: 'API\'dan gelen/giden verinin TS şekli. Sonraki adımlar (RTK Query, component) bu tipi kullanır.',
      kod: `export interface Xxx {
  id: number;
  name: string;
}`
    },
    {
      num: 2, tur: 'api',
      baslik: 'xxxApi.ts (RTK Query)', dosya: 'web/src/store/api/xxxApi.ts',
      aciklama: 'Backend endpoint\'ine istek atan RTK Query tanımı — component bunun ürettiği hook\'u kullanır.',
      kod: `export const xxxApi = api.injectEndpoints({
  endpoints: (builder) => ({
    getXxx: builder.query<Xxx[], void>({ query: () => '/xxx' }),
  }),
});
export const { useGetXxxQuery } = xxxApi;`,
      // Bu adım backend'e istek atıyor — karşılığı olan API sayfasına link.
      // O sayfanın `frontendRefs` dizisine de bu feature eklenmeli (iki yönlü).
      backendRef: { dosya: '../API_YOL_HARITASI/A-0X_ornek-api.html', baslik: 'GET /api/v1/xxx' }
    },
    {
      num: 3, tur: 'slice',
      baslik: 'xxxSlice.ts', dosya: 'web/src/store/slices/xxxSlice.ts',
      aciklama: 'Yalnızca ek local/UI state gerekiyorsa yazılır (örn. seçili filtre) — sunucu verisi RTK Query cache\'inde kalır, burada tekrar tutulmaz.',
      kod: `const xxxSlice = createSlice({
  name: 'xxx',
  initialState: { selectedId: null as number | null },
  reducers: { select: (state, action) => { state.selectedId = action.payload; } },
});
export const { select } = xxxSlice.actions;
export default xxxSlice.reducer;`
    },
    {
      num: 4, tur: 'hook',
      baslik: 'useXxx.ts', dosya: 'web/src/hooks/useXxx.ts',
      aciklama: 'Component\'ten iş mantığını ayıran custom hook — yalnızca birden fazla component aynı mantığı paylaşıyorsa yazılır.',
      kod: `export function useXxx() {
  const { data, isLoading } = useGetXxxQuery();
  return { items: data ?? [], isLoading };
}`
    },
    {
      num: 5, tur: 'component',
      baslik: 'Xxx.tsx', dosya: 'web/src/components/Xxx.tsx',
      aciklama: 'Feature\'ın asıl UI\'ı — yukarıdaki tüm yardımcıları (tip/api/slice/hook) bir araya getirir.',
      kod: `export function Xxx() {
  const { items, isLoading } = useXxx();
  if (isLoading) return <Spinner />;
  return <ul>{items.map((x) => <li key={x.id}>{x.name}</li>)}</ul>;
}`
    },
    {
      num: 6, tur: 'route',
      baslik: 'Route/Import Entegrasyonu', dosya: 'web/src/App.tsx',
      aciklama: 'Component\'in gerçek uygulamada nereye ve nasıl import edildiği — bu olmadan feature kullanıcıya ulaşmaz.',
      kod: `<Route path="/xxx" element={<Xxx />} />`
    },
    {
      num: 7, tur: 'test',
      baslik: 'Xxx.test.tsx', dosya: 'web/src/components/Xxx.test.tsx',
      aciklama: 'React Testing Library ile mutlu yol + yükleniyor durumu testi.',
      kod: `test('Xxx_DataLoaded_RendersList', async () => {
  render(<Xxx />);
  expect(await screen.findByText('...')).toBeInTheDocument();
});`
    }
  ]
};
</script>
