<!DOCTYPE html>
<!--
  YENİ MOBİL FEATURE NASIL EKLENİR (3 adım)
  1) Bu dosyayı kopyala → "<faz>_<id>.html" yap (örn: E-07_ogrenme-ekrani.html)
  2) Aşağıdaki `FEATURE` objesini doldur (adimlar'ı sırayla ekle).
  3) index.html içindeki LISTE dizisine bir satır ekle.

  KOD KURALI: `kod` alanları gerçek dosyanın BİREBİR kopyasıdır — kırpılmaz, `...` ile kapatılmaz.
  adim.tur: tip | api | slice | hook | component | route | style | test

  ⏱️ ANINDA YAZ: Her parçayı (tip/api/slice/component/...) yazar yazmaz buraya ekle — feature
     bitince TOPLU yazmak yasak. Her adımda `aciklama` zorunlu.
  ♻️ YENİDEN KULLANIM: Bu feature daha önce yazılmış bir component/hook/slice kullanıyorsa o
     kodun TAM hâlini de buraya bir adım olarak ekle — her feature tek başına baştan sona
     okunabilmeli.
  🟩🟥 YENİ/ESKİ SATIR VURGUSU: Reused bir dosyanın TAM hâlini gösterirken, bu feature için
     değişen satırların BAŞINA `##NEW##` (eklendi, yeşil) veya `##OLD##` (kaldırıldı, kırmızı)
     marker'ı koy. Tamamı yeni bir dosyaysa hiç marker kullanılmaz.
  🧩 BACKEND REFERANSI: `tur:'api'` adımına `backendRef: {dosya, baslik}` eklenebilir — o
     adımın altında "Buradan sonrası backend tarafında" bandı gösterilir; `dosya` kök
     `BACKEND_AKADEMI/<faz>/NN_....html`'e (ilgili bölüm) göreli bir yoldur. Backend artık ayrı
     bir JSON alanı tutmuyor (çift yönlü eşleşme `docs/TASK/*.md`'deki "Frontend karşılığı:"
     notuyla sağlanıyor), bu yüzden tek yönlü kalması sorun değil.
  📦 PAKET KURALI: Bu feature için `npm i`/`expo install` ile eklenen HER yeni paket `paketler`
     dizisine yazılır — daha önce başka bir feature'da eklenmişse tekrar yazılmaz.

  Detay ve yöntem → ../TASK.md (⭐ Frontend Çalışma Yöntemi)

  NOT (2026-07-07): Bu klasör yalnızca Mobil (`/mobile` — ayrı bir React Native/Expo projesi,
  Faz E) feature'larını kapsar. Admin (`/admin`) → ../ADMIN_YOL_HARITASI/, Web (`/web`) →
  ../WEB_YOL_HARITASI/. Üçü daha önce tek bir FRONTEND_YOL_HARITASI'nda birleşikti; admin/web
  ayrı projeler olarak açılacağı netleşince ayrıldı (bkz. wiki/Index.md INGEST).
-->

window.FEATURE = {
  id: 'ornek-id',
  faz: 'E-0X',                    // TASK/E_mobil.md'deki task kodu
  uygulama: 'mobile',
  tip: 'ekran',
  baslik: 'Örnek Feature',
  durum: 'wip',                   // done | wip
  ozet: 'Bu feature ne yapar — bir iki cümle.',

    { paket: 'ornek-paket', versiyon: '1.0.0', neden: 'Bir iki cümleyle ne için eklendi.' }

  adimlar: [
    {
      num: 1, tur: 'tip',
      baslik: 'xxx.ts', dosya: 'mobile/src/types/xxx.ts',
      aciklama: 'API\'dan gelen/giden verinin TS şekli. Sonraki adımlar (RTK Query, ekran) bu tipi kullanır.',
      kod: `export interface Xxx {
  id: number;
  name: string;
}`
    },
    {
      num: 2, tur: 'api',
      baslik: 'xxxApi.ts (RTK Query)', dosya: 'mobile/src/store/api/xxxApi.ts',
      aciklama: 'Backend endpoint\'ine istek atan RTK Query tanımı — ekran bunun ürettiği hook\'u kullanır. Web ile aynı RTK Query/tip tanımı paylaşılabilir.',

  endpoints: (builder) => ({
    getXxx: builder.query<Xxx[], void>({ query: () => '/xxx' }),
  }),
});
export const { useGetXxxQuery } = xxxApi;`,
      backendRef: { dosya: '../../BACKEND_AKADEMI/A-0X_ornek-gorev/05_command-validator.html', baslik: 'GET /api/v1/xxx' }

    {
      num: 3, tur: 'component',

  const { data, isLoading } = useGetXxxQuery();
  if (isLoading) return <Spinner />;
  return <FlatList data={data} renderItem={({ item }) => <Text>{item.name}</Text>} />;
}`
    },
    {
      num: 4, tur: 'route',
      baslik: 'Navigator Kaydı', dosya: 'mobile/src/navigation/MainTabNavigator.tsx',

  expect(await screen.findByText('...')).toBeTruthy();
